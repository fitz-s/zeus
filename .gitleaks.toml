# gitleaks configuration for Zeus
#
# Companion to SECURITY-FALSE-POSITIVES.md (root). The allowlist below mirrors
# entries in that file — do NOT add raw values here without also recording the
# operator ruling there. REVIEW-SAFE tags are registry-validated by
# .claude/hooks/pre-commit-secrets.sh; this file only carries exact scanner
# allowlists for already-registered rulings.
#
# When adding an entry: also add the [REVIEW-SAFE: <TAG>] banner at the source
# site so a human reading the file sees the clearance without consulting this
# config.

# Use the gitleaks default rules as a base; allowlist below is additive.
[extend]
useDefault = true

[[allowlists]]
description = "WU PUBLIC WEB KEY — wunderground.com browser-embedded public key. Operator ruling 2026-04-21, re-confirmed 2026-05-01. See SECURITY-FALSE-POSITIVES.md [REVIEW-SAFE: WU_PUBLIC_KEY]."
regexes = [
    '''e1f10a1e78da46f5b10a1e78da96f525''',
]
paths = [
    '''src/data/observation_client\.py''',
    '''src/data/daily_obs_append\.py''',
    '''src/data/wu_hourly_client\.py''',
    '''SECURITY-FALSE-POSITIVES\.md''',
    '''docs/operations/repo_review_.*/security\.md''',
    '''docs/operations/repo_review_.*/SYNTHESIS\.md''',
    '''docs/operations/repo_review_.*/architecture\.md''',
    '''docs/operations/task_2026-04-14_session_backlog\.md''',
]

# Test fixture path: `tests/**` files routinely contain synthetic identifiers
# (token_id, condition_id, decision_id, idempotency_key, etc.) that look like
# API keys / tokens to gitleaks but are NEVER real credentials. Allowlist all
# of `tests/` for the generic-api-key + generic-secret rule families. Real
# secrets in tests would be a separate audit class — operator will surface
# them via the SECURITY-FALSE-POSITIVES.md banner pattern, not via raw values.
[[allowlists]]
description = "Test fixtures with synthetic IDs (operator-cleared 2026-05-01)"
paths = [
    '''tests/.*\.py''',
]
