schema_version: 1
metadata:
  charter_version: 2.0.0
  catalog_size: 15
  sunset_default: 90d

hooks:
  - id: invariant_test
    event: PreToolUse
    matcher: Bash
    intent: >
      Run pytest baseline before `git commit` to catch regressions.
      ADVISORY: emits context; never blocks.
    blocked_when: []
    severity: ADVISORY
    sunset_date: 2026-08-06
    telemetry:
      ritual_signal_emitted: true
    owner_module: src/architecture/hooks/invariant_test.py

  - id: secrets_scan
    event: PreToolUse
    matcher: Bash
    intent: >
      Run gitleaks against staged content for `git commit`.
      ADVISORY: emits context; never blocks.
    blocked_when: []
    severity: ADVISORY
    sunset_date: 2026-08-06
    telemetry:
      ritual_signal_emitted: true

  - id: cotenant_staging_guard
    event: PreToolUse
    matcher: Bash
    intent: >
      Warn on broad `git add` in main worktree (co-tenant absorption).
      ADVISORY: emits context; never blocks.
    blocked_when: []
    severity: ADVISORY
    sunset_date: 2026-08-06
    telemetry:
      ritual_signal_emitted: true

  - id: pre_checkout_uncommitted_overlap
    event: PreToolUse
    matcher: Bash
    intent: >
      Warn on `git checkout <branch>` / `git switch <branch>` when the
      working tree has tracked modifications that overlap with the
      target branch'"'"'s tree (silent revert risk).
      ADVISORY: emits context; never blocks.
    blocked_when: []
    severity: ADVISORY
    sunset_date: 2026-08-06
    telemetry:
      ritual_signal_emitted: true

  - id: pr_create_loc_accumulation
    event: PreToolUse
    matcher: Bash
    intent: >
      Principle 1 backstop (architecture/agent_pr_discipline_2026_05_09.md).
      BLOCKING when self-authored LOC < 300 since merge-base. Self-authored excludes
      carry-over commits (no `Co-Authored-By: Claude` line) so operator's local-main
      commits picked up by the agent's branch don't inflate the count. Block message
      explains paid auto-reviewer cost economics (P1) and lists sibling principles
      P2/P3/P4 so the agent reasons about the full workflow, not just the LOC gate.
      Bypass: ZEUS_PR_ALLOW_TINY=1 (degrades to advisory; document reason in PR body).
    blocked_when:
      - self_authored_loc_since_base < 300
    severity: BLOCKING
    bypass_env: ZEUS_PR_ALLOW_TINY
    sunset_date: 2026-08-06
    telemetry:
      ritual_signal_emitted: true

  - id: pre_merge_comment_check
    event: PreToolUse
    matcher: Bash
    intent: >
      Principle 2 backstop (architecture/agent_pr_discipline_2026_05_09.md).
      BLOCKING on `gh pr merge <N>` when: PR age < 600s (auto-reviewers not yet fired);
      ANY unresolved review thread exists (B2 strict: all threads, any author, any severity);
      or any review state is CHANGES_REQUESTED (non-dismissed). Block message opens with
      "skipped Principle 2" framing and reminds agent: fix-commit IS the response, no
      thread replies. Bypass: ZEUS_PR_MERGE_FORCE=1 — requires per-thread disposition
      (APPLIED/DISMISSED/DEFERRED) documented in PR body.
    blocked_when:
      - pr_age_seconds < 600
      - unresolved_review_thread_count > 0
      - changes_requested_review_not_dismissed == true
    severity: BLOCKING
    bypass_env: ZEUS_PR_MERGE_FORCE
    sunset_date: 2026-08-06
    telemetry:
      ritual_signal_emitted: true

  - id: pr_open_monitor_arm
    event: PostToolUse
    matcher: Bash
    intent: >
      After successful `gh pr create` or `gh pr ready`, emit
      additionalContext instructing the agent to arm a Monitor on
      `gh pr checks` + a poll on `gh pr view --json reviews,comments`.
    blocked_when: []
    severity: ADVISORY
    sunset_date: 2026-08-06
    telemetry:
      ritual_signal_emitted: true

  - id: phase_close_commit_required
    event: SubagentStop
    matcher: "*"
    intent: >
      When a phase-class subagent returns and the working tree has tracked
      changes not yet committed, emit additionalContext.
    blocked_when: []
    severity: ADVISORY
    sunset_date: 2026-08-06
    telemetry:
      ritual_signal_emitted: true

  - id: pre_merge_contamination
    event: PreToolUse
    matcher: Bash
    intent: >
      Conflict-first guidance + MERGE_AUDIT_EVIDENCE validation on
      protected branches. ADVISORY: emits context; never blocks.
    blocked_when: []
    severity: ADVISORY
    sunset_date: 2026-08-06
    telemetry:
      ritual_signal_emitted: true

  - id: post_merge_cleanup
    event: PostToolUse
    matcher: Bash
    intent: >
      Soft cleanup checklist after `gh pr merge`.
    blocked_when: []
    severity: ADVISORY
    sunset_date: 2026-08-06
    telemetry:
      ritual_signal_emitted: true

  - id: pre_edit_architecture
    event: PreToolUse
    matcher: "Edit|Write|MultiEdit|NotebookEdit"
    intent: >
      Advisory on edits to architecture/** without ARCH_PLAN_EVIDENCE.
      ADVISORY: emits context; never blocks.
    blocked_when: []
    severity: ADVISORY
    sunset_date: 2026-08-06
    telemetry:
      ritual_signal_emitted: true

  - id: pre_write_capability_gate
    event: PreToolUse
    matcher: "Edit|Write|MultiEdit|NotebookEdit"
    intent: >
      Topology Gate 1 advisory -- writes to blocking-class capability paths.
      ADVISORY: emits context; never blocks.
    blocked_when: []
    severity: ADVISORY
    sunset_date: 2026-08-04
    telemetry:
      ritual_signal_emitted: true

  - id: session_start_visibility
    event: SessionStart
    matcher: "*"
    intent: >
      On session start, invoke worktree_doctor --cross-worktree-visibility and
      emit a summary of active worktrees as additionalContext.
      ADVISORY only - never blocks.
    blocked_when: []
    severity: ADVISORY
    sunset_date: 2026-11-07
    telemetry:
      ritual_signal_emitted: true
    owner_module: scripts/worktree_doctor.py

  - id: worktree_create_advisor
    event: WorktreeCreate
    matcher: "*"
    intent: >
      After WorktreeCreate event, emit naming policy, scope, and sentinel write
      advisory as additionalContext. ADVISORY only - never blocks.
    blocked_when: []
    severity: ADVISORY
    sunset_date: 2026-11-07
    telemetry:
      ritual_signal_emitted: true
    owner_module: scripts/worktree_doctor.py

  - id: worktree_remove_advisor
    event: WorktreeRemove
    matcher: "*"
    intent: >
      Before WorktreeRemove, emit pre-remove dirty/uncommitted check +
      branch closure suggestion as additionalContext. ADVISORY only.
    blocked_when: []
    severity: ADVISORY
    sunset_date: 2026-11-07
    telemetry:
      ritual_signal_emitted: true
    owner_module: scripts/worktree_doctor.py
