name: live-release-gate

# Manual release proof gate. This workflow is intentionally operator-triggered:
# PR CI proves semantic coverage; release CI proves the loaded SHA/runtime state.

on:
  workflow_dispatch:
    inputs:
      requested_mode:
        type: choice
        required: true
        options: [paper, tiny_live, normal_live]
      expected_main_sha:
        required: true
        description: "Main SHA the operator expects to release"

permissions:
  contents: read

jobs:
  release-proof:
    runs-on: ubuntu-latest
    environment:
      name: live-release
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install PyYAML
      - name: Code-plane proof
        run: |
          actual="$(git rev-parse HEAD)"
          expected="${{ github.event.inputs.expected_main_sha }}"
          echo "expected=${expected}"
          echo "actual=${actual}"
          test "${actual}" = "${expected}"
          test -z "$(git status --porcelain)"
      - name: Schema-plane proof
        run: python scripts/check_schema_version.py
      - name: Static semantic proof
        run: python scripts/ci/assert_test_quality.py
      - name: Release verdict
        run: |
          mode="${{ github.event.inputs.requested_mode }}"
          if [ "${mode}" = "paper" ]; then
            echo "verdict=PAPER_ONLY"
          elif [ "${mode}" = "tiny_live" ]; then
            echo "verdict=TINY_LIVE_ALLOWED_PENDING_OPERATOR_RUNTIME_PROOF"
          else
            echo "verdict=NORMAL_LIVE_ALLOWED_PENDING_OPERATOR_RUNTIME_PROOF"
          fi
          echo "This hosted runner cannot read the operator machine live DB/API state; local live-release proof remains required before side effects."
