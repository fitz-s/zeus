name: money-path-required

# REQUIRED semantic gate for money-path changes.
# Owner: Fitz (Zeus CI infrastructure)
# Rationale: CI must classify semantic objects, route invariants, and run the
# relationship tests selected by architecture/money_path_ci.yaml. Unknown
# money-path objects fail closed instead of waiting for a historical incident.
# Review condition: update architecture/money_path_objects.yaml and
# architecture/money_path_ci.yaml when new economic objects, state machines,
# providers, scheduler jobs, or side-effect surfaces are introduced.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: money-path-required-${{ github.ref }}
  cancel-in-progress: true

jobs:
  classify-change:
    runs-on: ubuntu-latest
    outputs:
      risk: ${{ steps.classify.outputs.risk }}
      tests: ${{ steps.classify.outputs.tests }}
      invariants: ${{ steps.classify.outputs.invariants }}
      run_integration: ${{ steps.classify.outputs.run_integration }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Install classifier dependencies
        run: python -m pip install PyYAML
      - id: classify
        name: Classify semantic diff
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
          if [ -n "${BASE_SHA}" ] && git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            python scripts/ci/semantic_diff_classifier.py \
              --base "${BASE_SHA}" \
              --head "${HEAD_SHA}" \
              --objects architecture/money_path_objects.yaml \
              --mapping architecture/money_path_ci.yaml \
              --github-output "$GITHUB_OUTPUT" \
              --json-output semantic-classification.json \
              --fail-on-unregistered
          else
            python scripts/ci/semantic_diff_classifier.py \
              --objects architecture/money_path_objects.yaml \
              --mapping architecture/money_path_ci.yaml \
              --github-output "$GITHUB_OUTPUT" \
              --json-output semantic-classification.json \
              --fail-on-unregistered
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semantic-classification-${{ github.run_id }}
          path: semantic-classification.json
          if-no-files-found: ignore

  static-semantic:
    needs: classify-change
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install PyYAML
      - name: Schema smoke
        run: python scripts/check_schema_version.py
      - name: Money-path test quality metadata
        run: python scripts/ci/assert_test_quality.py

  selected-relationship-tests:
    needs: classify-change
    runs-on: ubuntu-latest
    timeout-minutes: 14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest-timeout pytest-rerunfailures PyYAML
      - name: Assert invariant coverage
        run: |
          python scripts/ci/assert_invariant_coverage.py \
            --invariants '${{ needs.classify-change.outputs.invariants }}' \
            --tests '${{ needs.classify-change.outputs.tests }}' \
            --objects architecture/money_path_objects.yaml \
            --mapping architecture/money_path_ci.yaml
      - name: Run selected relationship tests
        if: needs.classify-change.outputs.tests != ''
        env:
          SELECTED_TESTS: ${{ needs.classify-change.outputs.tests }}
        run: |
          python - <<'PY'
          import os
          import subprocess
          import sys

          tests = os.environ["SELECTED_TESTS"].split()
          if not tests:
              raise SystemExit("SELECTED_TESTS unexpectedly empty")
          raise SystemExit(subprocess.run(
              [sys.executable, "-m", "pytest", "-q", "--maxfail=8", "--timeout=300", *tests],
              check=False,
          ).returncode)
          PY
      - name: No money-path tests selected
        if: needs.classify-change.outputs.tests == ''
        run: echo "No money-path relationship tests selected for this diff."

  money-path-integration:
    needs: classify-change
    if: needs.classify-change.outputs.run_integration == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest-timeout hypothesis PyYAML
      - name: Run deterministic money path
        run: |
          pytest -q tests/money_path \
            --maxfail=5 \
            --timeout=300
