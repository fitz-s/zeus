name: secrets-scan

# Universal cross-agent equivalent of .claude/hooks/dispatch.py::secrets_scan.
# Local hook only fires for Claude Code Bash. CI runs against any agent that
# pushes (Codex CLI, Codex Cloud, Copilot agent, human, raw gh push). Required
# status check on `main` after first successful run.
#
# Authority basis: docs/operations/task_2026-05-07_hook_redesign_v2/PLAN.md
# (hook v2 ADVISORY-only; cross-agent enforcement moves to server CI).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secrets-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks (REQUIRED)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GATE_OWNER: "live-launch infra (Fitz)"
      GATE_RATIONALE: "Cross-agent secrets leak prevention. The local Claude Code hook (.claude/hooks/dispatch.py::secrets_scan) does not fire for Codex CLI / Codex Cloud / Copilot / direct gh push paths. Server-side gitleaks is the only universal control surface."
      GATE_REVIEW_CONDITION: "Review on gitleaks version bump or if false-positive rate exceeds 5%. Sunset only if a stricter universal secrets scanner replaces this lane; do not retire while it remains the only cross-agent gate."
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks (SHA256-verified)
        env:
          GITLEAKS_VERSION: "8.30.1"
          # SHA256 of gitleaks_8.30.1_linux_x64.tar.gz from upstream checksums.txt.
          # Bump version + SHA together. Pinned to defeat tarball substitution.
          # 8.21.2 had a confirmed bug: [[allowlists]] entries were silently ignored
          # in full-history (git-log) scan mode. 8.30.1 fixes this — allowlists now
          # apply correctly in both PR-diff and push/full-history scan paths.
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          set -euo pipefail
          TARBALL=/tmp/gitleaks.tgz
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o "${TARBALL}"
          echo "${GITLEAKS_SHA256}  ${TARBALL}" | sha256sum -c -
          tar -xz -C /tmp -f "${TARBALL}" gitleaks
          /tmp/gitleaks version
      - name: Scan diff (PR) or full history (push)
        run: |
          set -euo pipefail
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch --depth=50 origin "${GITHUB_BASE_REF}"
            /tmp/gitleaks detect \
              --source . \
              --redact \
              --no-banner \
              --log-opts="origin/${GITHUB_BASE_REF}..HEAD"
          else
            /tmp/gitleaks detect \
              --source . \
              --redact \
              --no-banner
          fi
