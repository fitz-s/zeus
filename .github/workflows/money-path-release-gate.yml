name: money-path-release-gate

# Stable required-check identity for branch protection. The check proves the
# single live implementation and its executable safety contracts directly;
# there is no paper path, stage ladder, or submit-disabled rehearsal.
on:
  pull_request:
    branches: [live]
    paths:
      - "src/**"
      - "scripts/check_single_live_semantics.py"
      - "tests/test_single_live_semantics.py"
      - "tests/test_money_path_lifecycle_replay.py"
      - "tests/test_pre_existing_failure_registry.py"
      - "tests/test_monitor_refresh_nowcast_wiring.py"
      - "tests/test_strategy_profile_registry.py"
      - "tests/test_executable_market_snapshot.py"
      - "tests/test_market_scanner_negrisk.py"
      - "tests/test_decision_seq_cross_table_no_collision.py"
      - "tests/test_no_trade_events_check_accepts_all_shoulder_reasons.py"
      - "tests/state/test_schema_current_invariant.py"
      - "architecture/script_manifest.yaml"
      - "architecture/test_topology.yaml"
      - "architecture/pre_existing_failure_registry.yaml"
      - "architecture/db_table_ownership.yaml"
      - ".github/workflows/money-path-release-gate.yml"
  push:
    branches: [live]
    paths:
      - "src/**"
      - "scripts/check_single_live_semantics.py"
      - "tests/test_single_live_semantics.py"
      - ".github/workflows/money-path-release-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: money-path-release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  money-path-release-gate:
    name: money-path-release-gate (required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Prepare isolated settings
        run: test -f config/settings.json || cp config/settings.example.json config/settings.json

      - name: Check pinned schema contract
        run: python scripts/check_schema_fingerprint.py

      - name: Prove one live implementation
        run: python scripts/check_single_live_semantics.py

      - name: Run executable money-path antibodies
        run: |
          pytest -q \
            tests/test_single_live_semantics.py \
            tests/test_executable_market_snapshot.py \
            tests/test_market_scanner_negrisk.py \
            tests/test_decision_seq_cross_table_no_collision.py \
            tests/test_no_trade_events_check_accepts_all_shoulder_reasons.py \
            tests/state/test_schema_current_invariant.py \
            tests/test_money_path_lifecycle_replay.py \
            tests/test_pre_existing_failure_registry.py \
            tests/test_monitor_refresh_nowcast_wiring.py \
            tests/test_strategy_profile_registry.py
