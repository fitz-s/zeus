name: money-path-release-gate

# Stable required-check identity for branch protection. The check proves the
# single live implementation and its executable safety contracts directly;
# there is no paper path, stage ladder, or submit-disabled rehearsal.
on:
  pull_request:
    branches: [live]
  push:
    branches: [live]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: money-path-release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  money-path-release-gate:
    name: money-path-release-gate (required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Prepare isolated settings
        run: test -f config/settings.json || cp config/settings.example.json config/settings.json

      - name: Check pinned schema contract
        run: python scripts/check_schema_fingerprint.py

      - name: Prove one live implementation
        run: python scripts/check_single_live_semantics.py

      - name: Run executable money-path antibodies
        run: |
          pytest -q \
            tests/test_single_live_semantics.py \
            tests/test_single_live_semantics_migration.py \
            tests/state/test_table_registry_coherence.py \
            tests/strategy/test_single_count_uncertainty.py \
            tests/engine/test_multiwinner_wealth_composition.py \
            tests/engine/test_native_holdings.py \
            tests/test_no_aifs_module_resurrection.py \
            tests/calibration/test_scaled_normal_uniform_q_builder.py \
            tests/test_hk_settlement_preimage_contract.py \
            tests/test_path_b_qlcb_modal_collapse_regression.py \
            tests/decision/test_payoff_vector_edge.py \
            tests/test_backtest_purpose_contract.py \
            tests/test_backtest_skill_economics.py \
            tests/test_replay_learning_authority.py \
            tests/test_riskguard_daily_loss_realized_basis.py
