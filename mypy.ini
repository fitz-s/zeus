# Created: 2026-05-06
# Last reused or audited: 2026-05-06
# Authority basis: IMPLEMENTATION_PLAN §6 Gate 2 C-6;
#                  RISK_REGISTER R3 mitigation (type-checker enforces LiveAuthToken phantom)
#
# Gate 2 mypy configuration.
# strict = true for the Gate 2 execution modules so phantom-type violations
# fail CI.  The rest of the codebase uses permissive defaults (existing code
# was not authored under strict mypy; adding strict project-wide would create
# noise).  Per-module overrides use [[mypy-src.execution.*]] sections.

[mypy]
python_version = 3.11
ignore_missing_imports = True

# ---------------------------------------------------------------------------
# Gate 2 enforcement modules — strict per IMPLEMENTATION_PLAN §6 C-6
# ---------------------------------------------------------------------------

[mypy-src.execution.live_executor]
strict = True
warn_return_any = True
disallow_untyped_defs = True
disallow_any_generics = True

[mypy-src.execution.venue_adapter]
strict = True
warn_return_any = True
disallow_untyped_defs = True
disallow_any_generics = True

[mypy-src.execution.shadow_executor]
strict = True
warn_return_any = True
disallow_untyped_defs = True
disallow_any_generics = True

[mypy-src.execution.executor]
disallow_untyped_defs = False
warn_return_any = False
