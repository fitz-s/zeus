schema_version: 2
metadata:
  updated: '2026-06-23'
  owner: docs authority isolation rebuild
  purpose: >
    Machine registry for dense module books, scoped module routers, and module-level
    law/current-fact/test dependencies. This manifest routes cognition only; it does
    not create a second authority plane and it must not point default agents into
    packet, consult, PR review, report, rebuild, or dated evidence material.
  status: active

module_policy:
  default_read_all_modules: false
  authority_plane: false
  law_dependency_rule: >
    Law dependencies must be active authority files or machine manifests. Historical
    packet/evidence/report/rebuild files are forbidden here as law dependencies.
  current_fact_rule: >
    Current facts may reference only operations current pointer files and must be
    task-required/fresh. Module books must not embed current runtime facts.
  evidence_rule: >
    Evidence/report/archive/rebuild references may appear only inside a focused task
    or archive registry, never as default module boot dependencies.

shared_law_dependencies:
  - docs/authority/zeus_current_architecture.md
  - docs/authority/zeus_current_delivery.md
  - architecture/invariants.yaml
  - architecture/negative_constraints.yaml
  - architecture/fatal_misreads.yaml
  - architecture/db_table_ownership.yaml
  - architecture/money_path_objects.yaml

