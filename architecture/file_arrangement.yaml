schema_version: 1
metadata:
  created: "2026-05-22"
  owner_packet: "docs-convergence-20260522 PR-T0 advisory file-arrangement kernel"
  enforcement: data_only   # workspace-routing-redesign S7 (PLAN §5): was "advisory"
  not_authority_over:
    - runtime code
    - canonical DB truth
    - live state
  note: >
    PURE DATA TABLE. This manifest declares WHERE each file kind belongs; it does
    not itself enforce. The write-router route_write (.claude/hooks/route_write.py)
    consumes these canonical_path / legacy_paths at the write boundary (silent-route
    / nudge). The prior "enforcement is by critic-agent review only" concept is
    RETIRED 2026-06-14 — placement is structural now, not a review checklist. The
    topology H5-H8 docs-checks remain only as a once-per-PR/CI backstop for residue
    route_write cannot see (raw mkdir / shell > redirect outside the Write tool).

active_operations_package:
  pointer_file: docs/operations/current_state.md
  manifest: docs/operations/current/package.yaml
  new_top_level_operations_task_default: disallow_advisory
  human_override_allowed: true

# ORGANIZING PRINCIPLE (workspace-routing-redesign, operator-decided 2026-06-14):
# BY-WORK, not by-kind. Every mission lives in ONE self-contained folder
# `docs/operations/current/<work>/` holding ALL its artifacts together
# (PLAN.md, scope.yaml, evidence/, report.md, closeout.md, agent_runtime/).
# `current/` means ONLY active missions; finished work leaves current/ via the
# 2-stage lifecycle (current/<work>/ -> docs/archive/<work>/, operator-gated
# `zpkt close`, reference-checked — never auto-bulldoze). Authority basis +
# work-name resolution: docs/operations/current/workspace-routing-redesign/PLAN.md
# §3/§4. legacy_paths retain the prior BY-KIND layout (current/plans/<slug>.md,
# current/evidence/<slug>/, ...) so existing files + zpkt's current scheme stay
# recognized until the S6 migration regroups them into by-work folders.
artifact_kinds:
  - id: operation_plan
    canonical_path: "docs/operations/current/<work>/PLAN.md"
    authority: true
    legacy_paths:
      - "docs/operations/current/plans/<slug>/PLAN.md"
      - "docs/operations/current/plans/<slug>.md"
      - "docs/operations/task_*_*/PLAN.md"
      - "docs/operations/task_*_*/*.md"

  - id: operation_scope
    canonical_path: "docs/operations/current/<work>/scope.yaml"
    authority: true
    note: sibling scope.yaml next to PLAN.md in the work folder
    legacy_paths:
      - "docs/operations/current/plans/<slug>/scope.yaml"
      - "docs/operations/task_*_*/scope.yaml"

  - id: operation_evidence
    canonical_path: "docs/operations/current/<work>/evidence/<file>"
    authority: false
    legacy_paths:
      - "docs/operations/current/evidence/<slug>/**"
      - "docs/operations/task_*_*/evidence/**"
      - "docs/operations/task_*_*/*_EVIDENCE*"

  - id: operation_report
    canonical_path: "docs/operations/current/<work>/report.md"
    authority: false
    note: generated report; must declare non-authority at top
    legacy_paths:
      - "docs/operations/current/reports/<slug>.md"
      - "docs/operations/task_*_*/*_REPORT*"
      - "docs/operations/task_*_*/reports/*.md"

  - id: operation_closeout
    canonical_path: "docs/operations/current/<work>/closeout.md"
    authority: false
    note: writing closeout.md triggers the 2-stage lifecycle (zpkt close)
    legacy_paths:
      - "docs/operations/current/closeouts/<slug>_<date>.md"
      - "docs/operations/task_*_*/closeout*.md"

  - id: agent_runtime_capsule
    canonical_path: "docs/operations/current/<work>/agent_runtime/<ts>_<slug>.md"
    authority: false
    legacy_paths:
      - "docs/operations/current/agent_runtime/capsules/<ts>_<slug>.md"
      - "docs/operations/task_*_*/capsules/*.md"
      - ".omx/context/**/*.md"

  - id: active_task_ledger
    # Package-level ledger stays at current/task.md (referenced by current_state.md
    # + topology); a work folder MAY also carry its own current/<work>/task.md.
    canonical_path: "docs/operations/current/task.md"
    authority: false
    legacy_paths:
      - "docs/operations/current/<work>/task.md"
      - "docs/operations/task_*_*/task.md"

  - id: operation_archived_work
    canonical_path: "docs/archive/<work>/"
    authority: false
    note: >
      Terminal home of a finished work folder (2-stage lifecycle stage 2).
      A whole current/<work>/ tree is git-mv'd here, intact, by `zpkt close`.

  - id: current_pointer
    canonical_path: "docs/operations/current_state.md"
    authority: true
    note: single pointer; must name the active package

  - id: known_gap
    canonical_path: "docs/to-do-list/known_gaps.md"
    authority: false

  - id: durable_reference
    canonical_path: "docs/reference/<topic>.md"
    authority: false

  - id: authority_law
    canonical_path: "docs/authority/<topic>.md"
    authority: true

  - id: generated_report
    canonical_path: "docs/reports/<slug>.md"
    authority: false
    note: must declare non-authority; generated content only

  - id: runtime_scratch
    canonical_path: ".omx/"
    authority: false
    note: also state/ for DB-backed scratch; both are non-authority

rules:
  - id: no_new_top_level_operation_task_by_default
    severity: warn
    blocking: false
    description: >
      New docs/operations/task_<date>_<slug>/ top-level dirs are advisory-discouraged.
      Use the by-work folder docs/operations/current/<work>/ instead.
      Human override is allowed; this is an advisory only.

  - id: current_state_must_point_to_active_package
    severity: warn
    blocking: false
    description: >
      docs/operations/current_state.md should name the active package manifest
      at docs/operations/current/package.yaml.
      Advisory when current/ does not yet exist.

  - id: root_task_must_be_pointer_or_named_active
    severity: warn
    blocking: false
    description: >
      A docs/operations/task_<date>_<slug>/ directory at the root level should
      either be named as the active package in current_state.md or migrated under
      docs/operations/current/.

  - id: generated_report_must_declare_non_authority
    severity: warn
    blocking: false
    description: >
      Files classified as generated_report or operation_report should include an
      explicit non-authority marker near the top (e.g. "authority: false" or
      "This is a generated report and is not an authority source.").

  - id: plan_requires_scope_sidecar
    severity: warn
    blocking: false
    description: >
      An operation_plan file (PLAN.md) should have a sibling scope.yaml in the
      same directory. Advisory when missing.

  - id: operation_evidence_must_be_under_current_or_archive
    severity: warn
    blocking: false
    description: >
      Evidence files should live under the work folder
      docs/operations/current/<work>/evidence/ or docs/archive/<work>/evidence/.
      Legacy by-kind (current/evidence/<slug>/) and task_*_*/evidence/ paths are
      recognized and not double-warned (S6 migration regroups them by-work).
