# Created: 2026-05-16
# Last reused or audited: 2026-06-08 (P4 fix: orphan-check antibody now derives the
#   state-machine poller naming convention from this file's required_pollers ids; the
#   operator_runbook references are verified to resolve to files on disk.
#   Authority basis: docs/architecture/system_decomposition_plan.md §8 Step 2.)
# Authority basis: docs/archive/2026-Q2/task_2026-05-16_deep_alignment_audit/SCAFFOLD_F14_F16.md §G.2 + §K.6 v5
#   + 守護 2026-06-03: harvester (REDEEM_INTENT_CREATED producer) added to required_pollers
#     so the boot guard enforces its presence in live modes (memory #56 Shanghai cca68b44).
#
# Cascade liveness contract — the registry of state-machine tables in src/
# that REQUIRE a scheduled APScheduler poller to drive them, plus optional
# terminal-states-with-operator-action fields for documented operator-completion
# paths.
#
# Antibody: tests/test_cascade_liveness_contract.py + src/main.py's
# _assert_cascade_liveness_contract() jointly enforce that every entry here
# has a registered poller at scheduler boot AND that every state listed in
# terminal_states_with_operator_action has a transition INTO it from src/
# (verified via ast.parse walk).
#
# Adding a new state machine: add the entry here; register the poller in
# src/main.py; add the tick body function; if the state machine has an
# operator-completion step, add terminal_states_with_operator_action with
# operator_runbook + cli_invocation fields.

state_machines:
  - table: settlement_commands
    db: trades
    intent_states: [REDEEM_INTENT_CREATED, REDEEM_RETRYING]
    terminal_states:
      - REDEEM_CONFIRMED
      - REDEEM_FAILED
      - REDEEM_REVIEW_REQUIRED
    terminal_states_with_operator_action:
      - state: REDEEM_OPERATOR_REQUIRED
        max_age_hours: 24
        operator_runbook: docs/archive/2026-Q2/task_2026-05-16_deep_alignment_audit/KARACHI_2026_05_17_MANUAL_FALLBACK.md
        escalation_action: "Path C trigger per SCAFFOLD §I.4 if exceeded; arm manual fallback runbook §3"
        cli_invocation: "python -m scripts.operator_record_redeem <condition_id> <tx_hash>"
    required_pollers:
      # 守護 (2026-06-03): the PRODUCER of REDEEM_INTENT_CREATED. Reads VERIFIED
      # forecasts.settlement_outcomes, marks settled positions closed, and enqueues
      # the redeem intent the submitter/reconciler below consume. Without it
      # scheduled in EDLI modes, the consumers sit idle forever (memory #56,
      # Shanghai cca68b44 settled-but-active). mode=producer (NOT liveness_only:
      # it drives _settle_positions state transitions). Registration gate +
      # boot-recovery share src/main.py:_harvester_should_register.
      # PROCESS-TOPOLOGY REFACTOR P4 (2026-06-08, system_decomposition_plan §8 Step 2):
      # harvester + redeem pollers LIFTED out of the order daemon into the P4
      # post-trade-capital daemon. owner repointed to
      # src/execution/post_trade_capital.py so the boot guard + orphan-check resolve
      # against the new host process; the P4 daemon carries _assert_cascade_liveness_contract
      # for the pollers it owns (owner contains "post_trade_capital").
      - id: harvester
        produced_states: [REDEEM_INTENT_CREATED]
        owner: src/execution/post_trade_capital.py:_harvester_cycle
        owner_daemon: post_trade_capital
        mode: producer
      # redeem_submitter DELETED 2026-07-08 (R6-a): dead redeem-submission
      # machinery (Zeus never submits redeem tx, operator law 2026-06-10) --
      # it already unconditionally calm-skipped every cycle
      # (redeem_submission_allowed() is always False). REDEEM_INTENT_CREATED
      # rows now intentionally sit unconsumed by any autonomous poller; the
      # existing REDEEM_OPERATOR_REQUIRED terminal_states_with_operator_action
      # entry above (operator_runbook + cli_invocation) is the accounting
      # path for external/manual redemption.
      - id: redeem_reconciler
        watched_states: [REDEEM_TX_HASHED]
        owner: src/execution/post_trade_capital.py:_redeem_reconciler_cycle
        owner_daemon: post_trade_capital
        mode: reconciler

  - table: wrap_unwrap_commands
    db: world
    # source_module: path to the file whose AST is walked for _transition calls.
    # test_cascade_liveness_contract.py uses this to validate terminal_states_with_operator_action.
    source_module: src/execution/wrap_unwrap_commands.py
    intent_states: [WRAP_REQUESTED]
    terminal_states:
      - WRAP_CONFIRMED
      - WRAP_FAILED
    terminal_states_with_operator_action:
      - state: WRAP_FAILED
        max_age_hours: 24
        operator_runbook: docs/archive/2026-Q2/task_2026-05-16_deep_alignment_audit/KARACHI_2026_05_17_MANUAL_FALLBACK.md
        escalation_action: "Investigate wrap failure; re-queue via enqueue_wrap_if_balance_above_threshold after root cause resolved"
        cli_invocation: "python -m scripts.operator_record_wrap <command_id> --resolution <note>"
    required_pollers:
      # PROCESS-TOPOLOGY REFACTOR P4 (2026-06-08, system_decomposition_plan §8 Step 2):
      # wrap pollers LIFTED into the P4 post-trade-capital daemon (owner repointed to
      # src/execution/post_trade_capital.py).
      - id: wrap_intent_creator
        watched_states: [WRAP_REQUESTED]
        owner: src/execution/post_trade_capital.py:_wrap_intent_creator_cycle
        owner_daemon: post_trade_capital
        mode: enqueuer
      - id: wrap_submitter
        watched_states: [WRAP_REQUESTED, WRAP_APPROVED]
        owner: src/execution/post_trade_capital.py:_wrap_submitter_cycle
        owner_daemon: post_trade_capital
        mode: submitter
      - id: wrap_reconciler
        watched_states: [WRAP_APPROVE_TX_HASHED, WRAP_TX_HASHED]
        owner: src/execution/post_trade_capital.py:_wrap_reconciler_cycle
        owner_daemon: post_trade_capital
        mode: reconciler
