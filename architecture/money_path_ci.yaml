schema_version: 1
metadata:
  created: "2026-05-21"
  owner: "Zeus CI infrastructure"
  purpose: >
    Route semantic diff classifications to required invariants and trusted
    relationship tests. This is the machine gate behind the rule: a money-path
    change must say which economic object changed, which invariant it touched,
    and which relationship test proves the invariant still holds.

risk_order: [P3, P2, P1, P0]

risk_rules:
  force_integration_if_changed:
    - src/engine/evaluator.py
    - src/engine/cycle_runtime.py
    - src/execution/**
    - src/venue/**
    - src/data/market_scanner.py
    - src/contracts/executable_market_snapshot.py
    - src/state/db.py
    - src/state/schema/**
    - scripts/migrations/**
    - scripts/migrate_*.py
  schema_change_requires: [MP-SCH-001, MP-SCH-002]
  new_state_requires: [transition_test, reducer_test, report_eligibility_test]
  new_side_effect_requires: [MP-SIDE-001, MP-SIDE-002, MP-SIDE-003]
  new_external_source_requires: [MP-EXT-001, MP-EXT-002]
  new_economic_field_requires: [MP-ECO-001, MP-ECO-002]

invariants:
  MP-MD-001:
    description: "NegRisk/standard market tradeability cannot drift between scanner and executable snapshot."
    tests:
      - tests/money_path/test_001_negrisk_tradeability_snapshot_submit.py
      - tests/test_market_scanner_negrisk.py
      - tests/test_executable_market_snapshot.py
  MP-MD-002:
    description: "Market identity fields round-trip without label/punctuation inference."
    tests: [tests/test_market_scanner_provenance.py]
  MP-MD-003:
    description: "Archived/closed markets cannot become submit-eligible through fallback."
    tests: [tests/test_scanner_archived_filter.py]
  MP-ORD-001:
    description: "Terminal fill cannot be demoted by later weaker venue facts."
    tests:
      - tests/money_path/test_002_execution_lifecycle_replay.py
      - tests/test_order_truth_reducer.py
  MP-ORD-002:
    description: "Positive trade fact creates exposure exactly once."
    tests: [tests/test_order_truth_reducer.py, tests/test_exchange_reconcile.py]
  MP-ORD-003:
    description: "Unknown side effect is not replayed until venue absence proof exists."
    tests: [tests/test_command_recovery.py, tests/test_unknown_side_effect.py]
  MP-ORD-004:
    description: "Partial with remainder remains pending exposure."
    tests: [tests/test_order_truth_reducer.py]
  MP-RED-001:
    description: "Redeem receipt classifier preserves NegRisk vs standard CTF route semantics."
    tests:
      - tests/money_path/test_003_redeem_receipt_classifier.py
      - tests/test_polymarket_v2_adapter_negrisk_redeem.py
  MP-RED-002:
    description: "Redeem confirmed/review/operator states have non-overloaded report eligibility."
    tests: [tests/test_harvester_settlement_redeem.py, tests/test_redeem_cascade_liveness.py]
  MP-SCH-001:
    description: "Schema migrations cannot fabricate historical authority."
    tests:
      - tests/money_path/test_004_schema_live_failclosed.py
      - tests/test_schema_introspection.py
      - tests/state/test_schema_current_invariant.py
  MP-SCH-002:
    description: "Schema version/hash and DB-owner boundaries move together."
    tests: [tests/state/test_schema_current_invariant.py, tests/test_inv37_writer_schema_qualification.py]
  MP-ECO-001:
    description: "Display/current/market price aliases cannot drive executable edge."
    tests: [tests/test_execution_price.py, tests/test_executable_ev_replay.py]
  MP-ECO-002:
    description: "Worse spread/depth/fee/passive-fill inputs cannot increase Kelly size."
    tests: [tests/test_kelly_cascade_bounds.py, tests/test_phase_aware_kelly_live.py]
  MP-EXT-001:
    description: "External provider drift has contract fixtures and stale/unreachable behavior."
    tests: [tests/test_market_scanner_provenance.py, tests/test_tigge_schema_contract.py]
  MP-EXT-002:
    description: "Live external authority fails closed instead of promoting fallback truth."
    tests: [tests/test_live_readiness_gates.py, tests/test_source_run_schema.py]
  MP-SIDE-001:
    description: "Persist intent before side effect."
    tests: [tests/test_executor_command_split.py, tests/test_command_recovery.py]
  MP-SIDE-002:
    description: "Side effect has idempotency key and unknown-side-effect recovery."
    tests: [tests/test_unknown_side_effect.py, tests/test_command_recovery.py]
  MP-SIDE-003:
    description: "Recovery/report eligibility cannot confuse pending, terminal, and review states."
    tests: [tests/test_exchange_reconcile.py, tests/test_harvester_settlement_redeem.py]
  MP-CI-001:
    description: "Money-path semantic gate changes run self-defense tests."
    tests:
      - tests/test_money_path_semantic_ci.py
      - tests/money_path/test_001_negrisk_tradeability_snapshot_submit.py
      - tests/money_path/test_004_schema_live_failclosed.py

  MP-LEA-002:
    description: "Regret decompositions joined through decision_events.decision_event_id to prevent cross-strategy contamination via shared experiment_id."
    tests:
      - tests/analysis/test_regret_decision_event_join.py
      - tests/analysis/test_regret_decomposer.py
      - tests/test_p1_findings_evidence_risk.py
  MP-OBS-001:
    description: "B6 live-submit probe: submit→SUBMIT_REQUESTED→place_limit_order called→SUBMIT_ACKED durable→pending_entry projection→crash-then-reconcile resolves ACKED with no duplicate submit."
    tests:
      - tests/execution/test_live_submit_probe_chain.py
  MP-OBS-002:
    description: "B6 dead-submit detection: armed_live (global_allow_submit=True AND final_intents_built>=1) with zero SUBMIT_REQUESTED/SUBMIT_ACKED receipts in last 30 min escalates infrastructure_level to RED."
    tests:
      - tests/observability/test_status_red_on_armed_live_no_submit_receipts.py
  MP-STR-001:
    description: "strategy_key is the sole attribution identity; routing decisions from strategy registry, never ad-hoc from condition_id or market type."
    tests:
      - tests/test_evaluator_strategy_key_failclosed.py
      - tests/test_architecture_contracts.py
  MP-STR-002:
    description: "Offline decision evidence remains isolated from live evidence queries."
    tests:
      - tests/analysis/test_evidence_report_cohort_scope.py
      - tests/test_p1_findings_evidence_risk.py
  MP-RSK-001:
    description: "Cluster exposure cap checks use all dimensions: weather_family_key, outcome_label (YES/NO), strategy_key. Collapsing dimensions allows factor-2 over-concentration."
    tests:
      - tests/test_cluster_exposure_shrunk.py
      - tests/test_inv_cluster_cap_short_circuits_kelly_compute.py
segments:
  semantic_ci_self_defense:
    invariant_ids: [MP-CI-001]
    files:
      - architecture/money_path_objects.yaml
      - architecture/money_path_ci.yaml
      - architecture/test_quality.yaml
      - scripts/ci/**
      - .github/workflows/money-path-required.yml
      - .github/copilot-instructions.md
      - .github/instructions/**
      - tests/money_path/**
      - tests/test_money_path_semantic_ci.py
      - tests/ci/test_copilot_instruction_contract.py
    relationship_tests:
      - tests/test_money_path_semantic_ci.py
      - tests/money_path/test_001_negrisk_tradeability_snapshot_submit.py
      - tests/money_path/test_004_schema_live_failclosed.py
  market_discovery:
    invariant_ids: [MP-MD-001, MP-MD-002, MP-MD-003]
    files:
      - src/data/market_scanner.py
      - src/contracts/executable_market_snapshot.py
      - src/state/snapshot_repo.py
    relationship_tests:
      - tests/money_path/test_001_negrisk_tradeability_snapshot_submit.py
      - tests/test_market_scanner_negrisk.py
      - tests/test_market_scanner_provenance.py
      - tests/test_executable_market_snapshot.py
    future_object_rules:
      new_external_source_id: requires_source_authority_test
      new_market_identity_field: requires_identity_roundtrip_test
  execution_lifecycle:
    invariant_ids: [MP-ORD-001, MP-ORD-002, MP-ORD-003, MP-ORD-004]
    files:
      - src/execution/**
      - src/venue/**
      - src/state/venue_command_repo.py
    relationship_tests:
      - tests/money_path/test_002_execution_lifecycle_replay.py
      - tests/test_order_truth_reducer.py
      - tests/test_command_recovery.py
      - tests/test_exchange_reconcile.py
    future_object_rules:
      new_command_state: requires_state_machine_model_test
      new_order_fact_state: requires_reducer_property_test
      new_side_effect_call: requires_persist_before_side_effect_test
  settlement_redeem:
    invariant_ids: [MP-RED-001, MP-RED-002, MP-SIDE-001]
    files:
      - src/execution/harvester.py
      - src/venue/**
      - scripts/operator_record_redeem.py
      - scripts/run_redeem_reconcile_with_onchain_proof.py
    relationship_tests:
      - tests/money_path/test_003_redeem_receipt_classifier.py
      - tests/test_harvester_settlement_redeem.py
      - tests/test_polymarket_v2_adapter_negrisk_redeem.py
      - tests/test_redeem_cascade_liveness.py
    future_object_rules:
      new_settlement_state: requires_receipt_classifier_test
      new_error_code: requires_report_eligibility_test
  schema_semantics:
    invariant_ids: [MP-SCH-001, MP-SCH-002]
    files:
      - src/state/db.py
      - src/state/schema/**
      - scripts/migrations/**
      - scripts/migrate_*.py
    relationship_tests:
      - tests/money_path/test_004_schema_live_failclosed.py
      - tests/state/test_schema_current_invariant.py
      - tests/test_schema_introspection.py
      - tests/test_inv37_writer_schema_qualification.py
    future_object_rules:
      new_db_column: requires_migration_semantic_test
      new_authority_default: forbidden_without_explicit_policy
  edli_event_sourcing:
    invariant_ids: [MP-SCH-001, MP-SCH-002, MP-ECO-001]
    files:
      - src/events/**
      - src/state/schema/opportunity_events_schema.py
      - src/state/schema/opportunity_event_processing_schema.py
      - src/state/schema/event_dead_letters_schema.py
      - src/state/schema/execution_feasibility_evidence_schema.py
      - src/state/schema/no_trade_regret_events_schema.py
      - src/state/schema/edli_live_cap_usage_schema.py
      - src/state/schema/edli_live_order_events_schema.py
      - src/state/schema/edli_live_profit_audit_schema.py
      - src/events/live_cap.py
      - src/events/live_order_aggregate.py
      - src/events/live_profit_audit.py
      - src/decision_kernel/claims.py
      - src/decision_kernel/verifier.py
      - src/decision_kernel/ledger.py
    relationship_tests:
      - tests/events/test_opportunity_event.py
      - tests/events/test_event_store_idempotency.py
      - tests/state/test_edli_table_ownership.py
      - tests/events/test_day0_extreme_updated_trigger.py
      - tests/strategy/live_inference/test_live_bin_inference.py
      - tests/strategy/live_inference/test_executable_cost.py
      - tests/strategy/live_inference/test_trade_score.py
      - tests/events/test_market_channel_ingestor.py
      - tests/events/test_reactor.py
      - tests/events/test_live_cap.py
      - tests/events/test_live_order_aggregate.py
      - tests/events/test_live_profit_audit.py
      - tests/engine/test_event_reactor_no_bypass.py
      - tests/strategy/live_inference/test_no_trade_regret.py
      - tests/analysis/test_event_opportunity_report.py
      - tests/money_path/test_edli_online_invariants.py
      - tests/money_path/test_edli_live_readiness.py
      - tests/money_path/test_edli_order_lifecycle.py
    future_object_rules:
      new_event_type: requires_idempotency_and_replay_order_test
      mutable_event_fact: forbidden_without_explicit_policy
  edli_live_bridge_authority:
    invariant_ids: [MP-ORD-003, MP-SIDE-001, MP-SIDE-002, MP-EXT-002]
    files:
      - src/main.py
      - src/engine/event_reactor_adapter.py
      - src/events/live_order_aggregate.py
      - src/events/live_cap.py
      - src/events/triggers/user_channel_ingestor.py
      - tests/money_path/test_edli_live_readiness.py
      - tests/events/test_live_order_aggregate.py
      - tests/events/test_reactor.py
    relationship_tests:
      - tests/money_path/test_edli_live_readiness.py
      - tests/events/test_live_order_aggregate.py
      - tests/events/test_reactor.py
    future_object_rules:
      new_pre_submit_state: requires_authority_and_fail_closed_test
      live_order_aggregate_mutation: requires_replay_projection_test
  economic_semantics:
    invariant_ids: [MP-ECO-001, MP-ECO-002]
    files:
      - src/engine/evaluator.py
      - src/risk_allocator/**
      - src/strategy/**
      - src/contracts/**
    relationship_tests:
      - tests/test_execution_price.py
      - tests/test_executable_ev_replay.py
      - tests/test_kelly_cascade_bounds.py
      - tests/test_phase_aware_kelly_live.py
    future_object_rules:
      price_probability_assignment: requires_economic_isolation_test
  external_truth:
    invariant_ids: [MP-EXT-001, MP-EXT-002]
    files:
      - src/data/**
      - src/ingest/**
      - src/venue/**
    relationship_tests:
      - tests/test_market_scanner_provenance.py
      - tests/test_tigge_schema_contract.py
      - tests/test_source_run_schema.py
  learning_analysis:
    invariant_ids: [MP-LEA-002]
    files:
      - src/analysis/**
      - src/backtest/**
      - src/state/*experiment*.py
    relationship_tests:
      - tests/analysis/test_regret_decision_event_join.py
      - tests/analysis/test_regret_decomposer.py
      - tests/test_p1_findings_evidence_risk.py
  strategy_authority:
    invariant_ids: [MP-STR-001, MP-STR-002]
    files:
      - src/strategy/**
      - src/contracts/**
      - src/engine/evaluator.py
      - src/backtest/**
      - architecture/strategy_profile_registry.yaml
    relationship_tests:
      - tests/test_evaluator_strategy_key_failclosed.py
      - tests/test_architecture_contracts.py
      - tests/analysis/test_evidence_report_cohort_scope.py
    future_object_rules:
      new_strategy_dimension: requires_registry_first_architecture_review
      new_observation_source: requires_live_evidence_isolation_test
  risk_dimension:
    invariant_ids: [MP-RSK-001]
    files:
      - src/risk_allocator/**
      - src/strategy/**
    relationship_tests:
      - tests/test_cluster_exposure_shrunk.py
      - tests/test_inv_cluster_cap_short_circuits_kelly_compute.py
    future_object_rules:
      new_risk_dimension: requires_all_dimension_coverage_test
      collapsed_exposure_aggregation: forbidden_without_explicit_policy
