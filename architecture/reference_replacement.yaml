  - path: docs/evidence/
    default_read: false
    replacement_status: historical_only
    delete_allowed: false
    replaced_by:
      - docs/archive_registry.md
      - docs/authority/ARCHIVAL_RULES.md
    unique_remaining:
      - raw evidence and receipts
    allowed_action: retain_as_evidence
    rationale: Evidence is discoverable but never default law.

  - path: docs/reports/
    default_read: false
    replacement_status: historical_only
    delete_allowed: false
    replaced_by:
      - docs/archive_registry.md
      - docs/authority/ARCHIVAL_RULES.md
    unique_remaining:
      - interpreted historical reports and reviews
    allowed_action: retain_as_evidence
    rationale: Reports are history/evidence and must not authorize runtime.

  - path: docs/rebuild/
    default_read: false
    replacement_status: historical_only
    delete_allowed: false
    replaced_by:
      - docs/archive_registry.md
      - docs/authority/ARCHIVAL_RULES.md
    unique_remaining:
      - rebuild/consult implementation history
    allowed_action: retain_as_evidence
    rationale: Rebuild notes are non-default history. Current behavior must be code-proven.
