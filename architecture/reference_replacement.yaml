schema_version: 2
metadata:
  updated: '2026-06-23'
  owner: docs authority isolation rebuild
  purpose: >
    Replacement/demotion matrix for durable reference docs. This file prevents
    old bulky references, dated strategy papers, consults, reports, and packet
    evidence from remaining in the default agent boot path after their surviving
    content has been promoted into canonical references or machine manifests.

allowed_replacement_statuses:
  - not_replaced
  - partial_replacement_candidate
  - mostly_replaced
  - replaced
  - superseded_by_canonical
  - historical_only

allowed_actions:
  - keep_default
  - keep_conditional
  - demote_from_default_reads
  - retain_as_evidence
  - archive_after_closeout
  - delete_candidate_after_registry

required_entry_fields:
  - path
  - default_read
  - replacement_status
  - delete_allowed
  - replaced_by
  - unique_remaining
  - allowed_action
  - rationale

entries:
  - path: docs/reference/zeus_prediction_market_quant_reference.md
    default_read: true
    replacement_status: not_replaced
    delete_allowed: false
    replaced_by: []
    unique_remaining:
      - complete current deploy money-path reference
      - contract/source/q/decision/execution/lifecycle/data/docs isolation in one file
      - rebuild blueprint for zero-context agents
    allowed_action: keep_default
    rationale: >
      Canonical broad reference created by the docs authority isolation rebuild.
      This is the default reference when a task needs system-wide Zeus cognition.

  - path: docs/reference/zeus_domain_model.md
    default_read: false
    replacement_status: not_replaced
