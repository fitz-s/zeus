schema_version: 2
metadata:
  updated: '2026-06-23'
  owner: docs authority isolation rebuild
  purpose: >
    Replacement and demotion matrix for durable reference docs. Default routes may
    point only at active authority, canonical references, current-fact pointers, or
    machine manifests.

allowed_replacement_statuses:
  - not_replaced
  - partial_replacement_candidate
  - mostly_replaced
  - replaced
  - superseded_by_canonical
  - historical_only
allowed_actions:
  - keep_default
  - keep_conditional
  - demote_from_default_reads
  - retain_as_evidence
  - archive_after_closeout
  - delete_candidate_after_registry
required_entry_fields:
  - path
  - default_read
  - replacement_status
  - delete_allowed
  - replaced_by
  - unique_remaining
  - allowed_action
  - rationale

