      - fast orientation after the broad reference
    allowed_action: keep_conditional
    rationale: >
      Retained as focused domain model. It no longer carries stale dated strategy
      claims and is routed conditionally by docs/reference/AGENTS.md.

  - path: docs/reference/zeus_math_spec.md
