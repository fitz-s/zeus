#                  docs/operations/task_2026-05-15_runtime_improvement_engineering_package/01_topology_v_next/ZEUS_BINDING_LAYER.md
#
# PRODUCTION BINDING — P1.3 deliverable B.
# Replaces the stub shipped in P1.1.
#
# Contains:
#   - All 4 zeus.* intent extensions from ZEUS_BINDING_LAYER.md §2
#   - 14 profiles from §4 Coverage Map
#   - 14 hard_stop_paths from §3 Hard Safety Kernel Bindings
#   - 3 cohort declarations from §6
#   - 5 severity_overrides from §7
#   - 5 artifact_authority_status entries from §8
#   - companion_required: populated for P2 profiles (cohorts 3-4, lines 148-206)
#
# NOTE: companion_required is populated for P2 profiles; P2 packet is complete
# per topology_v_next_binding.yaml line 146. profile_loader tolerates unknown
# top-level keys (warn-don't-crash per §1.3).

project_id: zeus

# ---------------------------------------------------------------------------
# §2. Intent Extensions — zeus-namespaced project-specific intents
# ---------------------------------------------------------------------------
intent_extensions:
  - id: zeus.settlement_followthrough
    description: >
      Post-settlement data harvesting; resolves market outcomes against DB records.
      Does not change live pricing or position logic.
  - id: zeus.calibration_update
    description: >
      Update calibration pair records or model parameters in the forecasts DB.
      Requires proof that existing active Platt rows are not overwritten.
  - id: zeus.data_authority_receipt
    description: >
      Record a new verified data source or refresh an existing source-truth receipt.
      Read-only on all runtime tables; writes only to source_rationale surfaces.
  - id: zeus.topology_tooling
    description: >
      Modify topology_doctor.py, topology_doctor_digest.py, or supporting
      architecture YAMLs without touching any money-path source.

# ---------------------------------------------------------------------------
# §3 + §4. Coverage Map — profiles, orphaned paths, hard_stop_paths
# ---------------------------------------------------------------------------
coverage_map:
  profiles:
    # Agent runtime — topology tools and architecture YAMLs
    - id: agent_runtime
      patterns:
        - "architecture/task_boot_profiles.yaml"
        - "architecture/admission_severity.yaml"
        - "architecture/test_topology.yaml"
        - "scripts/topology_doctor.py"
        - "scripts/topology_doctor_digest.py"
        - "scripts/worktree_doctor.py"
        - "docs/operations/AGENTS.md"

    # Money path — pricing and contracts
    - id: money_path_pricing
      patterns:
        - "src/contracts/settlement_semantics.py"
        - "src/contracts/execution_price.py"
        - "src/contracts/venue_submission_envelope.py"
        - "src/contracts/fx_classification.py"
        - "src/engine/evaluator.py"

    # Money path — execution (also under hard_stop; changes here require governance)
    - id: money_path_execution
      patterns:
        - "src/execution/executor.py"
        - "src/execution/exit_triggers.py"
        - "src/execution/harvester.py"

    # Monitoring and observability
    - id: monitoring
      patterns:
        - "src/engine/monitor_refresh.py"
        - "src/observability/**"

    # Forecast pipeline — cycle runner and runtime
    - id: forecast_pipeline
      patterns:
        - "src/engine/cycle_runner.py"
        - "src/engine/cycle_runtime.py"

    # Calibration — Platt scaling and model parameters
    - id: calibration
      patterns:
        - "src/calibration/**"

    # Data ingestion — sources and ingestion pipeline
    - id: data_ingestion
      patterns:
        - "src/ingest/**"

    # State read model — DB access layer and table registry
    - id: state_read_model
      patterns:
        - "src/state/db.py"
        - "src/state/table_registry.py"
        - "src/state/**"

    # Config management — settings and config files
    - id: config_management
      patterns:
        - "config/settings.json"
        - "config/*.yaml"
        - "config/*.json"

    # Docs authority — reference docs and AGENTS.md
    - id: docs_authority
      patterns:
        - "docs/reference/**"
        - "AGENTS.md"
        - "docs/operations/AGENTS.md"

    # Test suite — all test files and fixtures
    - id: test_suite
      patterns:
        - "tests/test_*.py"
        - "tests/topology_v_next/**"
        - "tests/fixtures/**"

    # Scripts tooling — utility scripts
    - id: scripts_tooling
      patterns:
        - "scripts/*.py"
        - "scripts/*.sh"

    # Architecture docs — all architecture YAMLs and markdown specs
    - id: architecture_docs
      patterns:
        - "architecture/*.yaml"
        - "architecture/*.md"

    # Packet evidence — operation task docs
    - id: packet_evidence
      patterns:
        - "docs/operations/task_*/**.md"
        - "docs/operations/task_*/**.yaml"

    # ---------------------------------------------------------------------------
    # P2.1 companion_required profiles (SCAFFOLD §6 initial anchors)
    # TOPOLOGY BLOCKING anchor #1 — calibration weighting
    # ---------------------------------------------------------------------------
    - id: modify_calibration_weighting
      patterns:
        - "src/calibration/*.py"
        - "tests/test_calibration_*.py"
      companion_required:
        - "docs/reference/zeus_calibration_weighting_authority.md"
      companion_reason: >
        any change to calibration weighting must update the authority reference;
        otherwise the authority drift problem compounds (P8 HYP-B precedent)

    # TOPOLOGY BLOCKING anchor #2 — kelly sizing
    - id: modify_kelly_sizing
      patterns:
        - "src/strategy/kelly_*.py"
        - "tests/test_kelly_*.py"
      companion_required:
        - "docs/reference/zeus_kelly_asymmetric_loss_handoff.md"
      companion_reason: >
        P8 HYP-B precedent: kelly sizing changes drifted from the asymmetric
        loss handoff authority doc within 2 weeks of merge.

    # TOPOLOGY BLOCKING anchor #3 — vendor response (hotfix-prone; skip token declared)
    - id: modify_vendor_response
      patterns:
        - "src/data/vendor_response_*.py"
        - "src/ingest/vendor_response_*.py"
        - "tests/test_vendor_response_*.py"
      companion_required:
        - "docs/reference/zeus_vendor_change_response_registry.md"
      companion_skip_acknowledge_token: "COMPANION_SKIP_NEEDS_HUMAN_REVIEW=1"
      companion_reason: >
        Vendor change response edits frequently arrive as hotfixes with no
        time for doc-side coordination; skip token allows admission with
        audit trail for next-week digest review.

    # Cohort 4 verified drift #1 — data replay surface
    - id: modify_data_replay_surface
      patterns:
        - "src/data/replay_*.py"
        - "src/data/client_*.py"
        - "tests/test_data_*.py"
      companion_required:
        - "docs/reference/zeus_data_and_replay_reference.md"
      companion_reason: >
        data client surface is high-churn and the replay reference is exactly
        one of the authority docs that lags behind (Cohort 4 verified drift).

    # Cohort 4 verified drift #2 — risk strategy surface
    - id: modify_risk_strategy_surface
      patterns:
        - "src/risk_allocator/*.py"
        - "src/strategy/risk_*.py"
        - "tests/test_risk_*.py"
      companion_required:
        - "docs/reference/zeus_risk_strategy_reference.md"
      companion_reason: >
        risk strategy reference covers the Kelly sizing formula and edge decay
        model; separate from modify_kelly_sizing (asymmetric loss handoff doc).

  orphaned:
    - "tmp/**"
    - "*.bak.*"
    - "*.replaced"
    - "*.locked"
    - ".gitignore"
    - ".env*"

  hard_stop_paths:
    # Live side effects — any write here may trigger a live API call or position change
    - "src/execution/**"
    - "src/venue/**"
    - "src/riskguard/**"
    # Canonical truth — single source for domain facts
    - "architecture/source_rationale.yaml"
    - "architecture/city_truth_contract.yaml"
    - "architecture/fatal_misreads.yaml"
    - "architecture/db_table_ownership.yaml"
    # Schema migration — canonical store structural changes
    - "src/state/migrations/**"
    - "state/zeus-world.db"
    - "state/zeus-forecasts.db"
    # Lifecycle grammar
    - "src/control/**"
    - "src/supervisor_api/**"
    # Credentials and auth
    - "config/credentials/**"
    - ".claude/hooks/**"

# ---------------------------------------------------------------------------
# §6. Cohort Declarations
# ---------------------------------------------------------------------------
cohorts:
  - id: zeus.new_test_with_topology_registration
    description: >
      Every new tests/test_*.py file requires a companion entry in
      architecture/test_topology.yaml (trust policy). These two files form
      a cohort for create_new intent. Enforces the structural companion
      requirement that was previously a manual reminder.
    profile: test_suite
    intent_classes:
      - create_new
    files:
      - "tests/test_{new_module}.py"
      - "architecture/test_topology.yaml"

  - id: zeus.topology_tooling_with_severity
    description: >
      topology_doctor changes that add new issue codes must be paired with
      admission_severity.yaml updates. These two files form a cohort for
      agent_runtime modification intents.
    profile: agent_runtime
    intent_classes:
      - modify_existing
      - refactor
      - create_new
    files:
      - "scripts/topology_doctor_digest.py"
      - "architecture/admission_severity.yaml"

  - id: zeus.packet_plan_with_agents_update
    description: >
      New operation packet PLAN.md files must be paired with the operations
      AGENTS.md update. These two files form a cohort for create_new intent
      on planning packets.
    profile: packet_evidence
    intent_classes:
      - create_new
    files:
      - "docs/operations/task_*/PLAN.md"
      - "docs/operations/AGENTS.md"

# ---------------------------------------------------------------------------
# §7. Severity Overrides
# Zeus promotes several universal advisories to soft_block (live-money context).
# ---------------------------------------------------------------------------
severity_overrides:
  # Promoted from advisory → soft_block
  canonical_truth_adjacent: SOFT_BLOCK
  closed_packet_authority: SOFT_BLOCK
  high_fanout_file_unresolved: SOFT_BLOCK
  # Kept at advisory
  coverage_gap: ADVISORY
  companion_missing: ADVISORY

# ---------------------------------------------------------------------------
# §5. High-Fanout File Route Hints
# ---------------------------------------------------------------------------
high_fanout_hints:
  - file: "src/state/db.py"
    resolution:
      - intent: [zeus.calibration_update, zeus.settlement_followthrough]
        profile: state_read_model
        note: "DB read/query path; not schema change"
      - intent: [modify_existing, refactor]
        profile: state_read_model
        note: "Only state_read_model unless migration files also present"
      - intent: [create_new]
        profile: state_read_model
        note: "New DB utility; pair with test_suite companion requirement"

  - file: "src/engine/cycle_runtime.py"
    resolution:
      - intent: [audit, plan_only]
        profile: forecast_pipeline
      - intent: [modify_existing, hotfix]
        profile: forecast_pipeline
        note: "Core cycle path; requires evaluator proof questions if execution-path adjacent"

  - file: "src/observability/status_summary.py"
    resolution:
      - intent: [modify_existing, create_new]
        profile: monitoring

