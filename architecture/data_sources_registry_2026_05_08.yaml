  # ----------------------------------------------------------
  # 5. Weather Underground ICAO (Primary Observation — 48 cities)
  # ----------------------------------------------------------
  - id: wu_icao_history
    display_name: "Weather Underground ICAO Historical Observations"
    category: observation
    publisher: "The Weather Company / IBM (https://www.wunderground.com)"
    authority_urls:
      - "https://api.weather.com/v1/location/{ICAO}:9:{CC}/observations/historical.json"
      - "https://www.wunderground.com/history/daily/{CC}/{city}/{ICAO}"

    publication_schedule:
      description: >
        Near-real-time METAR-cadence (~30 min) observations. Historical endpoint
        returns sub-hourly observations for any past date. Live daily updates
        available within hours of each reading.
        Zeus fetches at local peak+4h window per city schedule
        (src/data/wu_scheduler.py). Public API key used (not secret).
      api_key_note: >
        Uses WU public web key _WU_PUBLIC_WEB_KEY embedded in WU's own
        browser UI. NOT a secret. [VERIFIED] src/data/daily_obs_append.py:117
        "Operator ruling 2026-04-21: wu key 是公开的."

    what_is_published:
      parameters_used_by_zeus:
        - "temp (°C or °F per unit_code): instantaneous temperature at observation time"
        - "valid_time_gmt: UTC epoch of observation"
      aggregation: >
        Zeus aggregates sub-hourly METAR observations into local-day max/min
        by bucketing all temp values to local-date using ZoneInfo, then taking
        MAX(temp) / MIN(temp) per city × local_date.
        [VERIFIED] src/data/daily_obs_append.py:234-246 _fetch_wu_icao_daily_highs_lows()

    scope_and_range:
      cities_count: 48  # [VERIFIED] python3 count: 48 wu_icao cities in config/cities.json
      coverage_type: "Per-ICAO-station point observation"
      endpoint_url_pattern: "https://api.weather.com/v1/location/{ICAO}:9:{CC}/observations/historical.json"  # [VERIFIED] daily_obs_append.py:119

    zeus_consumption:
      transport: "httpx.get with WU_API_KEY (public fallback) + WU_HEADERS [VERIFIED daily_obs_append.py:117-122]"
      ingest_path:
        - "live daily: src/data/daily_obs_append.py::append_wu_city() + daily_tick() [VERIFIED daily_obs_append.py:40]"
        - "live hourly: src/data/wu_hourly_client.py::fetch_wu_hourly() [VERIFIED wu_hourly_client.py:1]"
        - "schedule: src/data/wu_scheduler.py::WuDailyScheduler [VERIFIED daily_obs_append.py:34]"
        - "backfill daily: scripts/backfill_wu_daily_all.py [VERIFIED daily_obs_append.py:11]"
        - "meteostat fallback: src/data/meteostat_bulk_client.py (sparse WU stations, historical only) [VERIFIED wu_hourly_client.py:42]"
