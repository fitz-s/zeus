# ============================================================
# FORBIDDEN PATTERNS
# ============================================================

forbidden_patterns:
  - id: FP-01
    description: >
      Do NOT request mx2t6 or mn2t6 from ECMWF Open Data enfo stream.
      These 6h aggregates were DEPRECATED 2026-05-07. API returns
      "No index entries". Use mx2t3/mn2t3 (3h native) only.
      NOTE: data_version strings containing 'mx2t6'/'mn2t6' are legacy
      calendar identifiers — not permission to request those parameters.
      See ecmwf_open_data.data_version_pattern.disambiguation_note above.
    source_id: ecmwf_open_data
    binding_doc: "architecture/zeus_grid_resolution_authority_2026_05_07.yaml forbidden_patterns[6]"

  - id: FP-02
    description: >
      Do NOT use UMA OO V2 as settlement source for markets after block
      83,275,667 (~2026-02-21). Zero on-chain PriceSettled events exist
      post-cutover. Gamma API is the only truth source for post-cutover
      and ALL LOW markets.
    source_id: polymarket_uma_oo_v2
    binding_doc: "architecture/settlement_dual_source_truth_2026_05_07.yaml forbidden_patterns[0]"

  - id: FP-03
    description: >
      Do NOT use VHHH airport WU data for Hong Kong settlement.
      HKO headquarters (HKO_STATION='HKO') differs by 1-3°C from airport.
      Hong Kong must ALWAYS route through hko_daily_api, never wu_icao.
    source_id: hko_daily_api
    binding_doc: "src/data/daily_obs_append.py:15-17; src/data/tier_resolver.py:39 Tier.HKO_NATIVE; source_rationale.yaml antibody A6"

  - id: FP-04
    description: >
      Do NOT consume ECMWF Open Data at 0.25° without downsampling to 0.5°
      before entering Zeus calibration pipeline. 0.25° training data does not
      exist in TIGGE archive. Silent mismatch degrades Brier by 3.18× vs Plan A.
    source_id: ecmwf_open_data
    binding_doc: "architecture/zeus_grid_resolution_authority_2026_05_07.yaml forbidden_patterns[3]"

  - id: FP-05
    description: >
      Do NOT treat Open-Meteo archive as a settlement source. It is a
      redistribution / grid-snap source, not the authoritative station reading.
      Observation source MUST match settlement source (P1 invariant).
    source_id: openmeteo_archive
    binding_doc: "architecture/source_rationale.yaml src/data/tier_resolver.py — no OpenMeteo Tier-4 escape hatch"

  - id: FP-06
    description: >
      Do NOT place CLOB limit orders from any caller except src/execution/executor.py.
      INV-24 runtime callstack guard enforces this. Extending the allowlist requires
      updating both polymarket_client.py AND architecture/ast_rules/semgrep_zeus.yml.
    source_id: polymarket_clob
    binding_doc: "architecture/negative_constraints.yaml NC-16; src/data/polymarket_client.py:44-56"

  - id: FP-07
    description: >
      Do NOT use Meteostat bulk archive for live settlement dates (recent data).
      Archive lags real-time by weeks to months. Use only for historical backfill
      of sparse WU ICAO stations.
    source_id: meteostat_bulk
    binding_doc: "src/data/meteostat_bulk_client.py:20-21"

  - id: FP-08
    description: >
      Do NOT infer settlement from observation data alone. Settlement authority
      comes from Polymarket Gamma API (post-2026-02-21) or UMA OO V2 chain
      (pre-2026-02-21). Observation data feeds calibration, not settlement truth.
    binding_doc: "architecture/settlement_dual_source_truth_2026_05_07.yaml; architecture/source_rationale.yaml settlement_write route"

  - id: FP-09
    description: >
      Do NOT request ECMWF Open Data steps beyond 282h (max_step_hours).
      Steps 150–282 use 6h stride (disseminated 6h grid beyond 144h). Steps
      beyond 282h are not used by Zeus even if technically available.
    source_id: ecmwf_open_data
    binding_doc: "src/data/ecmwf_open_data.py:102-110 STEP_HOURS; config/source_release_calendar.yaml live_max_step_hours=282"

  - id: FP-10
    description: >
      Do NOT aggregate live mx2t3/mn2t3 up to 6h to match TIGGE training
      granularity. This is explicitly forbidden (A1+3h decision) — it discards
      Asia timezone unlock worth 3.1 K-equiv composite cost.
    source_id: ecmwf_open_data
    binding_doc: "architecture/zeus_grid_resolution_authority_2026_05_07.yaml forbidden_patterns[5]"
