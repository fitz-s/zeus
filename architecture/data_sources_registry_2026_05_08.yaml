# PURPOSE
# -------
# Authoritative one-stop registry of every data source Zeus consumes.
# Future agents and the operator must NOT re-discover these. Check here first.
#
# VERIFICATION LEGEND
# -------------------
# [VERIFIED]  — confirmed by WebFetch, source code, or binding architecture doc
# [INFERRED]  — derived from code / config / pattern; not primary-source confirmed
#
# WHEN TO RE-AUDIT
# ----------------
# - Any new city onboarded to config/cities.json
# - Polymarket changes settlement source for a city (see cities.json _settlement_source_discipline)
