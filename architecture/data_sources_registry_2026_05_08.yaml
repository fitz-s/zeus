status: BINDING
when_to_re_audit: "See header WHEN TO RE-AUDIT section above"

# ============================================================
# FORECAST SOURCES
# ============================================================

sources:

  # ----------------------------------------------------------
  # 1. ECMWF Open Data — IFS-ENS (Live Forecast)
  # ----------------------------------------------------------
  - id: ecmwf_open_data
    display_name: "ECMWF Open Data — IFS-ENS (enfo stream)"
    category: forecast
    publisher: "ECMWF (https://www.ecmwf.int)"
    authority_urls:
      - "https://www.ecmwf.int/en/forecasts/datasets/set-iii"  # [VERIFIED] WebFetch 2026-05-08
      - "https://confluence.ecmwf.int/display/DAC/Dissemination+schedule"  # [VERIFIED] WebFetch 2026-05-08
      - "https://github.com/ecmwf/ecmwf-opendata"

    publication_schedule:
      cycle_hours_utc: [0, 6, 12, 18]  # [VERIFIED] "4 daily runs: 00, 06, 12 and 18 UTC" — ECMWF set-iii page
      publication_lag:
        # [VERIFIED] WebFetch 2026-05-08 from confluence.ecmwf.int/display/DAC/Dissemination+schedule:
        # "Reports arrive 6:40 to 8:01 hours following initialization."
        # "Forecast Day 0 06:40... Forecast Day 15 07:40... Derived products Step 0 to 240 07:41... Step 246 to 360 08:01"
        description: >
          00/12 UTC cycles: first products at cycle_time + 6h40m; full
          step 0–360 complete by cycle_time + 8h01m. Zeus uses
          safe_fetch default_lag_minutes=485 (8h05m) per
          config/source_release_calendar.yaml — verified empirically
          to avoid requesting before the full batch is available.
          Single-batch dissemination: all steps arrive together, not
          step-by-step. Catch-up before T+7h40m returns 404 universally.
        safe_fetch_lag_minutes_default: 485  # [VERIFIED] config/source_release_calendar.yaml:9
        safe_fetch_lag_minutes_min_partial: 400  # [VERIFIED] config/source_release_calendar.yaml:10
        max_source_lag_seconds: 108000  # 30h [VERIFIED] config/source_release_calendar.yaml:12
      cycle_specific_notes:
        "00_12": "full_horizon cycles — max step 360h, live_max_step_hours=282 [VERIFIED]"
        "06_18": "short horizon only — max step 144h, live_authorization=false beyond 144h [VERIFIED]"

    what_is_published:
      parameters_used_by_zeus:
        - >
          mx2t3 (paramId 228026): Maximum 2m temperature in last 3 hours.
          [VERIFIED] ECMWF set-iii page: "Maximum temperature at 2 metres
          in the last 3 hours (mx2t3)". Zeus code: src/data/ecmwf_open_data.py:116
          TRACKS dict open_data_param="mx2t3".
        - >
          mn2t3 (paramId 228027): Minimum 2m temperature in last 3 hours.
          [VERIFIED] ECMWF set-iii page: "Minimum temperature at 2 metres
          in the last 3 hours (mn2t3)". Zeus code: src/data/ecmwf_open_data.py:121
          TRACKS dict open_data_param="mn2t3".
      deprecated_unused:
        - >
          mx2t6 / mn2t6 (6h aggregates): DEPRECATED 2026-05-07 by ECMWF.
          API returns "No index entries" when requested.
          [VERIFIED] architecture/zeus_grid_resolution_authority_2026_05_07.yaml:
          "ECMWF Opendata enfo stream DEPRECATED `mx2t6`/`mn2t6` 6h aggregates;
          only `mx2t3`/`mn2t3` (3h) and `2t` (instantaneous) remain available."
          FORBIDDEN: do not request mx2t6/mn2t6 from enfo stream.
      physical_resolution: "0.25° native (live); downsampled to 0.5° before Zeus calibration"
      members: 51  # "50 perturbed + 1 control (cf + pf)" [INFERRED from standard ENS config]
      step_temporal_resolution:
        description: >
          [VERIFIED] ECMWF set-iii page: "hourly until step 90, then 3-hourly
          from 93 to 144, then 6-hourly thereafter."
          Zeus requests: 3h stride 3–144h, 6h stride 150–282h.
        zeus_step_list: "3,6,...,144 (3h stride) then 150,156,...,282 (6h stride)"
        zeus_step_list_code: "src/data/ecmwf_open_data.py:102-105 STEP_HOURS"

    scope_and_range:
      step_grid_zeus: "0 to 144 by 3h; 150 to 282 by 6h (00/12 cycles, live path)"  # [VERIFIED] ecmwf_open_data.py:102-105
      max_horizon_used_by_zeus: "282h"  # [VERIFIED] RUN.md fix/#134 2026-05-08; source_release_calendar.yaml live_max_step_hours=282
      max_horizon_rationale: "D+10 + buffer for UTC+12 cities (max required step ≈ 252h for D+10)"
      spatial_extent: "Global"
      downsample_policy: >
        Live 0.25° must be downsampled to 0.5° before Zeus calibration/extraction.
        Method: 4×4 grid-cell mean; cell anchor matched to TIGGE 0.5° anchor.
        [VERIFIED] architecture/zeus_grid_resolution_authority_2026_05_07.yaml
        live_forecast_path.downsample_to = "0.5 / 0.5"
      historical_availability: >
        Live only (no public archive). For historical training use TIGGE archive.
        [VERIFIED] ecmwf_opendata_tigge_equivalence_2026_05_06.yaml:
        "OpenData is the live dissemination channel; TIGGE is the delayed archive channel."

    zeus_consumption:
      transport: >
        ecmwf-opendata Python client (ecmwf.opendata) → GRIB2 download via
        https://data.ecmwf.int/forecasts/ [VERIFIED] src/data/source_health_probe.py:262-263
      ingest_path:
        - "daemon: src/data/ecmwf_open_data.py::collect_open_ens_cycle() [VERIFIED ecmwf_open_data.py:1]"
        - "download subprocess: '51 source data/scripts/download_ecmwf_open_ens.py' [VERIFIED ecmwf_open_data.py:80]"
        - "extract subprocess: '51 source data/scripts/extract_open_ens_localday.py' [VERIFIED ecmwf_open_data.py:81]"
        - "ingest: scripts/ingest_grib_to_snapshots.py::ingest_track() [VERIFIED ecmwf_open_data.py:23]"
        - "release calendar: config/source_release_calendar.yaml entries ecmwf_open_data_mx2t6_high / ecmwf_open_data_mn2t6_low [VERIFIED]"
      target_table: "ensemble_snapshots_v2 (per-cycle, per-member, per-step, per-city, per-local-date)"
      data_version_pattern:
        HIGH: "ecmwf_opendata_mx2t6_local_calendar_day_max_v1"  # [VERIFIED] ecmwf_open_data.py:28-29; contracts/ensemble_snapshot_provenance.py
        LOW: "ecmwf_opendata_mn2t6_local_calendar_day_min_v1"   # [VERIFIED] ecmwf_open_data.py:29; contracts/ensemble_snapshot_provenance.py
        disambiguation_note: >
          WARNING: these data_version strings contain 'mx2t6'/'mn2t6' as LEGACY
          calendar identifiers only. They do NOT grant permission to request
          mx2t6/mn2t6 from the ECMWF enfo stream (deprecated 2026-05-07).
          Actual fetched parameters are mx2t3/mn2t3 (3h native). Calendar_id
          naming predates the deprecation and was not renamed to avoid DB
          migration overhead. See FP-01 below.
      source_id_code: "ecmwf_open_data"  # [VERIFIED] ecmwf_open_data.py:129
      source_health_probe: "_probe_ecmwf_open_data in src/data/source_health_probe.py:256"
      failure_modes:
        - "HTTP 404 before T+7h40m: single-batch dissemination not yet available"
        - "ECMWF rate limit: server limited to 500 simultaneous connections (ecmwf-opendata README)"
        - "mx2t6/mn2t6 request: returns 'No index entries' — deprecated 2026-05-07"
        - "STEP_HOURS mismatch: steps beyond live_max_step_hours cause SOURCE_RUN_HORIZON_OUT_OF_RANGE blocking (fix/#134 raised 276→282h)"

    related_authority_docs:
      - "architecture/zeus_grid_resolution_authority_2026_05_07.yaml (grid policy, forbidden patterns)"
      - "architecture/ecmwf_opendata_tigge_equivalence_2026_05_06.yaml (physical ensemble equivalence)"
      - "architecture/settlement_dual_source_truth_2026_05_07.yaml (Polymarket settlement — orthogonal)"
      - "config/source_release_calendar.yaml (safe-fetch timing, cycle profiles)"
      - "docs/operations/task_2026-05-08_100_blocked_horizon_audit/RUN.md (fix/#134: STEP_HOURS 276→282)"

  # ----------------------------------------------------------
  # 2. ECMWF TIGGE Archive — IFS-ENS (Training / Backfill)
  # ----------------------------------------------------------
  - id: tigge_mars
    display_name: "ECMWF TIGGE Archive — IFS-ENS via MARS/ECDS"
    category: forecast
    publisher: "ECMWF / TIGGE consortium (https://confluence.ecmwf.int/display/TIGGE)"
    authority_urls:
      - "https://confluence.ecmwf.int/display/TIGGE"
      - "https://ecds.ecmwf.int/datasets/tigge-forecasts"  # [VERIFIED] correct ECDS TIGGE dataset page (not ERA5)

    publication_schedule:
      cycle_hours_utc: [0, 12]  # [VERIFIED] config/source_release_calendar.yaml:107 (entry source_id=tigge; codebase uses tigge_mars — aliased in tigge_pipeline.py SOURCE_ID and source_health_probe.py:44)
      publication_lag:
        description: >
          Archive channel: +48h post-cycle-init public embargo.
          [VERIFIED] ecmwf_opendata_tigge_equivalence_2026_05_06.yaml:
          "TIGGE is the delayed archive channel (+48h post-cycle-init)."
          Access via MARS credentials in ~/.ecmwfapirc or ECDS API key.
      access_mechanism: "MARS retrieval via ecmwfapi.ECMWFDataServer() reading ~/.ecmwfapirc"

    what_is_published:
      parameters_used_by_zeus:
        - >
          mx2t6 (paramId 121, stepType=max): Maximum 2m temperature in last 6h.
          [VERIFIED] ecmwf_opendata_tigge_equivalence_2026_05_06.yaml erratum:
          "TIGGE mx2t6 paramId 121 stepType=max; mn2t6 paramId 122 stepType=min".
          NOTE: mx2t6 IS available from TIGGE archive (not deprecated there).
        - "mn2t6 (paramId 122, stepType=min): Minimum 2m temperature in last 6h."
      physical_resolution: "0.5° native (international archive protocol)"  # [VERIFIED] zeus_grid_resolution_authority_2026_05_07.yaml
      members: 51
      step_temporal_resolution: "6h (mx2t6/mn2t6 native grid)"

    scope_and_range:
      max_horizon: "360h (step 0–360 by 6h for 00/12 cycles)"  # [INFERRED]
      spatial_extent: "Global (0.5° grid)"
      historical_availability: >
        Full archive from ~2006 onwards.
        Local disk: 1.069 TiB on cloud tigge-runner (c00 mostly complete;
        c12 partial; c12 2024-01-01 → 2024-06-01 GAP — root cause unknown).
        [VERIFIED] zeus_grid_resolution_authority_2026_05_07.yaml implementation.training_corpus
      c12_gap_note: >
        NO IFS-ENS c12 data on disk for 2024-01-01 → 2024-06-01.
        Cycle-stratified Platt pin eligibility floor = 2025-06-02.
        [VERIFIED] zeus_grid_resolution_authority_2026_05_07.yaml cycle_stratification_eligibility

    zeus_consumption:
      transport: >
        ecmwfapi.ECMWFDataServer() via MARS retrieval;
        credentials in ~/.ecmwfapirc.
        [VERIFIED] src/data/tigge_pipeline.py:18 + source_health_probe.py:344
      ingest_path:
        - "orchestrator: src/data/tigge_pipeline.py::run_tigge_daily_cycle() [VERIFIED tigge_pipeline.py:1]"
        - "download subprocess: '51 source data/scripts/tigge_(mx|mn)2t6_download_resumable.py' [VERIFIED tigge_pipeline.py:71-73]"
        - "extract subprocess: '51 source data/scripts/extract_tigge_(mx|mn)2t6_localday_(max|min).py' [VERIFIED tigge_pipeline.py:73]"
        - "ingest: scripts/ingest_grib_to_snapshots.py::ingest_track() [VERIFIED tigge_pipeline.py:36]"
        - "live stub (dormant): src/data/tigge_client.py — gate: ZEUS_TIGGE_INGEST_ENABLED env flag [VERIFIED tigge_client.py:31]"
      target_table: "ensemble_snapshots_v2"
      data_version_pattern:
        HIGH: "tigge_mx2t6_local_calendar_day_max_v1"  # [INFERRED from ecmwf_opendata_tigge_equivalence_2026_05_06.yaml code_anchors]
        LOW:  "tigge_mn2t6_local_calendar_day_min_v1"
      source_id_code: "tigge_mars"  # [VERIFIED] tigge_pipeline.py:80; source_health_probe.py:44
      source_health_probe: "_probe_tigge_mars in src/data/source_health_probe.py:328 (credential file + scheduler job status)"
      role: >
        Training / backfill ONLY. Not live-serving authority.
        Live-calibration transfer from TIGGE Platt to OpenData forecasts
        requires paired equivalence evidence (see ecmwf_opendata_tigge_equivalence_2026_05_06.yaml).
      release_calendar_status: >
        config/source_release_calendar.yaml calendar_id=tigge_archive_backfill:
        live_authorization=false, backfill_only=true, partial_policy=SHADOW_ONLY.
      failure_modes:
        - "MARS credentials missing/invalid: CRITICAL log + tigge_mars source paused"
        - "ECDS catalog gap: c12 2024-H1 confirmed absent from disk"
        - "MARS retrieval latency: minutes-scale per run (never called from source_health probe)"

    related_authority_docs:
      - "architecture/ecmwf_opendata_tigge_equivalence_2026_05_06.yaml"
      - "architecture/zeus_grid_resolution_authority_2026_05_07.yaml"
      - "config/source_release_calendar.yaml (tigge_archive_backfill entry)"

  # ----------------------------------------------------------
  # 3. Open-Meteo Archive API (Hourly Observation Instants + Solar)
  # ----------------------------------------------------------
  - id: openmeteo_archive
    display_name: "Open-Meteo Archive API"
    category: observation
    publisher: "Open-Meteo (https://open-meteo.com)"
    authority_urls:
      - "https://open-meteo.com/en/docs"  # [VERIFIED] WebFetch 2026-05-08
      - "https://archive-api.open-meteo.com/v1/archive"

    publication_schedule:
      description: >
        Historical archive updated with ~1-5 day lag for recent data.
        Non-commercial free tier with undisclosed numeric rate limit.
        [VERIFIED] WebFetch open-meteo.com/en/docs 2026-05-08:
        "Non-Commercial usage tier; use the Past Days feature to access
        archived forecasts." Zeus implements explicit quota tracking
        (src/data/openmeteo_quota.py) with 429 retry handling.
      safe_fetch_lag_minutes: 720  # [VERIFIED] config/source_release_calendar.yaml:84
      max_source_lag_seconds: 172800  # 48h [VERIFIED] config/source_release_calendar.yaml:85

    what_is_published:
      parameters_used_by_zeus:
        - "temperature_2m (hourly): 2m air temperature in °C or °F [VERIFIED] src/data/hourly_instants_append.py:116"
        - "sunrise, sunset (daily): astronomical sunrise/sunset times [VERIFIED] src/data/solar_append.py:41"
        - "temperature_2m_max, temperature_2m_min (daily): daily extrema [INFERRED from archive API docs]"
      base_url: "https://archive-api.open-meteo.com/v1/archive"  # [VERIFIED] src/data/openmeteo_client.py:23

    scope_and_range:
      spatial_coverage: "Global grid-snap (~1–11 km grid depending on model)"
      temporal_coverage: "Historical from ~1940 (ERA5 reanalysis backend)"
      freshness_caveat: >
        Recent data (last 1-5 days) may lag. This source is used for
        historical backfill and live hourly instants (previous 24-48h),
        NOT for settlement-day real-time data.

    zeus_consumption:
      transport: "httpx.get with retry + 429 handling; quota tracked in memory"
      ingest_path:
        - "live hourly: src/data/hourly_instants_append.py::hourly_tick() [VERIFIED hourly_instants_append.py:1]"
        - "solar: src/data/solar_append.py::daily_tick() [VERIFIED solar_append.py:1]"
        - "backfill: scripts/backfill_hourly_openmeteo.py [INFERRED from hourly_instants_append.py:92]"
        - "backfill solar: scripts/backfill_solar_openmeteo.py [INFERRED from solar_append.py:24]"
        - "shared client: src/data/openmeteo_client.py::fetch() [VERIFIED openmeteo_client.py:1]"
        - "quota guard: src/data/openmeteo_quota.py::quota_tracker [VERIFIED openmeteo_client.py:14]"
      target_tables:
        - "observation_instants (hourly, legacy)"
        - "observation_instants_v2 (hourly, current) [VERIFIED hourly_instants_append.py:1]"
        - "solar_daily [VERIFIED solar_append.py:51]"
      source_tag_code: "openmeteo_archive_hourly [VERIFIED hourly_instants_append.py:65]; openmeteo_archive_solar [VERIFIED solar_append.py:51]"
      source_health_probe: "_probe_open_meteo_archive in src/data/source_health_probe.py:71"
      canonical_ids:
        # Naming variants across the codebase — all refer to this source:
        health_probe_key: "open_meteo_archive"        # [VERIFIED] source_health_probe.py:38 (open_meteo with underscore after open)
        data_version_hourly: "openmeteo_archive_hourly"   # [VERIFIED] hourly_instants_append.py:65 (no underscore after open)
        data_version_solar: "openmeteo_archive_solar"     # [VERIFIED] solar_append.py:51
        source_id_registry: "openmeteo_archive"            # this registry id
        # NOTE: health probe uses open_meteo_archive (underscore after "open");
        # ingest data_version tags use openmeteo_archive_* (no underscore). Same source.
      failure_modes:
        - "HTTP 429 rate limit: handled via retry with Retry-After header"
        - "Quota exhaustion: RuntimeError from quota_tracker.can_call()"
        - "Recent-data lag: last 1-5 days may be missing; normal for live use"
      live_authorization: false  # NOT a settlement source; observation only [VERIFIED tier_resolver.py:64]

    related_authority_docs:
      - "config/source_release_calendar.yaml (openmeteo_previous_runs_best_match entry)"
      - "architecture/source_rationale.yaml (src/data/openmeteo_client.py entry)"

  # ----------------------------------------------------------
  # 4. Open-Meteo Previous Runs API (Shadow Forecast)
  # ----------------------------------------------------------
  - id: openmeteo_previous_runs
    display_name: "Open-Meteo Previous Runs API (shadow forecast)"
    category: forecast
    publisher: "Open-Meteo (https://open-meteo.com)"
    authority_urls:
      - "https://previous-runs-api.open-meteo.com/v1/forecast"

    publication_schedule:
      description: >
        Reconstructed previous-run forecast availability. Re-distributor;
        upstream model varies per request. RECONSTRUCTED provenance tier.
        [VERIFIED] src/data/dissemination_schedules.py:98-103:
        "openmeteo_previous_runs: RECONSTRUCTED, schedule_url=https://open-meteo.com/en/docs"
      safe_fetch_lag_minutes: 720  # [VERIFIED] config/source_release_calendar.yaml:84
      provenance: "RECONSTRUCTED"  # [VERIFIED] dissemination_schedules.py:100

    what_is_published:
      description: "Reconstructed previous-run model forecasts via Open-Meteo's redistribution"
      base_url: "https://previous-runs-api.open-meteo.com/v1/forecast"  # [VERIFIED] openmeteo_client.py:24

    zeus_consumption:
      transport: "httpx.get via src/data/openmeteo_client.py"
      ingest_path:
        - "live forecasts: src/data/forecasts_append.py (Open-Meteo previous-runs track) [INFERRED from dissemination_schedules.py]"
        - "shared client: src/data/openmeteo_client.py::fetch() [VERIFIED]"
      live_authorization: false  # SHADOW_ONLY [VERIFIED] config/source_release_calendar.yaml:98
      target_table: "forecasts (source='openmeteo_previous_runs')"
      release_calendar_status: >
        config/source_release_calendar.yaml calendar_id=openmeteo_previous_runs_best_match:
        partial_policy=SHADOW_ONLY, live_authorization=false.

    related_authority_docs:
      - "config/source_release_calendar.yaml (openmeteo_previous_runs_best_match entry)"
      - "architecture/source_rationale.yaml (src/data/openmeteo_client.py entry)"

