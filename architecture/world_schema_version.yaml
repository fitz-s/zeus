# Bump-on-migration contract:
#   When a migration changes the required schema (adds/removes a column listed
#   in architecture/db_table_ownership.yaml), increment `version` by 1 and
#   commit as part of the migration while this legacy surface remains present.
#   Historical ingest code may still write this version into
#   state/world_schema_ready.json at boot, but that JSON file is no longer live
#   trading boot authority after the forecast-live split. Trading now proves
#   schema currency directly from zeus-world.db and zeus-forecasts.db
#   PRAGMA user_version checks in src/main.py.
#
# Current value: 1 (initial baseline, matches Phase 1/2/3 schema)

version: 1
