schema_version: 1
project: zeus

principal_authority:
  architecture_spec: docs/authority/zeus_current_architecture.md
  change_control_constitution: docs/authority/zeus_change_control_constitution.md
  operator_brief: .claude/CLAUDE.md
  historical_references:
    - architecture/history_lore.yaml

semantic_atoms:
  unit:
    frozen: true
    allowed: [F, C]
    rationale: Temperature semantics must never silently collapse to bare floats with implicit unit assumptions.
  direction:
    frozen: true
    allowed: [buy_yes, buy_no, unknown]
    rationale: Direction is lifecycle-bearing state, not display metadata.
  probability_space:
    frozen: true
    allowed: [yes_side, no_side, held_side, native_side]
    rationale: Probability-space semantics must be explicit across module boundaries.
  strategy_key:
    frozen: true
    allowed:
      - settlement_capture
      - shoulder_sell
      - center_buy
      - opening_inertia
    rationale: Sole governance key for risk, allocation, and performance policy.
  phase:
    frozen: true
    allowed:
      - pending_entry
      - active
      - day0_window
      - pending_exit
      - economically_closed
      - settled
      - voided
      - admin_closed
    rationale: >
      Authoritative lifecycle grammar. 2026-07-12 T5 MIGRATION
      (docs/rebuild/quarantine_excision_2026-07-11.md,
      scripts/migrations/2026_07_quarantine_phase_retirement.py): the retired
      quarantine phase member is dropped in lockstep with the
      position_current.phase / position_events.phase_before / phase_after
      CHECK constraints in architecture/2026_04_02_architecture_kernel.sql.
  truth_surface_kind:
    frozen: true
    allowed:
      - canonical_event
      - canonical_projection
      - derived_export
      - ingress_command
      - experimental
  event_type:
    frozen: true
    allowed:
      - POSITION_OPEN_INTENT
      - ENTRY_ORDER_POSTED
      - ENTRY_ORDER_FILLED
      - ENTRY_ORDER_VOIDED
      - ENTRY_ORDER_REJECTED
      - CHAIN_SYNCED
      - CHAIN_SIZE_CORRECTED
      # 2026-07-12 T5 MIGRATION (docs/rebuild/quarantine_excision_2026-07-11.md,
      # scripts/migrations/2026_07_quarantine_phase_retirement.py): the retired
      # chain-quarantine event type is dropped in lockstep with the
      # position_events.event_type CHECK constraint.
      - MONITOR_REFRESHED
      - EXIT_INTENT
      - EXIT_ORDER_POSTED
      - EXIT_ORDER_FILLED
      - EXIT_ORDER_VOIDED
      - EXIT_ORDER_REJECTED
      - SETTLED
      - ADMIN_VOIDED
      - MANUAL_OVERRIDE_APPLIED
      # F2 (docs/rebuild/local_ledger_excision_2026-07-12.md Round-2 delta,
      # rework of the reverted LX-F): duplicate-position identity supersession
      # fact — replaces the consolidator's prior synthesized merge economics.
      - POSITION_IDENTITY_SUPERSEDED

truth_surfaces:
  canonical:
    events_table: position_events
    projection_table: position_current
    authority_kind: canonical_event_plus_projection
  derived:
    - state/positions.json
    - state/status_summary.json
  ingress_only:
    - state/control_plane.json
  deprecated_auxiliary_surfaces:
    - state/strategy_tracker.json

write_authority:
  canonical_append_modules:
    - src.state.ledger
  canonical_projection_modules:
    - src.state.projection
    - src.state.lifecycle_manager
  canonical_policy_emitters:
    - src.riskguard.riskguard
    - src.riskguard.policy
  canonical_policy_consumers:
    - src.engine.evaluator
    - src.engine.cycle_runner

machine_gate_inputs:
  manifests:
    - architecture/kernel_manifest.yaml
    - architecture/invariants.yaml
    - architecture/zones.yaml
    - architecture/negative_constraints.yaml
    - architecture/maturity_model.yaml
  schema:
    - architecture/2026_04_02_architecture_kernel.sql
  ast_rules:
    - architecture/ast_rules/semgrep_zeus.yml
  scripts:
    - scripts/check_kernel_manifests.py
    - scripts/check_module_boundaries.py
    - scripts/check_work_packets.py
    - scripts/replay_parity.py
  tests:
    - tests/test_cross_module_invariants.py
    - tests/test_architecture_contracts.py
