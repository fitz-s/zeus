# architecture/artifact_authority_status.yaml
# Created: 2026-05-16
# Last reused or audited: 2026-05-16
# Authority basis:
#   UNIVERSAL_TOPOLOGY_DESIGN.md §13 (Closed-Artifact Authority Distinction)
#   ZEUS_BINDING_LAYER.md §8 (Artifact Authority Status Registry)
#
# Schema deviation note (for WAVE 1.9 opus critic):
#   The WAVE 1 executor brief listed status values: ACTIVE_LAW|DRAFT|ARCHIVED|CURRENT_HISTORICAL
#   The design docs (UNIVERSAL_TOPOLOGY_DESIGN §13 + ZEUS_BINDING_LAYER §8) specify:
#     CURRENT_LOAD_BEARING | CURRENT_HISTORICAL | STALE_REWRITE_NEEDED | DEMOTE | QUARANTINE | ARCHIVED
#   Per brief's own instruction ("Read those sections first for exact schema"), the
#   canonical 6-value enum from the design docs is used here. Code in archival_check_0.py
#   uses ARCHIVED + CURRENT_HISTORICAL which aligns with design enum.
#   Brief's ACTIVE_LAW is closest to CURRENT_LOAD_BEARING; DRAFT has no design-doc equivalent.
#
# cross-repo reference note:
#   ~/.openclaw/CLAUDE.md (project root) is outside this git tree. It is registered here
#   with literal path and a comment. Zeus-repo tooling should treat this as advisory only
#   (file-existence check will fail in CI if path is not present). Open question for 1.9 critic.
#
# Fields:
#   path: file or directory path (relative to zeus repo root, or absolute for cross-repo)
#   status: CURRENT_LOAD_BEARING | CURRENT_HISTORICAL | STALE_REWRITE_NEEDED | DEMOTE | QUARANTINE | ARCHIVED
#   last_confirmed: YYYY-MM-DD of last human or automated verification
#   confirmation_ttl_days: advisory fires on next admission if stale beyond this
#   owner: responsible party (default: fitz)
#   archival_ok: whether archival tooling may archive this artifact (default: false)

schema_version: 1
# Structured enum declaration — read by _artifact_status_values() in test_lifecycle_field_orthogonality.py.
# Mirrors docs_registry.yaml's allowed_lifecycle_states pattern (robust to comment reformatting).
allowed_statuses:
- CURRENT_LOAD_BEARING
- CURRENT_HISTORICAL
- STALE_REWRITE_NEEDED
- DEMOTE
- QUARANTINE
- ARCHIVED
