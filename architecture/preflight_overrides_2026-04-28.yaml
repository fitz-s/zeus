  - docs/operations/task_2026-04-28_obs_provenance_preflight/evidence/gate5_fill_quarantine_apply_2026-04-28.json
  - docs/operations/task_2026-04-28_obs_provenance_preflight/evidence/gate5_ogimet_quarantine_apply_2026-04-28.json
