  - "Gate 5 (payload_identity_missing) clears \u2014 predicate keys on training_allowed=1"
hko_canonical:
  rationale: "Operator decision 2026-04-28T22:31Z: Hong Kong settlement source is EXCLUSIVELY HKO (no WU/VHHH alias, no fallback).\
    \ RFC question 4 answered: HK\u2192HKO only. HK observations are excluded from calibration training pool \u2014 consistent\
    \ with current_source_validity.md item 3 (\"HKO class was suspect or stalled\") + Gate 2 original design intent (\"HK\
    \ is gap city, exclude from training\"). Live settlement still uses HKO via SettlementSemantics; calibration training\
    \ does not include HK."
  signed_by: Fitz
  signed_at: 2026-04-28T22:31Z
  resolution: downgrade_HK_observations_to_QUARANTINED
  effect:
  - "821 HK observations rows authority VERIFIED \u2192 QUARANTINED"
  - HK rows excluded from rebuild_calibration_pairs_v2._fetch_verified_observation
  - "Gate 2 (hko_requires_fresh_source_audit) clears \u2014 predicate filters VERIFIED"
  - HKO remains canonical SETTLEMENT source via SettlementSemantics (live trading)
  - 0 HK non-HKO settlements found needing quarantine (policy already aligned)
  rfc_questions_answered:
    4_hk_vhhh_routing: "NO \u2014 HK uses HKO exclusively; WU/VHHH alias rejected"
  row_predicate:
    table: observations
    where: authority='VERIFIED' AND (LOWER(source) LIKE 'hko%' OR city='Hong Kong')
    rows_affected: 821
  released:
    released_by: Fitz
    released_at: 2026-05-02T00:00Z
    rationale: |
      HK quarantine released 2026-05-02 as part of the HK+Paris combined release packet
      (docs/operations/archive/2026-Q2/task_2026-05-02_hk_paris_release/work_log.md Step 2).
      HKO XML backfill confirmed 29 April 2026 rows; all 821 historical rows released
      to VERIFIED. The hko_requires_fresh_source_audit gate is now advisory - HK is
      a confirmed VERIFIED city again. Gate re-arms automatically if this released:
      block is removed or the released_at field is cleared.
    effect:
      - hko_requires_fresh_source_audit gate flips from BLOCKER to ADVISORY
      - gate still emits count for audit; does not block rebuild_calibration_pairs_v2
    plan_evidence: docs/operations/task_2026-05-03_ddd_implementation_plan/phase1_results/E8_audit/10_paris_resync_plan.md
