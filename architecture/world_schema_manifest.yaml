# World DB Schema Manifest
# Authority basis: design.md §1 axis 4 + §6 antibody #5
# Created: 2026-04-30
# Last reviewed: 2026-04-30
#
# Purpose: Documents the expected schema for zeus-world.db tables that
# trading reads via src.contracts.world_view.* accessors.
# The trading boot validator (src/contracts/world_schema_validator.py)
# reads this manifest and asserts PRAGMA table_info(...) matches at boot.
#
# Mismatch action (Phase 2): WARN and continue.
# Mismatch action (Phase 3): FATAL exit.
#
# schema_version is bumped by ingest on each migration. Trading reads
# state/world_schema_ready.json for the sentinel version at boot.

schema_version: 1

tables:
  settlements:
    semantic: >
      Settlement truth for each (city, target_date). Written by ingest-side
      harvester_truth_writer. Read by trading-side harvester_pnl_resolver and
      world_view.settlements accessor. Authority: VERIFIED rows are canonical.
    required_columns:
      - city
      - target_date
      - settlement_value
      - settled_at
      # 'outcome' removed 2026-05-01: PRAGMA table_info(settlements) confirmed no such column.
      # Settlement outcome logic uses winning_bin + settlement_value; no 'outcome' column exists.
    optional_columns:
      - source
      - authority
      - data_version
      - range_label
      - winning_bin
      - id

  observations:
    semantic: >
      Legacy daily observation table. New reads prefer observation_instants_v2.
      Trading reads via world_view.observations accessor (falls back to this).
    required_columns:
      - city
      - target_date
      - max_temp
      - min_temp
    optional_columns:
      - source
      - id

  observation_instants:
    semantic: >
      Hourly Open-Meteo archive observations. Legacy table, v2 preferred.
    required_columns:
      - city
      - target_date
      - utc_timestamp
    optional_columns:
      - max_temp_c
      - min_temp_c
      - source
      - id

  forecasts:
    semantic: >
      ECMWF/NWS/Open-Meteo forecast records. One row per (city, target_date,
      source, forecast_basis_date). Trading reads via world_view.forecasts.
    required_columns:
      - city
      - target_date
      - source
      - lead_days
    optional_columns:
      - forecast_basis_date
      - forecast_issue_time
      - forecast_high
      - forecast_low
      - temp_unit
      - retrieved_at
      - authority_tier
      - data_source_version
      - availability_provenance
      - id

  solar_daily:
    semantic: >
      Daily sunrise/sunset times per city. Used by diurnal curve calculations.
    required_columns:
      - city
      - date
    optional_columns:
      - sunrise_utc
      - sunset_utc
      - id

  data_coverage:
    semantic: >
      Ledger of expected vs. provided rows per (data_table, city, target_date).
      Status: MISSING | PROVIDED | FAILED. Drives hole-fill logic.
    required_columns:
      - data_table
      - city
      - target_date
      - status
    optional_columns:
      - updated_at
      - id

  platt_models_v2:
    semantic: >
      Fitted Platt calibration models. Keyed by (temperature_metric, cluster,
      season, data_version, input_space). is_active=1 + authority=VERIFIED
      rows are the live inference surface. Read by world_view.calibration.
    required_columns:
      - temperature_metric
      - cluster
      - season
      - param_A
      - param_B
      - param_C
      - n_samples
      - is_active
      - authority
      - fitted_at
    optional_columns:
      - param_C
      - bootstrap_params_json
      - brier_insample
      - data_version
      - input_space
      - id

  forecast_skill:
    semantic: >
      Per-city Brier/log-loss skill scores for ECMWF ensemble. Used by trading
      evaluator to assess forecast quality.
    required_columns:
      - city
      - brier
    optional_columns:
      - log_loss
      - n_samples
      - fitted_at
      - id

  model_bias:
    semantic: >
      ECMWF ensemble bias correction parameters per city. Used by trading
      evaluator when bias_correction_enabled=true.
    required_columns:
      - city
      - source
    optional_columns:
      - bias_mean
      - bias_std
      - n_samples
      - id
