  # ─── new: live_venue_submit ─
  - id: live_venue_submit
    owner_module: src/execution/executor.py
    intent: >
      Submit a real order to a live venue. Single boundary at which
      LiveAuthToken phantom must be present.
    relationships:
      protects_invariants: [INV-21, INV-04]
      blocked_when:
        - kill_switch_active
        - settlement_window_freeze_active
        - risk_level_RED
    hard_kernel_paths:
      - src/execution/executor.py
      - src/execution/venue_adapter.py  # Phase 4 deliverable — created when LiveAuthToken phantom + ABC split lands; entry pre-registers the path so the route function can recognize the future hard kernel from day 1
      - src/execution/live_executor.py  # Phase 4 deliverable — created when LiveAuthToken phantom + ABC split lands; entry pre-registers the path so the route function can recognize the future hard kernel from day 1
    original_intent:
      intent_test: "diff touches live executor or venue adapter submit path"
      does_not_fit: refuse_with_advice
      scope_keywords: [live, submit, order, venue]
      out_of_scope_keywords: [shadow, paper, replay, simulate, mock, dry-run]
    sunset_date: 2027-05-06
    lease_required: true
    telemetry:
      ritual_signal_emitted: true
      latency_budget_ms: 50
    reversibility_class: ON_CHAIN

  # ─── new: on_chain_mutation ─
  - id: on_chain_mutation
    owner_module: src/execution/executor.py
    intent: >
      Any write that results in an on-chain state change beyond a single order
      submit, including position reconciliation, void-on-divergence actions, and
      chain-confirmed fill acknowledgments. Distinct from live_venue_submit
      because the mutation persists externally after the local process exits.
      No rollback path exists; severity ON_CHAIN.
    relationships:
      protects_invariants: [INV-21, INV-04]
      blocked_when:
        - kill_switch_active
        - risk_level_RED
    hard_kernel_paths:
      - src/execution/executor.py
      - src/execution/exchange_reconcile.py
      - src/execution/settlement_commands.py
      - state/zeus_trades.db
    original_intent:
      intent_test: "diff touches chain reconciliation, fill acknowledgment, void-on-divergence path, or on-chain redeem"
      does_not_fit: refuse_with_advice
      scope_keywords: [chain, reconcile, fill, void, on_chain]
      out_of_scope_keywords: [shadow, paper, replay, simulate, mock, dry-run]
    sunset_date: 2027-05-06
    lease_required: true
    telemetry:
      ritual_signal_emitted: true
      latency_budget_ms: 50
    reversibility_class: ON_CHAIN

  # ─── new: authority_doc_rewrite ─
  - id: authority_doc_rewrite
    owner_module: docs/operations/AGENTS.md
    intent: >
      Rewrite or materially alter an authority document (AGENTS.md,
      LIVE_LAUNCH_HANDOFF.md, invariants.yaml, source_rationale.yaml, or any
      doc whose authority_role is executable_law or registry). ARCHIVE severity
      because authority docs are provenance records; rollback requires git
      revert. Protects against authority confusion where an archived doc is
      silently treated as truth.
    relationships:
      protects_invariants: [INV-10]
      blocked_when: []
    hard_kernel_paths:
      - docs/operations/AGENTS.md
      - docs/operations/LIVE_LAUNCH_HANDOFF.md
      - architecture/invariants.yaml
      - architecture/source_rationale.yaml
    original_intent:
      intent_test: "diff touches an authority doc or registry-role file"
      does_not_fit: log_and_advisory
      scope_keywords: [authority, doc, registry, agents, handoff, invariants]
      out_of_scope_keywords: [paper, replay, backtest, mock]
    sunset_date: 2027-05-06
    lease_required: false
    telemetry:
      ritual_signal_emitted: true
      latency_budget_ms: 200
    reversibility_class: ARCHIVE

