capabilities:

  # ─── seeded from source_rationale.yaml::write_routes::canonical_position_write ─
  - id: canonical_position_write
    owner_module: src/state/ledger.py
    intent: >
      Write canonical position events to the ledger (state/zeus_trades.db). This is
      the sole authority for appending lifecycle-affecting position facts;
      all downstream projections (src/state/projection.py) read from this
      surface. Mutations here are TRUTH_REWRITE severity because rollback
      requires a full Chronicler replay rebuild.
    relationships:
      protects_invariants: [INV-04, INV-08]
      blocked_when:
        - settlement_window_freeze_active
    hard_kernel_paths:
      - src/state/ledger.py
      - src/state/projection.py
      - src/state/lifecycle_manager.py
      - state/zeus_trades.db
    original_intent:
      intent_test: "diff touches ledger.py or lifecycle_manager or position projection"
      does_not_fit: log_and_advisory
      scope_keywords: [position, ledger, lifecycle, projection, append]
      out_of_scope_keywords: [paper, replay, backtest, mock]
    sunset_date: 2027-05-06
    lease_required: true
    telemetry:
      ritual_signal_emitted: true
      latency_budget_ms: 100
    reversibility_class: TRUTH_REWRITE

