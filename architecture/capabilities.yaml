    reversibility_class: ARCHIVE

  # ─── new: source_validity_flip ─
  - id: source_validity_flip
    owner_module: src/contracts/world_view/__init__.py
    intent: >
      Flip the validity flag of a data source (world_view, calibration transfer
      policy, or data_version sentinel). TRUTH_REWRITE because downstream
      probability signals treat source validity as a gate; flipping incorrectly
      poisons the entire computation chain. Protects INV-04 (strategy_key
      governance) and INV-06 (data source authority).
    relationships:
      protects_invariants: [INV-04, INV-06]
      blocked_when:
        - calibration_rebuild_in_progress
    hard_kernel_paths:
      - src/contracts/world_view/__init__.py
      - src/contracts/world_view/calibration.py
      - src/data/calibration_transfer_policy.py
    original_intent:
      intent_test: "diff touches world_view validity, calibration transfer policy, or data_version sentinel"
      does_not_fit: log_and_advisory
      scope_keywords: [validity, source, flip, world_view, transfer_policy, data_version]
      out_of_scope_keywords: [paper, replay, backtest, mock]
    sunset_date: 2027-05-06
    lease_required: true
    telemetry:
      ritual_signal_emitted: true
      latency_budget_ms: 100
    reversibility_class: TRUTH_REWRITE

  # ─── new: calibration_rebuild ─
  - id: calibration_rebuild
    owner_module: src/calibration/manager.py
    intent: >
      Trigger a full rebuild of the calibration model family from the canonical
      observation surface. Distinct from calibration_persistence_write (which
      appends individual rows); a rebuild recomputes and overwrites the entire
      platt_models and calibration_pairs family for a strategy_key. Protects
      family-separation invariants and replay-correctness for Platt monotonicity.
    relationships:
      protects_invariants: [INV-15, INV-21]
      blocked_when:
        - settlement_window_freeze_active
    hard_kernel_paths:
      - src/calibration/manager.py
      - src/calibration/store.py
      - state/zeus_trades.db
    original_intent:
      intent_test: "diff triggers or modifies full calibration rebuild logic"
      does_not_fit: log_and_advisory
      scope_keywords: [calibration, rebuild, recompute, platt, family, full]
      out_of_scope_keywords: [paper, replay, backtest, mock]
    sunset_date: 2027-05-06
    lease_required: true
    telemetry:
      ritual_signal_emitted: true
      latency_budget_ms: 10000
    reversibility_class: TRUTH_REWRITE

  # ─── new: settlement_rebuild ─
  - id: settlement_rebuild
    owner_module: src/execution/harvester.py
    intent: >
      Recompute and overwrite canonical settlement rows for a historical window
      (P-E reconstruction or harvester re-run). Distinct from settlement_write
      (which appends a single new row); a rebuild may touch multiple rows
      identified by INV-14 identity (temperature_metric, physical_quantity,
      observation_field, data_version). Rollback requires Chronicler replay;
      severity TRUTH_REWRITE.
    relationships:
      protects_invariants: [INV-02, INV-14]
      blocked_when:
        - settlement_window_freeze_active
    hard_kernel_paths:
      - src/execution/harvester.py
      - src/contracts/settlement_semantics.py
      - src/state/db.py
      - state/zeus_trades.db
      - state/zeus-world.db
    original_intent:
      intent_test: "diff touches settlement rebuild, P-E reconstruction, or harvester re-run path"
      does_not_fit: refuse_with_advice
      scope_keywords: [settlement, rebuild, reconstruction, recompute, historical]
      out_of_scope_keywords: [paper, replay, backtest, mock]
    sunset_date: 2027-05-06
    lease_required: true
    telemetry:
      ritual_signal_emitted: true
      latency_budget_ms: 30000
    reversibility_class: TRUTH_REWRITE
