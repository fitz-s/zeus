    intent: >
      Move a file from an active surface to the historical archive
      (docs/operations/historical/ or equivalent). Archive promotion is
      irreversible by ordinary agent means; rollback requires git revert and
      must carry evidence that the promoted artifact is superseded by a
      current-authority replacement.
    relationships:
      protects_invariants: [INV-10]
      blocked_when: []
    hard_kernel_paths:
