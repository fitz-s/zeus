schema_version: 2
metadata:
  updated: '2026-06-23'
  owner: docs authority isolation rebuild
  purpose: >
    Question-first semantic boot profiles for Zeus tasks. These profiles route
    agents through active authority, canonical reference, scoped AGENTS, current
    fact pointers, and machine antibodies before code structure or historical
    evidence. They explicitly forbid default-reading packets, reports, evidence,
    rebuild notes, and archive bodies as present-tense law.
  authority_status: machine_boot_contract

required_profile_fields:
  - id
  - purpose
  - trigger_terms
  - required_reads
  - current_fact_surfaces
  - required_proofs
  - fatal_misreads
  - forbidden_shortcuts
  - graph_usage
  - verification_gates

required_task_classes:
  - money_path
  - probability_q
  - strategy_selection
  - execution_lifecycle
  - risk_sizing
  - data_replay
  - source_routing
  - settlement_semantics
  - day0_monitoring
  - docs_authority
  - graph_review
  - agent_runtime

allowed_graph_stages:
  - not_required
  - stage_2_after_semantic_boot

shared_default_reads:
  - AGENTS.md
  - workspace_map.md
  - docs/authority/zeus_current_architecture.md
  - docs/reference/zeus_prediction_market_quant_reference.md
  - architecture/fatal_misreads.yaml
  - architecture/negative_constraints.yaml

profiles:
  - id: money_path
    purpose: >
      Work touching any live-money path from contract/source/q through selection,
      sizing, execution, lifecycle, settlement, or learning.
    trigger_terms: [money path, live trade, candidate, qkernel, order, fill, settlement, lifecycle]
    required_reads:
      - AGENTS.md
      - workspace_map.md
      - docs/authority/zeus_current_architecture.md
      - docs/authority/zeus_current_delivery.md
      - docs/reference/zeus_prediction_market_quant_reference.md
      - architecture/money_path_objects.yaml
      - architecture/negative_constraints.yaml
      - architecture/db_table_ownership.yaml
      - architecture/fatal_misreads.yaml
    current_fact_surfaces:
      - docs/operations/current_state.md
      - docs/operations/current_data_state.md
      - docs/operations/current_source_validity.md
    required_proofs:
      - id: contract_before_probability
        question: Which family/bin/native side/settlement contract is being traded or protected?
        evidence:
          - docs/reference/zeus_market_settlement_reference.md
          - src/probability/outcome_space.py
          - src/contracts/settlement_semantics.py
      - id: current_code_over_prose
        question: Which current code path implements the claim, and is any prose stale?
        evidence:
          - docs/authority/zeus_current_architecture.md
          - architecture/module_manifest.yaml
    fatal_misreads:
      - code_review_graph_answers_where_not_what_settles
      - daily_day0_hourly_forecast_sources_are_not_interchangeable
      - source_family_false_equivalence
    forbidden_shortcuts:
      - Do not use packet/consult/report/rebuild history as present-tense law.
      - Do not skip contract/source truth and jump to q or execution.
      - Do not treat a partial family as a complete tradable Ω.
    graph_usage:
      stage: stage_2_after_semantic_boot
      authority_status: derived_not_authority
      use_for: [callers, callees, impacted files, tests]
      not_for: [semantic truth, current fact, settlement source, authority rank]
    verification_gates:
      - python3 scripts/topology_doctor.py --strict
      - python3 scripts/topology_doctor.py --fatal-misreads

  - id: probability_q
    purpose: >
      Work on forecast posterior, q, q_lcb/q_ucb, q-kernel predictive inputs,
      calibration, or probability certification.
    trigger_terms: [forecast, posterior, q_lcb, q_ucb, qkernel, probability, bayes fusion, EMOS, calibration]
    required_reads:
      - AGENTS.md
      - workspace_map.md
      - docs/authority/zeus_current_architecture.md
      - docs/reference/zeus_prediction_market_quant_reference.md
      - docs/reference/zeus_math_spec.md
      - docs/reference/zeus_data_and_replay_reference.md
      - src/data/AGENTS.md
      - src/calibration/AGENTS.md
      - architecture/db_table_ownership.yaml
      - architecture/negative_constraints.yaml
    current_fact_surfaces:
      - docs/operations/current_data_state.md
      - docs/operations/current_source_validity.md
    required_proofs:
      - id: q_carrier_live_eligibility
        question: Does the posterior/q carrier have live q mode, q_lcb/q_ucb maps, family topology, dependency/provenance, and freshness?
        evidence:
          - src/data/replacement_forecast_materializer.py
          - src/engine/event_reactor_adapter.py
      - id: lower_bound_coherence
        question: Is q_lcb a lower bound for the same probability/payoff random variable?
        evidence:
          - docs/reference/zeus_math_spec.md
          - src/probability/joint_q_band.py
          - src/decision/qlcb_reliability_guard.py
      - id: no_legacy_probability_resurrection
        question: Is any ENS/Platt/market_fusion/q_lcb_5pct surface being used only where current code proves it active?
        evidence:
          - src/engine/qkernel_spine_bridge.py
          - src/decision/family_decision_engine.py
    fatal_misreads:
      - code_review_graph_answers_where_not_what_settles
      - daily_day0_hourly_forecast_sources_are_not_interchangeable
    forbidden_shortcuts:
      - Do not derive NO lower bound from 1 - q_lcb_yes.
      - Do not let q_lcb exceed q for the same random variable.
      - Do not cite dated replacement papers as current authority.
    graph_usage:
      stage: stage_2_after_semantic_boot
      authority_status: derived_not_authority
      use_for: [call graph, tests, impacted q consumers]
      not_for: [q correctness, source freshness, settlement truth]
    verification_gates:
      - python3 scripts/topology_doctor.py --source
      - python3 scripts/topology_doctor.py --fatal-misreads

  - id: strategy_selection
    purpose: >
      Work on direction law, candidate admission, market coherence, payoff vector,
      robust utility selection, FDR, or no-trade reasons.
    trigger_terms: [strategy, direction law, buy_yes, buy_no, selection, payoff vector, edge_lcb, delta_u, no_trade]
    required_reads:
      - AGENTS.md
      - workspace_map.md
      - docs/authority/zeus_current_architecture.md
      - docs/reference/zeus_strategy_spec.md
      - docs/reference/zeus_math_spec.md
      - docs/reference/zeus_market_settlement_reference.md
      - src/strategy/AGENTS.md
      - architecture/negative_constraints.yaml
      - architecture/money_path_objects.yaml
    current_fact_surfaces:
      - docs/operations/current_data_state.md
    required_proofs:
      - id: native_side_and_direction
        question: Is the candidate legal for its native YES/NO side against the forecast settlement bin?
        evidence:
          - src/strategy/live_inference/direction_law.py
          - src/decision/family_decision_engine.py
      - id: executable_payoff_economics
        question: Does candidate economics use executable side/route cost and payoff vector over Ω?
        evidence:
          - src/decision/payoff_vector.py
          - src/strategy/utility_ranker.py
    fatal_misreads:
      - code_review_graph_answers_where_not_what_settles
    forbidden_shortcuts:
      - Do not select by scalar trade_score.
      - Do not admit non-modal YES from tail probability.
      - Do not treat NO as a complement-price shortcut.
    graph_usage:
      stage: stage_2_after_semantic_boot
      authority_status: derived_not_authority
      use_for: [selection callsites, tests]
      not_for: [direction law truth, native side semantics]
    verification_gates:
      - python3 scripts/topology_doctor.py --tests
      - python3 scripts/topology_doctor.py --fatal-misreads

  - id: execution_lifecycle
    purpose: >
      Work on executor, venue adapter, pre-submit witness, command persistence,
      idempotency, fills, monitor, exit, lifecycle, settlement, or redeem.
    trigger_terms: [execution, submit, order, venue, clob, command, idempotency, exit, monitor, harvester, lifecycle, settlement]
    required_reads:
      - AGENTS.md
      - workspace_map.md
      - docs/authority/zeus_current_architecture.md
      - docs/reference/zeus_execution_lifecycle_reference.md
      - docs/reference/zeus_market_settlement_reference.md
      - src/execution/AGENTS.md
      - src/state/AGENTS.md
      - src/venue/AGENTS.md
      - architecture/db_table_ownership.yaml
      - architecture/money_path_objects.yaml
    current_fact_surfaces:
      - docs/operations/current_state.md
    required_proofs:
      - id: command_before_side_effect
        question: Does durable command/idempotency truth precede venue side effect?
        evidence:
          - src/execution/executor.py
          - src/state/venue_command_repo.py
      - id: exit_not_settlement
        question: Does the change preserve exit intent, economic close, and settlement as separate facts?
        evidence:
          - src/execution/exit_lifecycle.py
          - src/state/lifecycle_manager.py
          - src/execution/harvester.py
      - id: chain_truth_precedence
        question: Does chain/CLOB truth outrank local cache without voiding on unknown?
        evidence:
          - src/state/chain_reconciliation.py
          - src/state/portfolio.py
    fatal_misreads:
      - code_review_graph_answers_where_not_what_settles
    forbidden_shortcuts:
      - Do not retry unknown side effects as empty.
      - Do not let final execution intent recompute q/edge/size.
      - Do not treat exit intent as close or settlement.
    graph_usage:
      stage: stage_2_after_semantic_boot
      authority_status: derived_not_authority
      use_for: [callers, side-effect blast radius, tests]
      not_for: [lifecycle grammar, chain truth, runtime status]
    verification_gates:
      - python3 scripts/topology_doctor.py --tests
      - python3 scripts/topology_doctor.py --fatal-misreads

  - id: risk_sizing
    purpose: >
      Work on Kelly/log-utility sizing, portfolio heat, exposure, RiskGuard,
      risk allocator, DATA_DEGRADED, or control/risk behavior.
    trigger_terms: [risk, sizing, Kelly, exposure, heat, DATA_DEGRADED, YELLOW, ORANGE, RED, allocator]
    required_reads:
      - AGENTS.md
      - workspace_map.md
      - docs/authority/zeus_current_architecture.md
      - docs/reference/zeus_risk_strategy_reference.md
      - docs/reference/zeus_strategy_spec.md
      - src/riskguard/AGENTS.md
      - src/risk_allocator/AGENTS.md
      - architecture/negative_constraints.yaml
      - architecture/money_path_objects.yaml
    current_fact_surfaces:
      - docs/operations/current_state.md
      - docs/operations/current_data_state.md
    required_proofs:
      - id: risk_changes_behavior
        question: Which evaluator/sizing/execution/cancel/exit behavior changes at each risk level?
        evidence:
          - src/riskguard/risk_level.py
          - src/risk_allocator/governor.py
      - id: executable_cost_sizing
        question: Is sizing based on executable side/cost curve rather than display/implied price?
        evidence:
          - src/contracts/execution_price.py
          - src/contracts/executable_cost_curve.py
          - src/decision/payoff_vector.py
    fatal_misreads:
      - code_review_graph_answers_where_not_what_settles
    forbidden_shortcuts:
      - Do not make risk advisory-only.
      - Do not encode live bankroll/current balances in durable docs.
      - Do not pass implied probability as Kelly-safe executable price.
    graph_usage:
      stage: stage_2_after_semantic_boot
      authority_status: derived_not_authority
      use_for: [risk/sizing callsites, tests]
      not_for: [current bankroll, live exposure truth]
    verification_gates:
      - python3 scripts/topology_doctor.py --tests
      - python3 scripts/topology_doctor.py --fatal-misreads

  - id: data_replay
    purpose: >
      Work on DB ownership, schemas, forecast/observation/settlement provenance,
      replay, backtest, or no-hindsight validation.
    trigger_terms: [database, schema, replay, backtest, provenance, settlement_outcomes, raw_model_forecasts, forecast_posteriors]
    required_reads:
      - AGENTS.md
      - workspace_map.md
      - docs/authority/zeus_current_architecture.md
      - docs/reference/zeus_data_and_replay_reference.md
      - architecture/db_table_ownership.yaml
      - architecture/source_rationale.yaml
      - architecture/test_topology.yaml
    current_fact_surfaces:
      - docs/operations/current_data_state.md
      - docs/operations/current_source_validity.md
    required_proofs:
      - id: table_db_ownership
        question: Which physical DB owns each touched table?
        evidence:
          - architecture/db_table_ownership.yaml
          - src/state/db.py
      - id: point_in_time_replay
        question: Does replay use only decision-time information and settlement grading?
        evidence:
          - docs/reference/zeus_data_and_replay_reference.md
          - src/engine/replay.py
    fatal_misreads:
      - daily_day0_hourly_forecast_sources_are_not_interchangeable
      - code_review_graph_answers_where_not_what_settles
    forbidden_shortcuts:
      - Do not join cross-DB truth through unsanctioned independent connections.
      - Do not use backtest/shadow as live authority.
      - Do not mix high/low or source roles in replay labels.
    graph_usage:
      stage: stage_2_after_semantic_boot
      authority_status: derived_not_authority
      use_for: [schema callers, tests, blast radius]
      not_for: [DB truth ownership, current data freshness]
    verification_gates:
      - python3 scripts/topology_doctor.py --source
      - python3 scripts/topology_doctor.py --tests

  - id: source_routing
    purpose: >
      Decide which source family, station, unit, product, and date-scoped evidence
      may be used for a city before editing ingest, source routing, or source docs.
    trigger_terms: [source, routing, station, endpoint, WU, HKO, NOAA, Ogimet, city source]
    required_reads:
      - AGENTS.md
      - workspace_map.md
      - docs/authority/zeus_current_architecture.md
      - docs/reference/zeus_market_settlement_reference.md
      - docs/reference/zeus_data_and_replay_reference.md
      - docs/operations/current_source_validity.md
      - docs/operations/current_data_state.md
      - config/cities.json
      - architecture/source_rationale.yaml
      - architecture/city_truth_contract.yaml
      - architecture/fatal_misreads.yaml
    current_fact_surfaces:
      - docs/operations/current_source_validity.md
      - docs/operations/current_data_state.md
    required_proofs:
      - id: settlement_source_by_city_date
        question: Which source family settles this city/date, and is evidence fresh enough?
        evidence:
          - docs/operations/current_source_validity.md
          - architecture/city_truth_contract.yaml
      - id: source_family_not_endpoint_health
        question: Does the chosen source prove semantic correctness, not just HTTP availability?
        evidence:
          - docs/reference/zeus_market_settlement_reference.md
          - architecture/fatal_misreads.yaml
    fatal_misreads:
      - api_returns_data_not_settlement_correct_source
      - airport_station_not_city_settlement_station
      - hong_kong_hko_explicit_caution_path
      - source_family_false_equivalence
    forbidden_shortcuts:
      - Do not treat endpoint 200/data presence as settlement-source proof.
      - Do not infer city settlement source from airport code, station code, or config comments alone.
      - Do not use historical source routing as current routing without fresh audit evidence.
    graph_usage:
      stage: stage_2_after_semantic_boot
      authority_status: derived_not_authority
      use_for: [impacted files, callers, tests]
      not_for: [settlement truth, source validity, city/date authority]
    verification_gates:
      - python3 scripts/topology_doctor.py --source
      - python3 scripts/topology_doctor.py --fatal-misreads

  - id: settlement_semantics
    purpose: >
      Work on market resolution, rounding, settlement values, harvester writes,
      or replay labels without collapsing source truth into generic daily-weather assumptions.
    trigger_terms: [settlement, resolution, rounding, harvester, market settles, oracle, HKO]
    required_reads:
      - AGENTS.md
      - workspace_map.md
      - docs/authority/zeus_current_architecture.md
      - docs/reference/zeus_market_settlement_reference.md
      - docs/reference/zeus_domain_model.md
      - docs/operations/current_source_validity.md
      - architecture/city_truth_contract.yaml
      - architecture/fatal_misreads.yaml
    current_fact_surfaces:
      - docs/operations/current_source_validity.md
    required_proofs:
      - id: settlement_value_path
        question: Which source, unit, and rounding law produce the settlement value for this market?
        evidence:
          - src/contracts/settlement_semantics.py
          - docs/operations/current_source_validity.md
          - architecture/city_truth_contract.yaml
      - id: dual_track_separation
        question: Does this high/low family preserve separate physical quantity and calibration identity?
        evidence:
          - docs/authority/zeus_current_architecture.md
          - docs/reference/zeus_market_settlement_reference.md
    fatal_misreads:
      - daily_day0_hourly_forecast_sources_are_not_interchangeable
      - airport_station_not_city_settlement_station
      - hong_kong_hko_explicit_caution_path
    forbidden_shortcuts:
      - Do not treat all cities as one settlement rule.
      - Do not mix HIGH and LOW settlement, replay, or calibration identities.
      - Do not bypass SettlementSemantics for DB/event settlement writes.
    graph_usage:
      stage: stage_2_after_semantic_boot
      authority_status: derived_not_authority
      use_for: [callers, tests, blast radius]
      not_for: [rounding law, city source truth]
    verification_gates:
      - python3 scripts/topology_doctor.py --fatal-misreads
      - python3 scripts/topology_doctor.py --tests

  - id: day0_monitoring
    purpose: >
      Work on same-day monitoring, Day0 nowcast, exits, or observed-so-far logic
      with correct source role and high/low causality.
    trigger_terms: [Day0, day0, monitor, nowcast, observed so far, exit trigger]
    required_reads:
      - AGENTS.md
      - workspace_map.md
      - docs/authority/zeus_current_architecture.md
      - docs/reference/zeus_execution_lifecycle_reference.md
      - docs/reference/zeus_market_settlement_reference.md
      - docs/operations/current_source_validity.md
      - docs/operations/current_data_state.md
      - architecture/city_truth_contract.yaml
      - architecture/fatal_misreads.yaml
    current_fact_surfaces:
      - docs/operations/current_source_validity.md
      - docs/operations/current_data_state.md
    required_proofs:
      - id: day0_source_vs_settlement_source
        question: Is the live Day0 monitor source same as settlement for this city/date, or explicitly different?
        evidence:
          - docs/operations/current_source_validity.md
          - docs/operations/current_data_state.md
          - architecture/city_truth_contract.yaml
      - id: held_quote_not_posterior_prior
        question: Are held-token quotes used only for executable exit economics, not corrected posterior prior evidence?
        evidence:
          - architecture/negative_constraints.yaml
          - docs/reference/zeus_execution_lifecycle_reference.md
    fatal_misreads:
      - daily_day0_hourly_forecast_sources_are_not_interchangeable
      - hourly_downsample_preserves_extrema
      - code_review_graph_answers_where_not_what_settles
    forbidden_shortcuts:
      - Do not use settlement-daily truth as proof that live Day0 monitoring is fresh.
      - Do not reuse high-temperature max logic for low-temperature min logic.
      - Do not use stale current_data_state as green for live monitoring.
    graph_usage:
      stage: stage_2_after_semantic_boot
      authority_status: derived_not_authority
      use_for: [callers, tests, impacted monitor paths]
      not_for: [live source validity, data freshness]
    verification_gates:
      - python3 scripts/topology_doctor.py --fatal-misreads
      - python3 scripts/topology_doctor.py --tests

  - id: docs_authority
    purpose: >
      Change docs, AGENTS, packets, docs registry, authority/reference routing,
      archive/demotion policy, or current-fact surfaces without contaminating
      the default boot path.
    trigger_terms: [docs, authority, packet, registry, current_state, reference, archive, evidence, report, AGENTS]
    required_reads:
      - AGENTS.md
      - workspace_map.md
      - docs/AGENTS.md
      - docs/README.md
      - docs/authority/zeus_current_architecture.md
      - docs/authority/zeus_current_delivery.md
      - docs/authority/ARCHIVAL_RULES.md
      - docs/reference/AGENTS.md
      - docs/operations/AGENTS.md
      - architecture/docs_registry.yaml
      - architecture/reference_replacement.yaml
      - architecture/module_manifest.yaml
      - architecture/fatal_misreads.yaml
    current_fact_surfaces:
      - docs/operations/current_state.md
    required_proofs:
      - id: authority_reference_current_evidence_isolation
        question: Which surfaces are durable authority, canonical reference, current fact, or evidence/history?
        evidence:
          - docs/authority/zeus_current_delivery.md
          - docs/authority/ARCHIVAL_RULES.md
          - architecture/docs_registry.yaml
      - id: no_packet_default_route
        question: Does any AGENTS/README/manifest route default agents into packet/evidence/report/rebuild/archive bodies?
        evidence:
          - AGENTS.md
          - workspace_map.md
          - docs/README.md
          - architecture/docs_registry.yaml
    fatal_misreads:
      - code_review_graph_answers_where_not_what_settles
      - artifact_authority_status_missing_gate
    forbidden_shortcuts:
      - Do not promote archives, reports, consults, or packet evidence by reference.
      - Do not leave new docs or architecture files unregistered.
      - Do not leave current_state pointing at closed work.
      - Do not put current operational facts in authority/reference.
    graph_usage:
      stage: not_required
      authority_status: derived_not_authority
      use_for: []
      not_for: [authority classification, current packet truth]
    verification_gates:
      - python3 scripts/topology_doctor.py --strict
      - python3 scripts/topology_doctor.py --fatal-misreads

  - id: graph_review
    purpose: >
      Use Code Review Graph for review/debug routing without letting structural
      graph evidence answer semantic source, settlement, or current-fact questions.
    trigger_terms: [graph, Code Review Graph, CRG, impact, blast radius, review]
    required_reads:
      - AGENTS.md
      - workspace_map.md
      - architecture/task_boot_profiles.yaml
      - architecture/fatal_misreads.yaml
      - architecture/source_rationale.yaml
    current_fact_surfaces: []
    required_proofs:
      - id: semantic_boot_before_graph
        question: Has the task class been identified before graph impact analysis?
        evidence:
          - architecture/task_boot_profiles.yaml
          - architecture/fatal_misreads.yaml
      - id: graph_is_derived_context
        question: Is graph output used only for where/impact/review order?
        evidence:
          - AGENTS.md
          - workspace_map.md
    fatal_misreads:
      - code_review_graph_answers_where_not_what_settles
    forbidden_shortcuts:
      - Do not let graph results waive required reads, proofs, planning lock, or tests.
      - Do not ask graph to decide settlement/source/current truth.
      - Do not treat graph output as authority rank.
    graph_usage:
      stage: stage_2_after_semantic_boot
      authority_status: derived_not_authority
      use_for: [impacted files, callers, tests, review order]
      not_for: [semantic truth, source validity, packet authority]
    verification_gates:
      - python3 scripts/topology_doctor.py --fatal-misreads

  - id: agent_runtime
    purpose: >
      Change topology/graph workflow behavior while keeping agent guidance short,
      claim-scoped, and non-authoritative.
    trigger_terms: [agent runtime, route card, typed intent, risk tier, claim-scoped, skill policy]
    required_reads:
      - AGENTS.md
      - workspace_map.md
      - docs/authority/zeus_current_delivery.md
      - architecture/task_boot_profiles.yaml
      - architecture/context_pack_profiles.yaml
      - architecture/docs_registry.yaml
    current_fact_surfaces:
      - docs/operations/current_state.md
    required_proofs:
      - id: runtime_guidance_not_authority
        question: Is workflow/skill guidance emitted as generated context rather than repo law?
        evidence:
          - architecture/context_pack_profiles.yaml
          - docs/authority/zeus_current_delivery.md
      - id: no_default_evidence_route
        question: Does the workflow avoid default-reading evidence/history/packet bodies?
        evidence:
          - architecture/docs_registry.yaml
          - docs/operations/AGENTS.md
    fatal_misreads:
      - code_review_graph_answers_where_not_what_settles
    forbidden_shortcuts:
      - Do not make route cards or context packs authority surfaces.
      - Do not require graph refresh for tasks that make no graph-impact claim.
      - Do not turn skill-use guidance into mandatory ceremony for T0/T1 work.
    graph_usage:
      stage: not_required
      authority_status: derived_not_authority
      use_for: [optional review order, optional impact hints]
      not_for: [semantic truth, source validity, packet authority, write authorization]
    verification_gates:
      - python3 scripts/topology_doctor.py --strict
