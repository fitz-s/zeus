      # maker/taker mode. The proven proof execution_mode_intent flows to the final
      # intent; any final-stage mode change (incl. missing/unknown mode, fail-closed)
      # is a first-class abort that defers to a full re-rank next cycle.
      - SUBMIT_ABORTED_MODE_FLIPPED
      - PARTIAL_FILL
    invariant_tests:
      - tests/test_stake_min_order_not_edge_reversed.py
      - tests/test_day0_exposure_cap_kernel.py
      - tests/engine/test_final_submit_mode_authority.py

