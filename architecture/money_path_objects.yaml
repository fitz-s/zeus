schema_version: 1
metadata:
  created: "2026-05-21"
  owner: "Zeus CI infrastructure"
  purpose: >
    Machine-readable registry of money-path economic objects, state machines,
    external truth surfaces, strategy identity, scheduler jobs, and migration
    semantics. Unknown money-path objects are unsafe until registered here and
    routed through architecture/money_path_ci.yaml.
  authority_basis:
    - AGENTS.md money path
    - architecture/test_topology.yaml test trust policy
    - docs/authority/zeus_current_delivery.md CI governance

economic_objects:
  probability:
    fields:
      p_raw:
        meaning: "Forecast/model raw probability before calibration."
        allowed_modules: [src/signal/**, src/engine/evaluator.py, src/calibration/**]
        forbidden_uses: ["order price", "market prior", "settlement probability"]
      p_cal:
        meaning: "Calibrated probability after Platt/family correction."
        allowed_modules: [src/calibration/**, src/engine/**, src/strategy/**]
      p_market:
        meaning: "Market prior or quote-implied probability; never executable fill price."
        forbidden_uses: ["submitted limit price", "fill fact"]
      p_posterior:
        meaning: "Posterior after model/source/market fusion."
      edge:
        meaning: "Posterior minus executable cost basis after fees/spread/depth in live mode."
  price:
    fields:
      display_price:
        meaning: "UI/display or last-trade substitute; never executable cost."
        live_entry_allowed: false
      market_price:
        meaning: "Ambiguous legacy alias; new use must declare executable bid/ask or display role."
        ambiguous: true
      current_price:
        meaning: "Ambiguous legacy alias; new use must declare executable bid/ask or display role."
        ambiguous: true
      orderbook_top_bid:
        meaning: "Best executable sell price for held-token exit."
      orderbook_top_ask:
        meaning: "Best executable buy cost."
      final_limit_price:
        meaning: "Submitted limit price."
      limit_price:
        meaning: "Limit price candidate; must become final_limit_price before submit."
      fill_price:
        meaning: "Venue execution fact."
      settlement_value:
        meaning: "Weather/source settlement physical value."
      mid:
        meaning: "Market mid-price (bid-ask midpoint); used in price-discovery rate estimation for shadow candidates. Never executable fill price."
        live_entry_allowed: false
        forbidden_uses: ["submitted limit price", "fill fact"]
  identity:
    fields:
      market_id:
        meaning: "Gamma market identifier unless caller explicitly declares condition_id surface."
        ambiguous: true
      condition_id:
        meaning: "Polymarket condition id."
      token_id:
        meaning: "ERC1155 outcome token id."
      outcome_label:
        meaning: "Outcome side label."
        allowed_values: [YES, NO]
      weather_family_key:
        meaning: "City/date/metric mutually-exclusive family identity."
      strategy_key:
        meaning: "Sole governance identity for attribution/risk/performance slicing."
  time:
    fields:
      decision_time:
        meaning: "When Zeus decided."
      zeus_submit_intent_time:
        meaning: "When Zeus persisted/finalized submit intent."
      venue_ack_time:
        meaning: "Venue acknowledgement time."
      fill_time:
        meaning: "Venue fill observation time."
      observation_available_at:
        meaning: "Source observation availability time."
      settlement_time:
        meaning: "Settlement source finality time."

state_machines:
  venue_command:
    owner: src/state/venue_command_repo.py
    states:
      - INTENT_CREATED
      - SUBMITTING
      - ACKED
      - POST_ACKED
      - PARTIAL
      - FILLED
      - UNKNOWN
      - SUBMIT_UNKNOWN_SIDE_EFFECT
      - REVIEW_REQUIRED
      - SUBMIT_REJECTED
    invariant_tests:
      - tests/money_path/test_002_execution_lifecycle_replay.py
      - tests/test_command_recovery.py
      - tests/test_order_truth_reducer.py
  settlement_command:
    owner: src/execution/harvester.py
    states:
      - REDEEM_INTENT_CREATED
      - REDEEM_SUBMITTED
      - REDEEM_TX_HASHED
      - REDEEM_CONFIRMED
      - REDEEM_FAILED
      - REDEEM_RETRYING
      - REDEEM_REVIEW_REQUIRED
      - REDEEM_OPERATOR_REQUIRED
    invariant_tests:
      - tests/money_path/test_003_redeem_receipt_classifier.py
      - tests/test_harvester_settlement_redeem.py
      - tests/test_polymarket_v2_adapter_negrisk_redeem.py
    overloaded_states:
      REDEEM_OPERATOR_REQUIRED:
        risk: "Manual-required and autoretryable error classes may be conflated."
        required_fields: [errorCode, operator_action_required, autoretry_eligible]
  order_truth:
    owner: src/execution/order_truth_reducer.py
    states:
      - TERMINAL_NO_FILL
      - TERMINAL_FILLED
      - TERMINAL_PARTIAL
      - PARTIAL_WITH_REMAINDER
      - LIVE_RESTING
      - UNKNOWN_SIDE_EFFECT
      - REVIEW_REQUIRED
    invariant_tests:
      - tests/test_order_truth_reducer.py
      - tests/test_exchange_reconcile.py
      - tests/money_path/test_002_execution_lifecycle_replay.py
  lifecycle_phase:
    owner: src/state/lifecycle_manager.py
    states:
      - pending_entry
      - active
      - day0_window
      - pending_exit
      - economically_closed
      - settled
      - voided
      - quarantined
      - admin_closed
      - unknown
    invariant_tests:
      - tests/test_lifecycle_terminal_predicate.py
      - tests/test_exchange_reconcile.py
  position_event:
    owner: src/engine/lifecycle_events.py
    description: >
      Canonical world-position lifecycle event_type values from
      architecture/2026_04_02_architecture_kernel.sql. These are not command
      states; they are append-only position event grammar used by projections
      and execution-fact repair.
    states:
      - POSITION_OPEN_INTENT
      - ENTRY_ORDER_POSTED
      - ENTRY_ORDER_FILLED
      - ENTRY_ORDER_VOIDED
      - ENTRY_ORDER_REJECTED
      - DAY0_WINDOW_ENTERED
      - CHAIN_SYNCED
      - CHAIN_SIZE_CORRECTED
      - CHAIN_QUARANTINED
      - MONITOR_REFRESHED
      - EXIT_INTENT
      - EXIT_ORDER_POSTED
      - EXIT_ORDER_FILLED
      - EXIT_ORDER_VOIDED
      - EXIT_ORDER_REJECTED
      - SETTLED
      - ADMIN_VOIDED
      - MANUAL_OVERRIDE_APPLIED
    invariant_tests:
      - tests/test_command_recovery.py
      - tests/test_exchange_reconcile.py
      - tests/test_lifecycle_terminal_predicate.py
  shoulder_readiness:
    owner: scripts/shoulder_shadow_readiness_report.py
    description: >
      Shadow-readiness evaluation enum for shoulder strategy. NOT a money-path
      state machine — this is a reporting/operator-review gate only. Registered
      here to satisfy the CI semantic classifier's all-caps REVIEW-prefix check.
    states:
      - INSUFFICIENT_SHADOW
      - INSUFFICIENT_STRESS_COVERAGE
      - INSUFFICIENT_REGIME_COVERAGE
      - READY_FOR_OPERATOR_REVIEW
    invariant_tests:
      - tests/test_shoulder_shadow_readiness_report.py
  redeem_review_error_code:
    owner: src/execution/settlement_commands.py
    description: >
      settlement_commands.error_payload.errorCode labels that route a redeem to
      REDEEM_REVIEW_REQUIRED. These are not command states; they are review
      classifications that determine whether a row can be automatically
      rechecked or must remain operator-reviewed.
    states:
      - REDEEM_NEGRISK_AMOUNT_MISMATCH
      - REDEEM_STANDARD_CTF_AMOUNT_MISMATCH
      - REDEEM_STANDARD_CTF_AMOUNT_MISSING
      - REDEEM_STANDARD_CTF_REVIEW_REQUIRED
      - REDEEM_STANDARD_CTF_WRONG_CONDITION
      - REDEEM_STANDARD_CTF_ZERO_PAYOUT
    invariant_tests:
      - tests/test_negrisk_redeem_payout_proof.py
      - tests/test_redeem_cascade_liveness.py
      - tests/test_settlement_commands.py
  live_runtime_config:
    owner: src/strategy/family_exclusive_dedup.py
    description: >
      Live runtime feature/config knobs that influence money-path candidate
      routing without adding command/lifecycle states. Registered here so
      CI treats new all-caps runtime authority as explicit, not accidental.
    states:
      - ZEUS_LIVE_FAMILY_EXECUTABLE_FALLBACK_CANDIDATES
      - ZEUS_ALLOW_LEGACY_EXECUTION_INTENT
      - ZEUS_LEGACY_EXECUTION_INTENT_SCOPE
    invariant_tests:
      - tests/test_inv_family_exclusive_sizing.py
      - tests/test_inv_family_exclusive_cross_module_integration.py
      - tests/test_executor.py
  business_plane_health:
    owner: src/control/live_health.py
    description: >
      Composite live-health business-plane degradation reasons. These are
      operator-facing state labels for process-alive but trading-progress-dead
      conditions; they do not mutate command, lifecycle, or settlement truth.
    states:
      - ZERO_CANDIDATES_WITHOUT_SOURCE_OR_NO_MARKET_PROOF
      - CANDIDATES_WITHOUT_FINAL_INTENTS_OR_NO_TRADE_REASONS
      - FINAL_INTENTS_WITHOUT_SUBMIT_ATTEMPTS
      - SUBMIT_ATTEMPTS_WITHOUT_ACK_OR_DETERMINISTIC_REJECTION
    invariant_tests:
      - tests/test_run_mode_failure_surfaces.py
  settlement_outcome:
    owner: src/contracts/settlement_outcome.py
    description: >
      Phase 7 settlement lifecycle enum (SettlementOutcome IntEnum). 10-state
      typed gate replacing social umaResolutionStatus string comparisons.
      Position.lifecycle_state field; settlements_v2.outcome_type column.
      Transitions are monotonic-forward; OBSERVATION_REVISED routes only to
      SOURCE_REVISION or DISPUTED.
    states:
      - UNRESOLVED
      - PHYSICALLY_CONFIRMED
      - SOURCE_PUBLISHED_VENUE_UNRESOLVED
      - VENUE_RESOLVED_WIN
      - VENUE_RESOLVED_LOSE
      - REDEEMED
      - OBSERVATION_REVISED
      - DISPUTED
      - UMA_UNKNOWN_50_50
      - SOURCE_REVISION
    invariant_tests:
      - tests/contracts/test_settlement_outcome.py
      - tests/test_position_lifecycle_state.py
  operations_governance_classification:
    owner: scripts/operations_package_inventory.py
    description: >
      Docs-governance classification enum used by the operations package inventory
      report. NOT a money-path state machine — these are operator-facing labels for
      classifying stale/active documentation packets, not trading commands or
      lifecycle states. Registered here because the CI semantic classifier's
      ACK-prefix check fires on pACKage/pACKet substrings within CURRENT_PACKAGE_INPUT
      and PACKET, and the UNKNOWN prefix fires on UNKNOWN_OPERATOR_DECISION.
    states:
      - CURRENT_PACKAGE_INPUT
      - UNKNOWN_OPERATOR_DECISION
      - PACKET
    invariant_tests:
      - tests/topology/test_operations_package_inventory.py
  forecast_extrema_authority:
    owner: src/data/forecast_extrema_authority.py
    description: >
      Forecast-snapshot extrema-contribution eligibility classes +
      executable-forecast-reader block-reason codes (P0 2026-05-22). NOT a
      money-path command/lifecycle machine; registered so the CI semantic
      classifier treats the new all-caps authority constants as explicit, not
      accidental. They classify whether an ensemble snapshot's local-day window
      contributes to the target daily-extrema, and gate live selection so a
      post-peak non-contributing run cannot be used as daily-high authority.
      P0 follow-up (2026-05-23): selection lifted to the full forecast-bundle
      layer (enumerate all source_run_coverage cycles, rank by extrema authority);
      NULL contribution now fails closed for CURRENT data_versions (UNKNOWN) and
      passes through only for legacy versions (LEGACY_NULL_PASSTHROUGH, recorded
      in applied_validations).
      Authority: docs/operations/P0_FORECAST_EXTREMA_AUTHORITY_2026-05-22.md
      (bundle-layer selection design archived in that doc; prior .claude/jobs scratchpad
      path was non-repo-verifiable and has been removed).
    states:
      - FULL_CONTRIBUTOR
      - PARTIAL_CONTRIBUTOR
      - NON_CONTRIBUTOR
      - UNKNOWN
      - LEGACY_NULL_PASSTHROUGH
      - EXECUTABLE_FORECAST_NON_CONTRIBUTING_EXTREMA
      - EXECUTABLE_FORECAST_EXTREMA_AUTHORITY_UNKNOWN
    invariant_tests:
      - tests/test_forecast_extrema_authority.py
      - tests/test_forecast_offset_fix_regression.py
      - tests/test_executable_forecast_bundle_selection.py
  executable_forecast_bundle_result:
    owner: src/data/executable_forecast_reader.py
    description: >
      Status leg of ExecutableForecastBundleResult returned by read_executable_forecast()
      and per-candidate gate codes from _evaluate_candidate() — not a command/lifecycle
      machine; registered so the CI semantic classifier treats these all-caps reader
      statuses as explicit. BLOCKED = gated reject with a reason_code;
      UNKNOWN_BLOCKED = decision-time/readiness inputs unusable (e.g. READINESS_NOW_INVALID);
      SOURCE_RUN_PARTIAL = source run completeness does not meet COMPLETE threshold.
      Added 2026-05-23 during P0 bundle-layer lift (branch p0-forecast-bundle-layer-20260523).
    states:
      - BLOCKED
      - UNKNOWN_BLOCKED
      - SOURCE_RUN_PARTIAL
    invariant_tests:
      - tests/test_executable_forecast_bundle_selection.py
      - tests/test_executable_forecast_reader_member_floor.py
  ci_gate_env_var_keys:
    owner: .github/workflows/architecture_advisory_gates.yml
    description: >
      CI gate configuration env var keys used across workflow files to document
      when to review or sunset a gate. NOT a state machine — these are string
      literals used as YAML dict keys in .github/workflows/*.yml env: blocks.
      Registered here because the REVIEW prefix in GATE_REVIEW_CONDITION fires
      the semantic classifier's REVIEW-prefix state check when this key appears
      as a string literal in scripts/check_advisory_gates.py.
    states:
      - GATE_REVIEW_CONDITION
  schema_migration_sql_ops:
    owner: scripts/migrate_model_bias_ens_v2_canonical_fields.py
    description: >
      Raw SQL transaction operations used in schema migration scripts for
      race-safe ALTER TABLE patterns. NOT a money-path state machine — these are
      SQLite transaction control statements used in idempotent migration helpers.
      Registered here because the "ACK" substring in ROLLBACK fires the semantic
      classifier's ACK-prefix state check when the string literal "ROLLBACK"
      appears in conn.execute() calls. (Zeus #64 PR #342)
    states:
      - ROLLBACK
    invariant_tests: []
  decision_integrity_quarantine_reason_codes:
    owner: src/state/decision_integrity_quarantine.py
    description: >
      Reason code constants written into decision_integrity_quarantine.reason_code
      (PR-E 2026-05-23). NOT a lifecycle state machine — each constant names a
      specific taint category applied to fact-table rows. Registered so the CI
      semantic classifier treats the all-caps constant as explicit, not accidental.
      Tables tagged: opportunity_fact, calibration_pairs_v2, probability_trace_fact,
      selection_family_fact, selection_hypothesis_fact, decision_events.
      Tables skipped (no single-column row_id): no_trade_events, shadow_experiments,
      calibration_pairs (legacy).
      Authority: docs/operations/P0_FORECAST_EXTREMA_AUTHORITY_2026-05-22.md §PR-E.
    states:
      - QUARANTINED_NON_CONTRIBUTING_FORECAST_EXTREMA
    invariant_tests:
      - tests/test_decision_integrity_quarantine.py
      - tests/test_decision_integrity_quarantine_extended.py

  obs_coverage_status:
    description: >
      Observation coverage status emitted by ObservationClient and stamped on
      settlement_day_observation_authority rows. DIAGNOSTIC_FALLBACK indicates
      the obs pipeline returned a result but via a degraded/fallback path (e.g.
      stale open-meteo archive). Observability-only — never gates a trade.
      OBS-AUTHORITY-FOUNDATION 2026-05-23.
    states:
      - DIAGNOSTIC_FALLBACK

  collection_frontier:
    owner: src/data/collection_frontier.py
    description: >
      ADVISORY data-collection temporal-frontier vocabulary (PR #329 data_temporal_kernel).
      NOT a trading lifecycle: these are read-only blocker/disposition tokens describing
      forecast/source-collection readiness UPSTREAM of the money path. Registered so the
      money-path semantic-diff classifier recognizes the tokens this advisory layer introduces
      (per mesh-maintenance: new semantic vocabulary must be registered). They never gate a
      trade; the live trading lane consumes readiness_state, not these labels.
    states:
      - OK                            # collection_frontier live_blocker values
      - NOT_RELEASED
      - STALE_SOURCE
      - SOURCE_DOWN
      - PARTIAL_RUN
      - READINESS_BLOCKED
      - NOT_LIVE_AUTHORIZED
      - UNKNOWN_BLOCKED
      - SHORT_HORIZON_ONLY
      - COVERAGE_UNKNOWN
      - BLOCK_LIVE                     # PartialPolicy values
      - SHADOW_ONLY
      - REPLACE_SAME_IDEMPOTENCY_KEY   # LateArrivalPolicy values
      - APPEND_REVISION
      - QUARANTINE
      - IGNORE_IF_LIVE_CLOSED
      - BACKFILL_ONLY
      - DERIVED_FROM_DISSEMINATION   # source_time_frontier authority_tier values (PR #329 D)
      - BACKFILL
      - RECONSTRUCTED
      - UNVERIFIED
    invariant_tests:
      - tests/test_collection_frontier.py
      - tests/test_temporal_provenance_and_lanes.py
      - tests/test_frontier_store.py

schema_objects:
  authority_fabricating_defaults:
    - VERIFIED
    - gamma_explicit
    - LIVE_ELIGIBLE
    - live_eligible
    - explicit_verified
  protected_tables:
    world: [markets, positions, position_current, lifecycle_events]
    forecasts: [observations, settlements, calibration_pairs_v2, ensemble_snapshots_v2, source_run, market_events_v2]
    trades: [venue_commands, venue_order_facts, venue_trade_facts, settlement_commands]
  historical_truth_policy_required_for:
    - scripts/migrations/**
    - scripts/migrate_*.py
  observability_surfaces:
    # OBS-AUTHORITY-FOUNDATION 2026-05-23. Persisted, auditable settlement-day
    # observation authority. Observability only — these objects record runtime
    # observation truth + per-edge day0 classification so the operator can audit
    # whether a tradeable-price day0 edge is observation-locked, forecast-upside,
    # or wrong-date/source. NOT executable economic objects; do not gate trades.
    settlement_day_observation_authority:
      db: trade
      pk: authority_id
      writer: src/state/db.py::log_settlement_day_observation_authority
      written_from: src/engine/cycle_runtime.py::execute_discovery_phase
      builder: src/engine/cycle_runtime.py::build_settlement_day_observation_authority_row
      meaning: >
        One row per settlement-day/day0 candidate at decision time (including
        MISSING/STALE/LOW coverage failure cases). Captures high_so_far /
        low_so_far / current_temp / source / station_id / observation_time +
        derived audit flags local_date_matches_target,
        source_authorized_for_settlement, persisted_surface_available.
      required_tests: [tests/test_settlement_day_observation_authority.py]
    opportunity_fact_day0_context:
      fields: [observation_authority_id, day0_context_json]
      table: opportunity_fact
      meaning: >
        observation_authority_id FKs an opportunity row to its
        settlement_day_observation_authority row. day0_context_json holds the
        per-edge day0 truth classification (observation_locked /
        observation_floor_plus_forecast_upside / observation_excludes_bin /
        observation_partial_unresolved / observation_unknown) + observed
        high/low + candidate bin bounds + settlement_capture eligibility.
      classification_source: src/engine/evaluator.py::day0_high_truth_classification_for_edge
      required_tests: [tests/test_settlement_day_observation_authority.py]

external_truth_sources:
  gamma:
    authority_tier: market_metadata
    endpoint_patterns: [gamma-api.polymarket.com, /markets, /events]
    required_tests: [tests/test_market_scanner_provenance.py, tests/test_scanner_archived_filter.py]
  clob:
    authority_tier: executable_venue
    endpoint_patterns: [clob.polymarket.com, /book, /orders, /trades]
    required_tests: [tests/test_executable_market_snapshot_v2.py, tests/test_order_truth_reducer.py]
  ecmwf:
    authority_tier: forecast_source
    endpoint_patterns: [ecmwf, open-data, tigge]
    required_tests: [tests/test_tigge_schema_contract.py, tests/test_executable_forecast_reader_member_floor.py]
  weather_observation:
    authority_tier: settlement_observation
    endpoint_patterns: [wunderground, weather.com, hko, noaa, ogimet]
    required_tests: [tests/test_ingest_boot_time_semantics.py, tests/test_settlement_semantics.py]
  polygon_rpc:
    authority_tier: chain_truth
    endpoint_patterns: [polygon-rpc, eth_sendRawTransaction, eth_call]
    required_tests: [tests/test_polymarket_v2_adapter_negrisk_redeem.py]

side_effect_calls:
  submit_order:
    patterns: [client.submit, submit_order, create_order, place_limit_order, place_market_order, post_order, build_order]
    required_invariants: [MP-SIDE-001, MP-SIDE-002, MP-SIDE-003]
  redeem:
    patterns: [adapter.redeem, redeemPositions, eth_sendRawTransaction]
    required_invariants: [MP-RED-001, MP-RED-002, MP-SIDE-001]
  cancel:
    patterns: [cancel_order, cancel_orders]
    required_invariants: [MP-ORD-003, MP-SIDE-001]
  canonical_event_write:
    patterns: [append_event, append_order_fact, append_trade_fact, write_decision_event, write_no_trade_event]
    required_invariants: [MP-SIDE-001, MP-SCH-001]

scheduler_jobs:
  imminent_open_capture:
    produces: [market_scan_progress, evaluated_candidates, decision_or_no_trade_event]
    stale_after_seconds: 900
    blocking_for_live: true
  redeem_reconciler:
    produces: [redeem_command_progress, redeem_receipt_classification]
    stale_after_seconds: 900
    blocking_for_live: true
