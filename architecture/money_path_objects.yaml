    description: >
      ReversalReason enum — why a redecision was triggered (spec §3/§7 reversal
      taxonomy). SUBMIT means the candidate failed submit recapture (fail-closed).
      MIN_ORDER: edge positive at min order but the sized stake could not clear it.
      DAY0_CAP: the per-family day0 notional cap bounded the feasible stake.
      MODE_FLIPPED: the final-submit maker/taker mode no longer matches the proven
      proof execution_mode_intent (2026-06-10 P0 mode-authority); first-class
      order-TYPE reversal, distinct from FAMILY_RANK / EDGE / PRICE.
