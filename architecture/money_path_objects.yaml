schema_version: 1
metadata:
  created: "2026-05-21"
  owner: "Zeus CI infrastructure"
  purpose: >
    Machine-readable registry of money-path economic objects, state machines,
    external truth surfaces, strategy identity, scheduler jobs, and migration
    semantics. Unknown money-path objects are unsafe until registered here and
    routed through architecture/money_path_ci.yaml.
  authority_basis:
    - AGENTS.md money path
    - architecture/test_topology.yaml test trust policy
    - docs/authority/zeus_current_delivery.md CI governance

economic_objects:
  probability:
    fields:
      p_raw:
        meaning: "Forecast/model raw probability before calibration."
        allowed_modules: [src/signal/**, src/engine/evaluator.py, src/calibration/**]
        forbidden_uses: ["order price", "market prior", "settlement probability"]
      p_cal:
        meaning: "Calibrated probability after Platt/family correction."
        allowed_modules: [src/calibration/**, src/engine/**, src/strategy/**]
      p_market:
        meaning: "Market prior or quote-implied probability; never executable fill price."
        forbidden_uses: ["submitted limit price", "fill fact"]
      p_posterior:
        meaning: "Posterior after model/source/market fusion."
      edge:
        meaning: "Posterior minus executable cost basis after fees/spread/depth in live mode."
  price:
    fields:
      display_price:
        meaning: "UI/display or last-trade substitute; never executable cost."
        live_entry_allowed: false
      market_price:
        meaning: "Ambiguous legacy alias; new use must declare executable bid/ask or display role."
        ambiguous: true
      current_price:
        meaning: "Ambiguous legacy alias; new use must declare executable bid/ask or display role."
        ambiguous: true
      orderbook_top_bid:
        meaning: "Best executable sell price for held-token exit."
      orderbook_top_ask:
        meaning: "Best executable buy cost."
      final_limit_price:
        meaning: "Submitted limit price."
      limit_price:
        meaning: "Limit price candidate; must become final_limit_price before submit."
      fill_price:
        meaning: "Venue execution fact."
      settlement_value:
        meaning: "Weather/source settlement physical value."
      mid:
        meaning: "Market mid-price (bid-ask midpoint); used in price-discovery rate estimation for blocked candidates. Never executable fill price."
        live_entry_allowed: false
        forbidden_uses: ["submitted limit price", "fill fact"]
  identity:
    fields:
      market_id:
        meaning: "Gamma market identifier unless caller explicitly declares condition_id surface."
        ambiguous: true
      condition_id:
        meaning: "Polymarket condition id."
      token_id:
        meaning: "ERC1155 outcome token id."
      outcome_label:
        meaning: "Outcome side label."
        allowed_values: [YES, NO]
      weather_family_key:
        meaning: "City/date/metric mutually-exclusive family identity."
      strategy_key:
        meaning: "Sole governance identity for attribution/risk/performance slicing."
  time:
    fields:
      decision_time:
        meaning: "When Zeus decided."
      zeus_submit_intent_time:
        meaning: "When Zeus persisted/finalized submit intent."
      venue_ack_time:
        meaning: "Venue acknowledgement time."
      fill_time:
        meaning: "Venue fill observation time."
      observation_available_at:
        meaning: "Source observation availability time."
      settlement_time:
        meaning: "Settlement source finality time."

state_machines:
  reactor_runtime_config:
    owner: src/engine/event_reactor_adapter.py
    description: >
      Live reactor runtime configuration knobs whose ALL-CAPS names can be
      detected by semantic CI's state-candidate scan. These are not lifecycle,
      command, order, or venue states; registering them prevents the classifier
      from treating known live config as an unreviewed money-path state machine.
      ZEUS_REACTOR_GAMMA_EMPTY_BACKOFF_SECONDS controls how long the reactor
      suppresses repeated empty Gamma probes after a no-market response.
    states:
      - ZEUS_REACTOR_GAMMA_EMPTY_BACKOFF_SECONDS
    invariant_tests:
      - tests/test_money_path_semantic_ci.py
  venue_command:
    owner: src/state/venue_command_repo.py
    states:
      - INTENT_CREATED
      - SUBMITTING
      - ACKED
      - POST_ACKED
      - PARTIAL
      - FILLED
      - UNKNOWN
      - SUBMIT_UNKNOWN_SIDE_EFFECT
      - SUBMIT_UNKNOWN
      - REVIEW_REQUIRED
      - SUBMIT_REJECTED
      - SUBMIT_REQUESTED
      - SUBMIT_ACKED
      - CANCEL_ACKED
      - PARTIAL_FILL_OBSERVED
      - PRE_SUBMIT_ORPHAN_RECOVERY_NO_VENUE_ATTEMPT
    invariant_tests:
      - tests/money_path/test_002_execution_lifecycle_replay.py
      - tests/test_command_recovery.py
      - tests/test_order_truth_reducer.py
  settlement_command:
    owner: src/execution/harvester.py
    states:
      - REDEEM_INTENT_CREATED
      - REDEEM_SUBMITTED
      - REDEEM_TX_HASHED
      - REDEEM_CONFIRMED
      - REDEEM_FAILED
      - REDEEM_RETRYING
      - REDEEM_REVIEW_REQUIRED
      - REDEEM_OPERATOR_REQUIRED
    invariant_tests:
      - tests/money_path/test_003_redeem_receipt_classifier.py
      - tests/test_harvester_settlement_redeem.py
      - tests/test_negrisk_redeem_payout_proof.py
    overloaded_states:
      REDEEM_OPERATOR_REQUIRED:
        risk: "Manual-required and autoretryable error classes may be conflated."
        required_fields: [errorCode, operator_action_required, autoretry_eligible]
  order_truth:
    owner: src/execution/order_truth_reducer.py
    states:
      - TERMINAL_NO_FILL
      - TERMINAL_FILLED
      - TERMINAL_PARTIAL
      - PARTIAL_WITH_REMAINDER
      - LIVE_RESTING
      - UNKNOWN_SIDE_EFFECT
      - REVIEW_REQUIRED
    invariant_tests:
      - tests/test_order_truth_reducer.py
      - tests/test_exchange_reconcile.py
      - tests/money_path/test_002_execution_lifecycle_replay.py
  live_manual_reconciliation_reason:
    owner: scripts/reconcile_wellington_zombie_2026_06_22.py
    description: >
      Operator-authored reconciliation reason code for the Wellington zombie
      pre-submit repair script. This is not a command lifecycle state; it is
      provenance for a manually scoped live repair action and must remain
      explicit in money-path CI because it can affect venue/local parity.
    states:
      - MANUAL_RECONCILE_ZOMBIE_PRE_SUBMIT
    invariant_tests:
      - tests/test_command_recovery.py
      - tests/test_exchange_reconcile.py
  command_recovery_reason:
    owner: src/execution/command_recovery.py
    description: >
      Live command-recovery reason codes written during automated repair of
      abandoned or projection-stalled trade commands. These are not venue
      command states; they explain why recovery code mutated local projections
      after reconciling against durable venue/order evidence.
    states:
      - ABANDONED_UNSUBMITTED_GHOST_RECONCILE
      - TRADE_COMMAND_ACKED_WORLD_LEDGER_STALLED
    invariant_tests:
      - tests/test_command_recovery.py
      - tests/execution/test_abandoned_unsubmitted_ghost_reconcile.py
  chain_mirror_reconciliation_classification:
    owner: src/state/chain_mirror_reconciler.py
    description: >
      Chain-mirror market-rule classification codes (operator directive
      2026-07-04; docs/rebuild/chain_mirror_state_model_2026-07-04.md, §5
      follow-up P0b 2026-07-04). These are not venue/lifecycle states; they
      are the reconciler's own diff-outcome vocabulary carried in
      position_events.payload_json under "chain_mirror_classification"
      (CLOSED_REDEEMED/CLOSED_WORTHLESS reuse the existing SETTLED
      event_type; SIZE_CORRECTED reuses the existing CHAIN_SIZE_CORRECTED
      event_type; CLOSED_EXITED reuses the existing ADMIN_VOIDED event_type
      — no position_events.event_type CHECK widening was needed for any of
      them). REVIEW_OPEN_ABSENT persists a phase-preserving REVIEW_REQUIRED
      marker event (P0b) as the bookkeeping half of the two-consecutive-
      mirror-runs threshold, but never itself changes phase/chain_state.
      MISSING_LOCAL_ROW/FOREIGN/UNGRADEABLE/CONSISTENT remain report-only
      findings and never appear in a persisted row. CLOSED_EXITED (P0b)
      force-resolves only a fill-unproven _OPEN_LIKE_PHASES projection whose
      held token has been absent across two consecutive mirror runs with the
      market unresolved and zero open orders. A confirmed entry fill remains
      in its true phase until exit, redemption, transfer, or settlement
      evidence explains the absence; Data API omission alone cannot erase
      economic exposure. QUARANTINED is retired from
      LifecyclePhase/LEGAL_LIFECYCLE_FOLDS entirely (T5, quarantine excision
      2026-07-11).
    states:
      - CLOSED_REDEEMED
      - CLOSED_WORTHLESS
      - SIZE_CORRECTED
      - REDEEMABLE
      - REVIEW_OPEN_ABSENT
      - CLOSED_EXITED
      - MISSING_LOCAL_ROW
      - FOREIGN
      - UNGRADEABLE
      - CONSISTENT
    invariant_tests:
      - tests/test_reconcile_chain_mirror.py
  family_rebalance_lease:
    owner: src/state/schema/family_rebalance_intents_schema.py
    description: >
      Close-before-open family rebalance lease states for shift-bin decisions.
      EXIT_* states block the family until the old leg exit outcome is known;
      ENTRY_* states block until the new-bin entry side effect is known. These
      states preserve the invariant that a shift never opens a replacement leg
      before the old-leg exit is durably resolved.
    states:
      - EXIT_SUBMITTED
      - EXIT_UNKNOWN
      - EXIT_PARTIAL
      - ENTRY_SUBMITTED
      - ENTRY_UNKNOWN
      - ENTRY_PARTIAL
    invariant_tests:
      - tests/strategy/test_shift_bin.py
      - tests/strategy/test_shift_bin_wiring.py
      - tests/engine/test_shift_bin_old_leg_exit.py
      - tests/engine/test_shift_bin_reactor_integration.py
  family_rebalance_block_reason:
    owner: src/strategy/family_rebalance.py
    description: >
      Rebalance/fill-up/shift-bin block reason vocabulary. These are decision
      reasons, not command states: they keep duplicate or side-effect-unknown
      family exposure from re-entering while preserving the existing held/open
      position truth.
    states:
      - UNOWNED_PENDING_OR_UNKNOWN_ENTRY
      - SHIFT_BIN_EXIT_UNKNOWN_NO_DURABLE_COMMAND_RECOVERED
      - PRESUBMIT_REREAD_NO_EXPOSURE_CONN
      - PRESUBMIT_REREAD_POSITION_TRUTH_UNAVAILABLE
      - PRESUBMIT_REREAD_POSITION_TRUTH_SCHEMA_INCOMPLETE
    invariant_tests:
      - tests/strategy/test_family_rebalance.py
      - tests/strategy/test_fill_up_wiring.py
      - tests/engine/test_fill_up_reactor_integration.py
  city_skill_gate_reason:
    owner: src/decision/city_skill_gate.py
    description: >
      City-skill gate rejection bases used by live admission. UNKNOWN_CITY
      fails closed when a city cannot be matched to the fitted skill table;
      THIN_TRACK fails closed when the city/metric track lacks enough skill
      evidence. These are admission evidence labels, not lifecycle states.
    states:
      - CITY_SKILL_UNKNOWN_CITY
      - CITY_SKILL_THIN_TRACK
    invariant_tests:
      - tests/decision/test_city_skill_gate.py
      - tests/strategy/test_live_admission_calibrator_wiring.py
  lifecycle_phase:
    owner: src/state/lifecycle_manager.py
    description: >
      QUARANTINED retired entirely (T5, docs/rebuild/quarantine_excision_2026-07-11.md)
      — no writer mints it. A confirmed-fill/chain-absence dispute keeps its
      TRUE phase and the dispute lives in a typed ReviewWorkItem
      (src/contracts/review_work_item.py), never in this enum.
    states:
      - pending_entry
      - active
      - day0_window
      - pending_exit
      - economically_closed
      - settled
      - voided
      - admin_closed
      - unknown
    invariant_tests:
      - tests/test_lifecycle_terminal_predicate.py
      - tests/test_exchange_reconcile.py
  position_event:
    owner: src/engine/lifecycle_events.py
    description: >
      Canonical world-position lifecycle event_type values from
      architecture/2026_04_02_architecture_kernel.sql. These are not command
      states; they are append-only position event grammar used by projections
      and execution-fact repair.
    states:
      - POSITION_OPEN_INTENT
      - ENTRY_ORDER_POSTED
      - ENTRY_ORDER_FILLED
      - ENTRY_ORDER_VOIDED
      - ENTRY_ORDER_REJECTED
      - DAY0_WINDOW_ENTERED
      - CHAIN_SYNCED
      - CHAIN_SIZE_CORRECTED
      - CHAIN_QUARANTINED
      - MONITOR_REFRESHED
      - EXIT_INTENT
      # PR #347 (Findings 1-10, 2026-05-27): canonical event grammar
      # additions declared in src/contracts/position_truth.py
      # CanonicalPositionEventKind. Scaffolded for PR D/E/F; not yet
      # emitted by runtime — current emitters still use the legacy names
      # above (EXIT_INTENT / SETTLED) and the typed grammar takes over
      # when reconciliation events route through the canonical reducer.
      - EXIT_INTENT_CREATED
      - REDEEM_REQUESTED
      - VENUE_POSITION_OBSERVED
      - SETTLEMENT_RECORDED
      - REVIEW_REQUIRED
      - EXIT_ORDER_POSTED
      - EXIT_ORDER_FILLED
      - EXIT_ORDER_VOIDED
      - EXIT_ORDER_REJECTED
      - SETTLED
      - ADMIN_VOIDED
      - MANUAL_OVERRIDE_APPLIED
      # F2 (docs/rebuild/local_ledger_excision_2026-07-12.md Round-2 delta,
      # rework of the reverted LX-F): duplicate-position identity supersession
      # fact — position_duplicate_consolidator emits this instead of
      # synthesizing merged shares/cost_basis/entry_price onto the keeper row.
      - POSITION_IDENTITY_SUPERSEDED
    invariant_tests:
      - tests/test_command_recovery.py
      - tests/test_exchange_reconcile.py
      - tests/test_lifecycle_terminal_predicate.py
      - tests/state/test_inv_position_event_wire_grammar.py
      - tests/state/test_position_open_idempotency.py
      - tests/test_position_events_identity_supersession_check_migration.py
  fill_authority:
    # PR #347 (Finding 5, PR C3 + D2, 2026-05-27): typed fill-authority
    # enumeration. Wire-compatible with the legacy FILL_AUTHORITY_* string
    # constants in src/state/portfolio.py; the type lives in
    # src/contracts/position_truth.py.FillAuthority.
    owner: src/state/portfolio.py  # constants live here; FillAuthority enum mirrors them
    description: >
      How strongly fill economics are known. Consumed by the typed
      training-eligibility gate (is_training_eligible_position) in
      src/state/portfolio.py — only VENUE_CONFIRMED_*, CANCELLED_REMAINDER,
      and SETTLED authorities may produce calibration_pairs_v2 rows.
      VENUE_POSITION_OBSERVED is the degraded recovery slot introduced
      by PR C3 for balance-backed rescue.
    states:
      - NONE
      - OPTIMISTIC_SUBMITTED
      - VENUE_POSITION_OBSERVED
      - VENUE_CONFIRMED_PARTIAL
      - VENUE_CONFIRMED_FULL
      - CANCELLED_REMAINDER
      - SETTLED
    invariant_tests:
      - tests/state/test_inv_training_eligibility_gate.py
      - tests/state/test_inv_rescue_authority_split.py
  chain_only_review_state:
    # PR D1 (Finding D1, Part-2 audit, 2026-05-27): typed review lifecycle
    # for chain-only venue inventory (ChainOnlyFact). Derived from append-only
    # token_suppression reason transitions plus first_seen_at age. The
    # 2026-07-19 schema expansion adds an automatic exact-match resolution
    # reason without making the token permanently ignored. The type lives in
    # src/contracts/position_truth.py.ChainOnlyReviewState.
    owner: src/contracts/position_truth.py
    description: >
      Lifecycle status for a chain-only review-queue entry. UNRESOLVED /
      EXPIRED / ACKNOWLEDGED all block new entries; only RESOLVED clears
      the entry gate. EXPIRED is a 48h escalation marker, not auto-
      resolution. CHAIN_ONLY_AUTO_RESOLVED_MATCH records a fresh complete
      local/chain exact match; later absence or drift reopens review.
      The review window is a module-level duration constant, not a lifecycle
      state.
    states:
      - UNRESOLVED
      - EXPIRED
      - ACKNOWLEDGED
      - RESOLVED
    invariant_tests:
      - tests/state/test_inv_chain_only_review_lifecycle.py
      - tests/test_chain_shares_persist_synced.py
      - tests/test_exchange_reconcile.py
  token_suppression_reason:
    owner: src/state/db.py
    description: >
      Current append-only token classification. Automatic exact-match
      resolution closes the proved review cut but is not a permanent ignore or
      an external-drift suppression.
    states:
      - OPERATOR_QUARANTINE_CLEAR
      - CHAIN_ONLY_QUARANTINED
      - CHAIN_ONLY_AUTO_RESOLVED_MATCH
      - SETTLED_POSITION
    invariant_tests:
      - tests/test_phase10a_hygiene.py
      - tests/test_chain_shares_persist_synced.py
      - tests/test_exchange_reconcile.py
  redeem_review_error_code:
    owner: src/execution/settlement_commands.py
    description: >
      settlement_commands.error_payload.errorCode labels that route a redeem to
      REDEEM_REVIEW_REQUIRED. These are not command states; they are review
      classifications that determine whether a row can be automatically
      rechecked or must remain operator-reviewed.
    states:
      - REDEEM_NEGRISK_AMOUNT_MISMATCH
      - REDEEM_STANDARD_CTF_AMOUNT_MISMATCH
      - REDEEM_STANDARD_CTF_AMOUNT_MISSING
      - REDEEM_STANDARD_CTF_REVIEW_REQUIRED
      - REDEEM_STANDARD_CTF_WRONG_CONDITION
      - REDEEM_STANDARD_CTF_ZERO_PAYOUT
    invariant_tests:
      - tests/test_negrisk_redeem_payout_proof.py
      - tests/test_settlement_commands_ux_review_required.py
      - tests/test_settlement_commands.py
  venue_submit_error_code:
    owner: src/execution/batch_order_submission.py
    description: >
      SCH-W2.1/W2.x venue submit error-code labels (batch wrapper and
      polymarket_v2_adapter). Not command states; they classify why a submit
      attempt produced no clean ack: V2_BATCH_SUBMIT_EXCEPTION (SDK raised
      mid-batch, response-mapping ambiguity routes to SUBMIT_UNKNOWN),
      V2_BATCH_SUBMIT_UNSUPPORTED (adapter capability refusal, fail-closed),
      COMPAT_SUBMIT_NOT_PERMITTED_IN_LIVE (legacy compat submit path blocked
      under live mode in src/venue/polymarket_v2_adapter.py).
    states:
      - V2_BATCH_SUBMIT_EXCEPTION
      - V2_BATCH_SUBMIT_UNSUPPORTED
      - COMPAT_SUBMIT_NOT_PERMITTED_IN_LIVE
    invariant_tests:
      - tests/execution/test_batch_order_submission.py
      - tests/venue/test_batch_submit.py
  operator_repair_evidence_label:
    owner: scripts/repair_review_required_no_venue_exposure.py
    description: >
      Evidence/telemetry labels introduced by the 2026-07-04 operator repair
      and observability lane. Not command lifecycle states:
      EXTERNALLY_REDEEMED_ZERO_PAYOUT is a chain_truth_resolution label proving
      that a redeem-review command's market settled externally with zero payout;
      CLOSED_MARKET_UNKNOWN is an existing venue error-code literal matched by
      the repair script's candidate filter (src/state/venue_command_repo.py
      transition table already routes it to SUBMIT_UNKNOWN_SIDE_EFFECT);
      VENUE_COMMANDS_SUBMIT_SCHEMA_DRIFT is a healthcheck issue label
      (scripts/healthcheck.py) for a live venue_commands table missing
      SCH-W1.2 columns. None are written to venue_commands.state.
    states:
      - EXTERNALLY_REDEEMED_ZERO_PAYOUT
      - CLOSED_MARKET_UNKNOWN
      - VENUE_COMMANDS_SUBMIT_SCHEMA_DRIFT
    invariant_tests:
      - tests/test_repair_review_required_no_venue_exposure.py
      - tests/test_healthcheck.py
  live_runtime_config:
    owner: src/strategy/family_exclusive_dedup.py
    description: >
      Live runtime feature/config knobs that influence money-path candidate
      routing without adding command/lifecycle states. Registered here so
      CI treats new all-caps runtime authority as explicit, not accidental.
    states:
      - ZEUS_PRE_SUBMIT_CLOB_TIMEOUT_SECONDS
      - ZEUS_PRE_SUBMIT_INNER_IO_TIMEOUT_SECONDS
      - ZEUS_USER_CHANNEL_WS_MARKET_EVENTS_FALLBACK_MAX_AGE_HOURS
    invariant_tests:
      - tests/engine/test_multiwinner_wealth_composition.py
      - tests/test_executor.py
  business_plane_health:
    owner: src/control/live_health.py
    description: >
      Composite live-health business-plane degradation reasons. These are
      operator-facing state labels for process-alive but trading-progress-dead
      conditions; they do not mutate command, lifecycle, or settlement truth.
    states:
      - ZERO_CANDIDATES_WITHOUT_SOURCE_OR_NO_MARKET_PROOF
      - CANDIDATES_WITHOUT_FINAL_INTENTS_OR_NO_TRADE_REASONS
      - FINAL_INTENTS_WITHOUT_SUBMIT_ATTEMPTS
      - SUBMIT_ATTEMPTS_WITHOUT_ACK_OR_DETERMINISTIC_REJECTION
    invariant_tests:
      - tests/test_run_mode_failure_surfaces.py
  settlement_outcome:
    owner: src/contracts/settlement_outcome.py
    description: >
      Phase 7 settlement lifecycle enum (SettlementOutcome IntEnum). 10-state
      typed gate replacing social umaResolutionStatus string comparisons.
      Position.lifecycle_state field; settlements_v2.outcome_type column.
      Transitions are monotonic-forward; OBSERVATION_REVISED routes only to
      SOURCE_REVISION or DISPUTED.
    states:
      - UNRESOLVED
      - PHYSICALLY_CONFIRMED
      - SOURCE_PUBLISHED_VENUE_UNRESOLVED
      - VENUE_RESOLVED_WIN
      - VENUE_RESOLVED_LOSE
      - REDEEMED
      - OBSERVATION_REVISED
      - DISPUTED
      - UMA_UNKNOWN_50_50
      - SOURCE_REVISION
    invariant_tests:
      - tests/contracts/test_settlement_outcome.py
      - tests/test_position_lifecycle_state.py
  operations_governance_classification:
    owner: scripts/operations_package_inventory.py
    description: >
      Docs-governance classification enum used by the operations package inventory
      report. NOT a money-path state machine — these are operator-facing labels for
      classifying stale/active documentation packets, not trading commands or
      lifecycle states. Registered here because the CI semantic classifier's
      ACK-prefix check fires on pACKage/pACKet substrings within CURRENT_PACKAGE_INPUT
      and PACKET, and the UNKNOWN prefix fires on UNKNOWN_OPERATOR_DECISION.
    states:
      - CURRENT_PACKAGE_INPUT
      - UNKNOWN_OPERATOR_DECISION
      - PACKET
    invariant_tests:
      - tests/topology/test_operations_package_inventory.py
  forecast_extrema_authority:
    owner: src/data/forecast_extrema_authority.py
    description: >
      Forecast-snapshot extrema-contribution eligibility classes +
      executable-forecast-reader block-reason codes (P0 2026-05-22). NOT a
      money-path command/lifecycle machine; registered so the CI semantic
      classifier treats the new all-caps authority constants as explicit, not
      accidental. They classify whether an ensemble snapshot's local-day window
      contributes to the target daily-extrema, and gate live selection so a
      post-peak non-contributing run cannot be used as daily-high authority.
      P0 follow-up (2026-05-23): selection lifted to the full forecast-bundle
      layer (enumerate all source_run_coverage cycles, rank by extrema authority);
      NULL contribution now fails closed for CURRENT data_versions (UNKNOWN) and
      passes through only for legacy versions (LEGACY_NULL_PASSTHROUGH, recorded
      in applied_validations).
      Authority: docs/archive/2026-Q2/operations_historical/P0_FORECAST_EXTREMA_AUTHORITY_2026-05-22.md
      (bundle-layer selection design archived in that doc; prior .claude/jobs scratchpad
      path was non-repo-verifiable and has been removed).
    states:
      - FULL_CONTRIBUTOR
      - PARTIAL_CONTRIBUTOR
      - NON_CONTRIBUTOR
      - UNKNOWN
      - LEGACY_NULL_PASSTHROUGH
      - EXECUTABLE_FORECAST_NON_CONTRIBUTING_EXTREMA
      - EXECUTABLE_FORECAST_EXTREMA_AUTHORITY_UNKNOWN
    invariant_tests:
      - tests/test_forecast_extrema_authority.py
      - tests/test_forecast_offset_fix_regression.py
      - tests/test_executable_forecast_bundle_selection.py
  executable_forecast_bundle_result:
    owner: src/data/executable_forecast_reader.py
    description: >
      Status leg of ExecutableForecastBundleResult returned by read_executable_forecast()
      and per-candidate gate codes from _evaluate_candidate() — not a command/lifecycle
      machine; registered so the CI semantic classifier treats these all-caps reader
      statuses as explicit. BLOCKED = gated reject with a reason_code;
      UNKNOWN_BLOCKED = decision-time/readiness inputs unusable (e.g. READINESS_NOW_INVALID);
      SOURCE_RUN_PARTIAL = source run completeness does not meet COMPLETE threshold.
      Added 2026-05-23 during P0 bundle-layer lift (branch p0-forecast-bundle-layer-20260523).
    states:
      - BLOCKED
      - UNKNOWN_BLOCKED
      - SOURCE_RUN_PARTIAL
    invariant_tests:
      - tests/test_executable_forecast_bundle_selection.py
