    owner: src/strategy/redecision.py
    description: >
      CandidateLifecycleState enum — every state a redecision candidate may
      occupy (spec §7 + §14.9). Forward path terminates at LEARNING_INCLUDED /
      LEARNING_EXCLUDED. Abort branches off SUBMIT_RECAPTURE_REQUIRED are
      fail-closed per spec §5/§7.
