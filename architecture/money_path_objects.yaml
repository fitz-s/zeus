      # 2026-06-09/10 false-EDGE_REVERSED + day0-cap-in-kernel taxonomy: each abort
      # cause is first-class so the regret ledger records the true cause (the old
      # behavior swallowed min-order ValueErrors as "no edge" — the Milan-era bug).
      - SUBMIT_ABORTED_BELOW_MIN_ORDER
      - SUBMIT_ABORTED_DAY0_CAP_EXHAUSTED
      - SUBMIT_ABORTED_DAY0_CAP_BELOW_MIN_ORDER
