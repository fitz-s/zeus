    - gamma_explicit
    - LIVE_ELIGIBLE
    - live_eligible
    - explicit_verified
  protected_tables:
    world: [markets, positions, position_current, lifecycle_events]
    forecasts: [observations, settlements, calibration_pairs_v2, ensemble_snapshots, source_run, market_events]
    trades: [venue_commands, venue_order_facts, venue_trade_facts, settlement_commands]
  historical_truth_policy_required_for:
    - scripts/migrations/**
    - scripts/migrate_*.py
  observability_surfaces:
    edli_opportunity_events:
      db: world
      pk: event_id
      writer: src/events/event_store.py::EventStore.insert_or_ignore
      meaning: >
        Append-only opportunity event log for EDLI v1. Event rows carry
        observed_at, available_at, received_at, payload_hash, idempotency_key,
        and causal_snapshot_id; mutable processing state is separate.
      required_tests:
        - tests/events/test_opportunity_event.py
        - tests/events/test_event_store_idempotency.py
        - tests/state/test_edli_table_ownership.py
    edli_execution_feasibility_evidence:
      db: trade
      pk: evidence_id
      writer: src/events/triggers/market_channel_ingestor.py::insert_execution_feasibility_evidence
      meaning: >
        Public market-channel and submit-window evidence about quote depth,
        book hashes, latency, and hypothetical FOK/FAK feasibility. This is
        written by the price/held-quote sidecars to zeus_trades.db and read by
        the live order runtime as pre-submit book evidence. It is never
        accepted/fill truth; user channel and reconciliation remain the only
        fill authorities.
      required_tests:
        - tests/events/test_market_channel_ingestor.py
    edli_no_trade_regret_events:
      db: world
      pk: regret_event_id
      writer: src/strategy/live_inference/no_trade_regret.py::NoTradeRegretLedger.insert_idempotent
      meaning: >
        Event-triggered rejection ledger. Live readers must not expose
        later_outcome, would_have_won, would_have_filled, or regret_bucket.
      required_tests:
        - tests/strategy/live_inference/test_no_trade_regret.py
    edli_live_cap_usage:
      db: world
      pk: usage_id
      writer: src/events/live_cap.py::LiveCapLedger.reserve
      meaning: >
        Durable EDLI pilot live-cap ledger. Reserves, releases, and consumes
        event-bound live probe count/notional quota before live action or
        execution-command certificates can be accepted.
      required_tests:
        - tests/events/test_live_cap.py
    edli_live_order_events:
      db: world
      pk: aggregate_event_id
      writer: src/events/live_order_aggregate.py::LiveOrderAggregateLedger.append_event
      meaning: >
        Append-only EDLI live-order aggregate event log. It is the replayable
        source of truth for decision proof, pre-submit revalidation, cap,
        venue submission, user-channel, reconcile, and lifecycle facts in the
        full-live split. It does not perform venue submit.
      required_tests:
        - tests/events/test_live_order_aggregate.py
    edli_live_order_projection:
      db: world
      pk: aggregate_id
      writer: src/events/live_order_aggregate.py::LiveOrderAggregateLedger.rebuild_projection
      meaning: >
        Rebuildable current-state projection of edli_live_order_events. It is
        not source of truth and can be reconstructed from the append-only
        aggregate event log after crashes or partial writes.
      required_tests:
        - tests/events/test_live_order_aggregate.py
    # OBS-AUTHORITY-FOUNDATION 2026-05-23. Persisted, auditable settlement-day
    # observation authority. Observability only — these objects record runtime
    # observation truth + per-edge day0 classification so the operator can audit
    # whether a tradeable-price day0 edge is observation-locked, forecast-upside,
    # or wrong-date/source. NOT executable economic objects; do not gate trades.
    settlement_day_observation_authority:
      db: trade
      pk: authority_id
      writer: src/state/db.py::log_settlement_day_observation_authority
      written_from: src/engine/cycle_runtime.py::execute_discovery_phase
      builder: src/engine/cycle_runtime.py::build_settlement_day_observation_authority_row
      meaning: >
        One row per settlement-day/day0 candidate at decision time (including
        MISSING/STALE/LOW coverage failure cases). Captures high_so_far /
        low_so_far / current_temp / source / station_id / observation_time +
        derived audit flags local_date_matches_target,
        source_authorized_for_settlement, persisted_surface_available.
      required_tests: [tests/test_settlement_day_observation_authority.py]
    opportunity_fact_day0_context:
      fields: [observation_authority_id, day0_context_json]
      table: opportunity_fact
      meaning: >
        observation_authority_id FKs an opportunity row to its
        settlement_day_observation_authority row. day0_context_json holds the
        per-edge day0 truth classification (observation_locked /
        observation_floor_plus_forecast_upside / observation_excludes_bin /
        observation_partial_unresolved / observation_unknown) + observed
        high/low + candidate bin bounds + settlement_capture eligibility.
      classification_source: src/engine/evaluator.py::day0_high_truth_classification_for_edge
      required_tests: [tests/test_settlement_day_observation_authority.py]

external_truth_sources:
  gamma:
    authority_tier: market_metadata
    endpoint_patterns: [gamma-api.polymarket.com, /markets, /events]
    required_tests: [tests/test_market_scanner_provenance.py, tests/test_scanner_archived_filter.py]
  clob:
    authority_tier: executable_venue
    endpoint_patterns: [clob.polymarket.com, /book, /orders, /trades]
    required_tests: [tests/test_executable_market_snapshot.py, tests/test_order_truth_reducer.py]
  ecmwf:
    authority_tier: forecast_source
    endpoint_patterns: [ecmwf, open-data, tigge]
    required_tests: [tests/test_tigge_schema_contract.py, tests/test_executable_forecast_reader_member_floor.py]
  weather_observation:
    authority_tier: settlement_observation
    endpoint_patterns: [wunderground, weather.com, hko, noaa, ogimet]
    required_tests: [tests/test_ingest_boot_time_semantics.py, tests/test_settlement_semantics.py]
  polygon_rpc:
    authority_tier: chain_truth
    endpoint_patterns: [polygon-rpc, eth_sendRawTransaction, eth_call]
    required_tests: [tests/test_negrisk_redeem_payout_proof.py]
  polymarket_docs:
    # Documentation-only reference (SCH-W2.3 rate budget cites the published
    # CLOB rate-limit table at docs.polymarket.com/api-reference/rate-limits).
    # Never a runtime data source; registered so the semantic classifier does
    # not treat the cited URL as an unregistered external truth surface.
    authority_tier: documentation_reference
    endpoint_patterns: [docs.polymarket.com]
    required_tests: [tests/venue/test_rate_budget.py]
  polymarket_data_api:
    # Read-only venue position-inventory truth (data-api.polymarket.com/positions)
    # used by the redeem balance probe and the inventory-truth auto-collect sweep
    # to discover redeemable CTF holdings. Never an order-submission or
    # forecast/settlement source; chain truth (polygon_rpc) remains the
    # redemption authority — this endpoint only seeds the candidate list.
    authority_tier: venue_position_inventory
    endpoint_patterns: [data-api.polymarket.com, /positions]
    required_tests: [tests/test_inventory_redeem_sweep.py, tests/test_polymarket_v2_adapter_balance_probe.py]
  metar_fast_obs:
    # Day0 fast-lane intraday observations: the append-only NOAA/NWS global
    # METAR cycle is the publication-first transport; aviationweather.gov is
    # the bounded recovery/history surface. Both carry the same configured
    # station reports. This is intraday running-extreme and oracle-anomaly
    # evidence only; WU remains settlement authority.
    authority_tier: intraday_observation
    endpoint_patterns:
      - tgftp.nws.noaa.gov
      - /data/observations/metar/cycles
      - aviationweather.gov
      - /api/data/metar
    required_tests: [tests/test_day0_fast_obs_lane.py, tests/test_day0_first_principles_antibodies.py]
  nea_sg_observation:
    # Singapore NEA real-time air-temperature API. It is an intraday
    # observation covariate for Singapore/Changi monitoring, not a settlement
    # source; WU/METAR remains settlement authority.
    authority_tier: intraday_observation_covariate
    endpoint_patterns: [api-open.data.gov.sg, api.data.gov.sg, /real-time/api/air-temperature, /environment/air-temperature]
    required_tests: [tests/test_nea_sg_obs.py]
  iem_asos_archive:
    # Offline calibration archive (Iowa Environmental Mesonet ASOS download):
    # historical METAR used by scripts/measure_wu_metar_divergence.py to fit the
    # per-city empirical WU-vs-METAR divergence thresholds
    # (config/wu_metar_divergence.json). Never consumed on the live path.
    authority_tier: calibration_archive
    endpoint_patterns: [mesonet.agron.iastate.edu, asos.py]
    required_tests: [tests/test_day0_first_principles_antibodies.py]
  official_station_forecast:
    # Config-routed official station/city forecast feeds used as forecast-skill
    # inputs for source-clock fusion. They are forecast covariates only: not WU
    # settlement truth, not Day0 observation authority, not venue truth.
    authority_tier: station_forecast
    endpoint_patterns:
      - www.dwd.de
      - weather.gc.ca/grib
      - www.jma.go.jp
      - meteofrance.com
      - data.weather.gov.hk
      - opendata.cwa.gov.tw
    required_tests:
      - tests/test_station_forecast_live_ingest_wiring.py
      - tests/strategy/live_inference/test_source_clock_vnext.py

side_effect_calls:
  submit_order:
    patterns: [client.submit, submit_order, create_order, place_limit_order, place_market_order, post_order, build_order]
    required_invariants: [MP-SIDE-001, MP-SIDE-002, MP-SIDE-003]
  redeem:
    patterns: [adapter.redeem, redeemPositions, eth_sendRawTransaction]
    required_invariants: [MP-RED-001, MP-RED-002, MP-SIDE-001]
  cancel:
    patterns: [cancel_order, cancel_orders]
    required_invariants: [MP-ORD-003, MP-SIDE-001]
  canonical_event_write:
    patterns: [append_event, append_order_fact, append_trade_fact, write_decision_event, write_no_trade_event]
    required_invariants: [MP-SIDE-001, MP-SCH-001]

scheduler_jobs:
  imminent_open_capture:
    produces: [market_scan_progress, evaluated_candidates, decision_or_no_trade_event]
    stale_after_seconds: 900
    blocking_for_live: true
  redeem_reconciler:
    produces: [redeem_command_progress, redeem_receipt_classification]
    stale_after_seconds: 900
    blocking_for_live: true
