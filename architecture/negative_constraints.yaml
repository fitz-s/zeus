schema_version: 1
constraints:
  - id: NC-01
    statement: No broad prompt may edit K0 and K3 in the same patch without explicit packet justification.
    enforced_by:
      scripts:
        - scripts/check_work_packets.py
  - id: NC-02
    statement: JSON exports may not be promoted back to authority.
    forbidden_surfaces:
      - state/positions.json
      - state/status_summary.json
      - state/strategy_tracker.json
    enforced_by:
      docs:
        - architecture/ast_rules/forbidden_patterns.md
      semgrep_rule_ids:
        - zeus-no-json-authority-write
  - id: NC-03
    statement: No downstream strategy fallback or re-inference when strategy_key is already available.
    enforced_by:
      semgrep_rule_ids:
        - zeus-no-strategy-default-fallback
      tests:
        - tests/test_architecture_contracts.py::test_negative_constraints_cover_strategy_fallback
  - id: NC-04
    statement: No direct lifecycle terminalization from orchestration code.
    enforced_by:
      semgrep_rule_ids:
        - zeus-no-direct-close-from-engine
  - id: NC-05
    statement: No silent fallback from missing decision snapshot to latest snapshot for learning truth.
    enforced_by:
      docs:
        - architecture/ast_rules/forbidden_patterns.md
      tests:
        - tests/test_cross_module_invariants.py::test_inv03_harvester_prefers_decision_snapshot_over_latest
  - id: NC-06
    statement: No memory-only durable governance.
    enforced_by:
      semgrep_rule_ids:
        - zeus-no-memory-only-control-state
  - id: NC-07
    statement: No raw phase/state string assignment outside lifecycle kernel.
    enforced_by:
      semgrep_rule_ids:
        - zeus-no-direct-phase-assignment
  - id: NC-08
    statement: No bare implicit unit assumptions in semantic code paths.
    enforced_by:
      tests:
        - tests/test_cross_module_invariants.py::test_inv04_no_bare_temperature_threshold_comparisons_in_src
      semgrep_rule_ids:
        - zeus-no-default-unit-fallback
  - id: NC-09
    statement: No ad hoc probability complements across architecture boundaries when semantic contracts exist.
    scope: |
      The ban is on PROBABILITY/BELIEF derivation: a Polymarket NO-side win
      probability, edge, q_lcb, or fill assumption may NEVER be derived as
      1 - <YES belief> (YES/NO are independent executable assets; a complement
      price is a microstructure fiction, not a real quote — treating it as one
      manufactures phantom-liquidity edges). The conservative bound
      no_lcb = 1 - q_ucb_yes is the ONE allowed probability-space complement
      (exact per-sample identity, certified, math-isolated in the q-construction
      seam); 1 - q_lcb_yes stays forbidden (overstates NO win-mass, breaches the
      conservative-q_lcb iron rule).
    carve_out: |
      CARVE-OUT (2026-06-10, maker-quote lane, complement_law_verdict): a
      complement value (1 - complement_best_bid - tick) MAY bound ORDER PLACEMENT
      against the venue mint boundary. It may NEVER price an entry, an edge, a
      q_lcb, or a fill assumption. Venue truth licensing this bound: Polymarket
      CLOB mint-matches complementary BUY orders — "someone places a limit order
      to buy No at the complementary price (e.g. $0.40)... Since $0.60 + $0.40 =
      $1.00, the orders match... $1.00 is converted into 1 Yes token and 1 No
      token" (docs.polymarket.com/concepts/prices-orderbook). A resting NO bid at
      p is therefore matched by YES buyers at >= 1-p via complete-set mint, so the
      complement is a REAL non-crossing boundary, not a fictitious quote. The bound
      is admissible ONLY as a min() cap that LOWERS the resting limit
      (complementary_maker_quote_reservation: reservation = min(q_lcb - penalty,
      1 - comp_bid - tick)); the EDGE is still q_fill_adj - OUR_quote_limit
      (native-NO q_lcb minus the price WE rest at), and a candidate whose edge is
      positive ONLY under a complement-priced entry has non-positive maker EV and
      REJECTS at the trade-score gate. Relationship test pinning the dead category:
      tests/engine/test_maker_quote_empty_no_ask.py::test_quote_edge_non_positive_still_rejects.
    enforced_by:
      semgrep_rule_ids:
        - zeus-no-ad-hoc-probability-complement
      tests:
        - tests/engine/test_maker_quote_empty_no_ask.py::test_quote_edge_non_positive_still_rejects
        - tests/test_probability_complement_ast_guard.py::test_decision_core_never_builds_no_from_the_overconfident_q_lcb_complement
  - id: NC-10
    statement: No new shadow persistence surface without deletion or demotion plan.
    enforced_by:
      scripts:
        - scripts/check_work_packets.py
  - id: NC-11
    statement: No writing of daily-low rows on legacy (non-v2) tables.
    enforced_by:
      schema:
        - migrations/2026_04_02_architecture_kernel.sql
      tests:
        - tests/test_architecture_contracts.py::test_no_daily_low_on_legacy_table
  - id: NC-12
    statement: No mixing of high and low rows in any Platt model, calibration pair set, bin lookup, or settlement identity.
    enforced_by:
      tests:
        - tests/test_cross_module_invariants.py::test_no_high_low_mix_in_platt_or_bins
      semgrep_rule_ids:
        - zeus-no-high-low-row-mix
  - id: NC-13
    statement: No JSON export write before the corresponding DB commit returns.
    enforced_by:
      semgrep_rule_ids:
        - zeus-no-json-before-db-commit
      tests:
        - tests/test_cross_module_invariants.py::test_json_export_after_db_commit
  - id: NC-14
    statement: No bare static entry_price passed to kelly_size() at cross-layer seams.
    enforced_by:
      semgrep_rule_ids:
        - zeus-no-bare-entry-price-kelly
      tests:
        - tests/test_dual_track_law_stubs.py::test_kelly_input_carries_distributional_info
  - id: NC-15
    statement: make_family_id() must not be called with strategy_key sometimes empty and sometimes set across call sites; per-path drift in family key construction is forbidden.
    invariants: [INV-22]
    enforced_by:
      semgrep_rule_ids:
        - zeus-no-fdr-family-key-drift
      tests:
        - tests/test_dual_track_law_stubs.py::test_fdr_family_key_is_canonical
  - id: NC-16
    statement: No direct place_limit_order call outside the gateway boundary (allowed callers — src/execution/executor.py as the executor seam, src/data/polymarket_client.py as the SDK wrapper, scripts/live_smoke_test.py as the operator-only path that calls v2_preflight() itself).
    invariants: [INV-24]
    enforced_by:
      semgrep_rule_ids:
        - zeus-place-limit-order-gateway-only
      tests:
        - tests/test_p0_hardening.py::test_place_limit_order_gateway_only
  - id: NC-17
    statement: ExecutionIntent must not carry decorative capability labels (slice_policy, reprice_policy, liquidity_guard, or any future label) without an enforcing executor branch that exhibits real capability behavior. Logging-only branches do not count.
    # ultrareview-25 F12: INV-23 was previously listed under invariants but the
    # mechanism is disjoint (NC-17 = ExecutionIntent capability labels;
    # INV-23 = portfolio-export authority labels). They share a "no false
    # certainty" theme only — the inert cross-reference was removed to keep
    # this field reserved for actual mechanism enforcement.
    enforced_by:
      tests:
        - tests/test_p0_hardening.py::TestR4ExecutionIntentNoDecorativeLabels::test_execution_intent_has_no_decorative_fields
        - tests/test_p0_hardening.py::TestR4ExecutionIntentNoDecorativeLabels::test_executor_does_not_branch_on_decorative_labels
  - id: NC-18
    statement: No direct UPDATE or DELETE on venue_commands / venue_command_events outside
      src/state/venue_command_repo.py. Both tables are append-only via the repo seam;
      mutations are recorded as new events, not edits to existing rows.
    invariants: [INV-28]
    enforced_by:
      semgrep_rule_ids:
        - zeus-no-direct-venue-command-update
      tests:
        - tests/test_venue_command_repo.py::TestNoModuleOutsideRepoWritesEvents::test_no_direct_venue_command_events_mutation_outside_repo
        - tests/test_venue_command_repo.py::TestNoModuleOutsideRepoWritesEvents::test_regex_catches_known_evasion_shapes
        - tests/test_venue_command_repo.py::TestNoModuleOutsideRepoWritesEvents::test_regex_does_not_false_positive_on_benign_strings
  - id: NC-19
    statement: Discovery phase must not call client.place_limit_order (or its
      indirect equivalents via execute_intent) without first checking
      find_command_by_idempotency_key for an existing row, AND it must not
      materialize a position from a SUBMITTING / UNKNOWN command state.
    invariants: [INV-32]
    enforced_by:
      tests:
        - tests/test_discovery_idempotency.py::test_idempotency_key_skips_duplicate_submit
        - tests/test_discovery_idempotency.py::test_retry_after_unknown_does_not_double_place
  - id: NC-20
    statement: No raw executable quote, VWMP vector, or sparse held-token quote vector may enter corrected posterior modes.
    invariants: [INV-33]
    enforced_by:
      tests:
        - tests/test_no_bare_float_seams.py::TestVigTreatmentSeam::test_model_only_posterior_rejects_raw_market_quote_vector
  - id: NC-21
    statement: No implied_probability ExecutionPrice, fee-adjusted or otherwise, may satisfy corrected Kelly/executable-cost authority.
    invariants: [INV-34]
    enforced_by:
      tests:
        - tests/test_no_bare_float_seams.py::TestNoBareFloatAtKellyBoundary::test_implied_probability_fails_kelly_safe
        - tests/test_no_bare_float_seams.py::TestNoBareFloatAtKellyBoundary::test_fee_adjusted_implied_probability_fails_corrected_kelly_authority
  - id: NC-22
    statement: No FinalExecutionIntent contract field may carry posterior, p_market, VWMP, BinEdge, edge, market_prior, or entry_price recompute inputs.
    invariants: [INV-35]
    enforced_by:
      tests:
        - tests/test_no_bare_float_seams.py::TestNoBareFloatAtKellyBoundary::test_final_execution_intent_excludes_probability_and_quote_recompute_inputs
  - id: NC-23
    statement: No monitor/exit refresh may use held-token market quote observations as corrected posterior prior evidence; held-token quotes belong to executable mark/exit economics.
    invariants: [INV-36]
    enforced_by:
      tests:
        - tests/test_no_bare_float_seams.py::TestNoBareFloatInExitTriggerThresholds::test_monitor_bootstrap_refresh_keeps_held_quote_out_of_corrected_posterior
