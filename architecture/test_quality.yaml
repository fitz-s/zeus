schema_version: 1
metadata:
  created: "2026-05-21"
  owner: "Zeus CI infrastructure"
  purpose: >
    Money-path tests are not trusted merely because they exist. Each protected
    test must declare the invariant it protects and a falsifying proof shape.

money_path_test_quality:
  required_for_categories:
    - money_path
    - core_law_antibody
    - schema_semantics
    - venue_semantics
  acceptable_falsifying_proof:
    - mutation_kills
    - negative_fixture
    - property_counterexample
    - semantic_diff_fixture

tests:
  tests/money_path/test_001_negrisk_tradeability_snapshot_submit.py:
    category: money_path
    protects: [MP-MD-001, MP-MD-003]
    falsifying_proof:
      type: semantic_diff_fixture
      description: "Classifier blocks a new unregistered external source/tradeability drift surface."
  tests/money_path/test_002_execution_lifecycle_replay.py:
    category: money_path
    protects: [MP-ORD-001, MP-ORD-002, MP-ORD-003, MP-ORD-004]
    falsifying_proof:
      type: property_counterexample
      description: "Terminal/no-fill and positive-trade fact ordering counterexamples must remain impossible."
  tests/money_path/test_003_redeem_receipt_classifier.py:
    category: money_path
    protects: [MP-RED-001, MP-RED-002]
    falsifying_proof:
      type: negative_fixture
      description: "Standard CTF-only log on NegRisk market must be classified as misrouted/review, not confirmed."
  tests/money_path/test_004_schema_live_failclosed.py:
    category: schema_semantics
    protects: [MP-SCH-001, MP-SCH-002]
    falsifying_proof:
      type: semantic_diff_fixture
      description: "ALTER ADD COLUMN DEFAULT VERIFIED/gamma_explicit/LIVE_ELIGIBLE fails as authority fabrication."
  tests/money_path/test_edli_online_invariants.py:
    category: money_path
    protects: [MP-SCH-001, MP-SCH-002, MP-ECO-001]
    falsifying_proof:
      type: negative_fixture
      description: "Config or source mutation enabling stale-book directional trading, taker FOK/FAK live, removing scheduler jobs, or adding shadow_* EDLI modules fails."
  tests/money_path/test_day0_shadow_scope.py:
    category: money_path
    protects: [MP-SCH-001, MP-ECO-001]
    falsifying_proof:
      type: negative_fixture
      description: "day0_shadow edli_live_scope admits day0 (no DAY0_OUT_OF_SCOPE_FOR_PR332) while forecast_only stays byte-identical, AND grants no submit authority of its own — scope is orthogonal to the arm axis (real_order_submit_enabled). Mutating day0_shadow to imply/inject an arm flag, or to admit day0 under forecast_only, fails."
  tests/money_path/test_edli_live_canary.py:
    category: money_path
    protects: [MP-SCH-001, MP-SCH-002, MP-ECO-001]
    falsifying_proof:
      type: negative_fixture
      description: "Full-live canary groundwork cannot claim runtime readiness while no-submit config remains active."
  tests/money_path/test_mainstream_enforce_on_submit.py:
    category: money_path
    protects: [MP-SCH-001, MP-ECO-001]
    falsifying_proof:
      type: negative_fixture
      description: "With mainstream_agreement_enforce_on_submit ON, an armed submit whose selected candidate has a failed/missing mainstream verdict must reject MAINSTREAM_AGREEMENT_REQUIRED before the executor (fail-closed); reference selector stays reference-only."
  tests/money_path/test_mainstream_display_only_unconstructable.py:
    category: core_law_antibody
    protects: [MP-SCH-001, MP-ECO-001]
    falsifying_proof:
      type: negative_fixture
      description: "Mainstream/forecast-bias agreement is display-only: the SAME armed submit closure run with mainstream_agreement_pass in {True, False, None} must reach the IDENTICAL downstream reason, and the enforce-on-submit branch + two-key arm boot guard must be ABSENT from source. Re-introducing any mainstream gate path (a MAINSTREAM_AGREEMENT_REQUIRED branch, or a value-dependent decision) fails — mainstream cannot alter direction/q/q_lcb/trade_score/selection/submit (DIRECTION LAW / Rule-4 antibody)."
  tests/money_path/test_edli_order_lifecycle.py:
    category: money_path
    protects: [MP-SCH-001, MP-SCH-002, MP-ECO-001]
    falsifying_proof:
      type: negative_fixture
      description: "Order lifecycle proof vocabulary keeps accepted/resting/fill/timeout states distinct before live execution wiring."
  tests/money_path/test_edli_bankroll_warm_cycle.py:
    category: money_path
    protects: [MP-SCH-001, MP-ECO-001]
    falsifying_proof:
      type: negative_fixture
      description: "Bankroll freshness for per-event Kelly proof must be decoupled from the slow reactor cycle; a dedicated warm job prevents cached() returning None at cycle end."
  tests/money_path/test_edli_live_bridge_allocator_refresh.py:
    category: money_path
    protects: [MP-SCH-001, MP-ECO-001]
    falsifying_proof:
      type: negative_fixture
      description: "EDLI live-bridge cycle must configure the global risk-allocator singletons before submit; absence causes AllocationDenied(allocator_not_configured) on every candidate."
  tests/money_path/test_edli_market_substrate_warm_cycle.py:
    category: money_path
    protects: [MP-SCH-001, MP-ECO-001]
    falsifying_proof:
      type: negative_fixture
      description: "Expensive market-substrate refresh must be decoupled from the per-cycle reactor decision loop; inline refresh blocks process_pending and produces zero completed cycles."
  tests/money_path/test_edli_bridge_multistatus_dedup.py:
    category: money_path
    protects: [MP-ORD-001, MP-ORD-002]
    falsifying_proof:
      type: property_counterexample
      description: "A single 100-share fill emitted as three UserTradeObserved legs (MATCHED/MINED/CONFIRMED) sharing one trade_id must collapse to one leg in position_current; re-reports must not be summed into a phantom 3x position while genuine multi-partial fills across distinct trade_ids still sum correctly."
  tests/money_path/test_edli_durable_fill_bridge_scan.py:
    category: money_path
    protects: [MP-ORD-001, MP-ORD-002, MP-ORD-003]
    falsifying_proof:
      type: negative_fixture
      description: "The durable fill->position_current bridge scan must materialise position_current for every FILL_CONFIRMED aggregate even when the transient in-memory trigger set is empty (post-restart or post-swallowed-exception), and must be idempotent across repeated scan invocations."
