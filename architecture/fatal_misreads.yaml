schema_version: 1
metadata:
  created: "2026-04-23"
  owner_packet: "Guidance Kernel Semantic Boot"
  purpose: >
    Machine-readable antibodies for the semantic equivalences that most often
    cause Zeus agents to make locally plausible but systemically wrong changes.
  authority_status: semantic_antibody_manifest

required_misread_fields:
  - id
  - severity
  - false_equivalence
  - correction
  - proof_files
  - invalidation_condition
  - tests
  - task_classes

allowed_severities:
  - critical
  - high
  - medium

misreads:
  - id: api_returns_data_not_settlement_correct_source
    severity: critical
    false_equivalence: "api_returns_data == settlement_correct_source"
    correction: >
      A successful API response proves endpoint availability only. Settlement
      source correctness must be proven from current source-validity evidence
      and the market/city/date contract.
    proof_files:
      - docs/operations/current_source_validity.md
      - docs/operations/known_gaps.md
      - config/cities.json
    invalidation_condition: >
      Only a fresh source-audit packet may alter current settlement routing or
      relax source evidence requirements.
    tests:
      - python3 scripts/topology_doctor.py --fatal-misreads --json
    task_classes: [source_routing]

  - id: airport_station_not_city_settlement_station
    severity: critical
    false_equivalence: "airport_station == city_settlement_station"
    correction: >
      ICAO/airport identity is not settlement identity. City settlement station
      must come from the current market/source evidence, not from a convenient
      airport code or nearby observation feed.
    proof_files:
      - docs/operations/current_source_validity.md
      - docs/operations/known_gaps.md
      - config/cities.json
    invalidation_condition: >
      Only audited market-description evidence may promote an airport station
      to settlement authority for a city/date.
    tests:
      - python3 scripts/topology_doctor.py --fatal-misreads --json
    task_classes: [source_routing, settlement_semantics]

  - id: daily_day0_hourly_forecast_sources_are_not_interchangeable
    severity: critical
    false_equivalence: "daily_settlement_source == day0_live_source == historical_hourly_source == forecast_skill_source"
    correction: >
      Settlement, Day0 monitoring, historical hourly ingest, and forecast skill
      may use different sources, time geometry, freshness contracts, and proof
      surfaces. Each task must prove the specific source role it consumes.
    proof_files:
      - docs/reference/zeus_domain_model.md
      - docs/operations/current_source_validity.md
      - docs/operations/current_data_state.md
      - architecture/city_truth_contract.yaml
      - architecture/source_rationale.yaml
    invalidation_condition: >
      Only a source-contract packet with city/date evidence may collapse two
      source roles for a bounded scope.
    tests:
      - python3 scripts/topology_doctor.py --task-boot-profiles --json
      - python3 scripts/topology_doctor.py --fatal-misreads --json
    task_classes: [settlement_semantics, hourly_observation_ingest, day0_monitoring, calibration]

  - id: wu_website_daily_summary_not_wu_api_hourly_max
    severity: high
    false_equivalence: "WU website daily summary == WU API hourly max"
    correction: >
      WU daily web pages and WU hourly API responses can describe different
      station products or aggregation rules. Settlement proof must identify the
      product Polymarket resolves against.
    proof_files:
      - docs/operations/known_gaps.md
      - docs/operations/current_source_validity.md
    invalidation_condition: >
      A dated audit may prove equivalence for a specific city/date range; absent
      that audit, keep the products separate.
    tests:
      - python3 scripts/topology_doctor.py --fatal-misreads --json
    task_classes: [source_routing, hourly_observation_ingest, calibration]

  - id: hourly_downsample_preserves_extrema
    severity: critical
    false_equivalence: "hourly_downsample can use first/last/average without affecting settlement extrema"
    correction: >
      Hourly and sub-hourly aggregation must preserve max/min extrema required
      by the target metric. Downsampling that drops extrema corrupts Day0,
      historical hourly, and calibration surfaces.
    proof_files:
      - architecture/source_rationale.yaml
      - docs/operations/current_data_state.md
      - docs/operations/known_gaps.md
    invalidation_condition: >
      Only a metric-specific ingest contract may replace extrema preservation,
      and it must name the target physical quantity.
    tests:
      - python3 scripts/topology_doctor.py --fatal-misreads --json
    task_classes: [hourly_observation_ingest, day0_monitoring]

  - id: hong_kong_hko_explicit_caution_path
    severity: critical
    false_equivalence: "Hong Kong current truth can be inferred from generic WU/airport/HKO assumptions"
    correction: >
      Hong Kong is an explicit current caution path. Current truth must route
      through fresh audit evidence and HKO-specific proof before changing
      source, settlement, hourly, or monitoring behavior. Per round2_verdict.md
      §1.1 #4 + §4.1 #4, the rounding-policy half of this antibody is now
      additionally type-encoded (see type_encoded_at) so that the wrong rounding
      for the wrong city is unconstructable at compile/import time, not only
      documented here.
    proof_files:
      - docs/operations/current_source_validity.md
      - docs/operations/known_gaps.md
      - config/cities.json
    # TYPE_ENCODED 2026-04-28 per round2_verdict.md §1.1 #4 + §4.1 #4: the
    # rounding-policy mismatch sub-case (HKO_Truncation vs WMO_HalfUp on the
    # wrong city) is now a TypeError at the settle_market boundary. The YAML
    # row is RETAINED (not deleted) because the broader audit-evidence and
    # source-validity caution paths remain prose-bearing. Per Fitz Constraint
    # #1 (make the category impossible) the type guard is the load-bearing
    # antibody for the sub-case it covers; this row continues to govern the
    # source/audit caution that is not type-expressible.
    type_encoded_at: src/contracts/settlement_semantics.py:HKO_Truncation
    invalidation_condition: >
      Only a fresh Hong Kong audit receipt may change this caution status or
      route around HKO-specific evidence.
    tests:
      - python3 scripts/topology_doctor.py --fatal-misreads --json
      - tests/test_settlement_semantics.py::test_hko_policy_required_for_hong_kong
      - tests/test_settlement_semantics.py::test_hko_policy_invalid_for_non_hong_kong
    task_classes: [source_routing, settlement_semantics, hourly_observation_ingest]

  - id: code_review_graph_answers_where_not_what_settles
    severity: high
    false_equivalence: "Code Review Graph impact context == semantic/source authority"
    correction: >
      Code Review Graph is derived structural context. It can answer where to
      inspect and what blast radius exists, but it cannot decide settlement
      truth, source validity, current facts, or authority rank.
    proof_files:
      - AGENTS.md
      - workspace_map.md
      - architecture/task_boot_profiles.yaml
    invalidation_condition: >
      This can change only if graph output becomes backed by the same
      source/date/current-fact proofs as semantic boot manifests.
    tests:
      - python3 scripts/topology_doctor.py --fatal-misreads --json
      - python3 scripts/topology_doctor.py --code-review-graph-status --json
    task_classes: [source_routing, docs_authority, graph_review]

  - id: polymarket_low_market_history_starts_2026_04_15
    severity: critical
    false_equivalence: "absent_pre_2026_04_15_low_settlements == data_pipeline_bug"
    correction: >
      Polymarket DID NOT offer LOW (mn2t6 / "lowest temperature") weather
      markets before 2026-04-15. The first closed LOW event resolved 2026-04-15.
      Coverage is also restricted to 8 cities only (London, Seoul, NYC, Tokyo,
      Shanghai, Paris, Miami, Hong Kong) — not all 51 zeus cities. Therefore
      the absence of LOW settlement rows for (city, date) tuples that fall
      outside this scope is NOT a backfill miss, NOT a scraper bug, NOT a
      schema gap, and NOT actionable. Do not write retro-scrapers, do not
      open quarantine reactivation tickets, do not search archives.
      Confirmed via gamma-api.polymarket.com 2026-04-28: 48 closed LOW
      events / 18 active, dates 2026-04-15..2026-04-29. The HIGH (max
      temperature) market series predates LOW by ~2 years — this
      asymmetry is upstream-Polymarket, not zeus-internal.
      LOW Platt training MUST use observations.low_temp (42,749 rows /
      51 cities / 2023-12-27..2026-04-19) as canonical ground truth, NOT
      settlements LOW (only 48 rows ever exist).
    proof_files:
      - docs/operations/task_2026-04-28_settlements_low_backfill/plan.md
      - docs/operations/task_2026-04-28_settlements_low_backfill/evidence/pm_settlement_truth_low.json
      - docs/operations/known_gaps.md
    invalidation_condition: >
      Only a fresh gamma-api.polymarket.com probe showing closed/resolved LOW
      events with endDate < 2026-04-15 OR coverage extending beyond the
      8-city set may relax this caution. Prove with HTTP response artifacts,
      not from logs/archives that pre-date the 2026-04-28 audit.
    operator_override_2026_05_07: >
      Gamma backfill is ALLOWED under operator authorization 2026-05-07.
      Script: scripts/backfill_settlements_via_gamma_2026.py.
      Scope: LOW (2026-04-15+) and HIGH post-2026-02-21 (Polymarket switched
      from UMA OO V2 to internal automatic resolver 0x69c47De9D4D3Dad79590d61b9e05918E03775f24
      after block 83,275,667). The "forbidden Gamma backfill" restriction is
      lifted for these two date-bounded gaps. UMA chain-only requirement is
      preserved for HIGH 2025-01-22..2026-02-20 (already backfilled via
      scripts/backfill_uma_resolution_2026.py). Backfill executed 2026-05-07:
      +2562 HIGH rows (range 2026-02-21..2026-05-07), +125 LOW rows
      (range 2026-04-15..2026-05-07). reconstruction_method=gamma_backfill
      in provenance_json. Idempotent against existing UMA rows.
    tests:
      - python3 scripts/topology_doctor.py --fatal-misreads --json
    task_classes: [settlement_semantics, source_routing, calibration]

  - id: artifact_authority_status_missing_gate
    severity: high
    false_equivalence: "artifact_status_MISSING == artifact_score_0 OR artifact_absent == artifact_irrelevant"
    correction: >
      When architecture/artifact_authority_status.yaml is absent or an artifact
      entry is MISSING from the registry, agents MUST NOT assume the artifact is
      low-risk (score 0) or that no gate applies. MISSING from the registry means
      the artifact has not been assessed — not that it passed assessment.
      The correct behavior is: treat MISSING as UNKNOWN authority status, apply
      the most conservative gate (LOAD_BEARING by default), and escalate to an
      authority audit before proceeding. An absent registry entry is a gap in
      coverage, not a green light. Do not silently promote MISSING artifacts to
      ARCHIVABLE or skip Check #0 because the registry file does not exist.
    proof_files:
      - maintenance_worker/core/archival_check_0.py
      - architecture/module_manifest.yaml
    invalidation_condition: >
      Only a committed artifact_authority_status.yaml registry entry with
      status != MISSING and archival_ok: true may authorize archival of a
      specific path. No other signal overrides this gate.
    tests:
      - python3 scripts/topology_doctor.py --fatal-misreads --json
    task_classes: [authority_audit, maintenance_worker, docs_authority]

  - id: source_family_false_equivalence
    severity: critical
    false_equivalence: "IFS_grid_id == ENS_grid_id OR settlement_source == day0_source OR settlement_source == hourly_source OR day0_source == hourly_source"
    correction: >
      FM-10: IFS (ECMWF deterministic) and ENS (ECMWF ensemble) grid identifiers
      are NOT interchangeable. Settlement-window, day0 (same-day), and hourly
      source identifiers are NOT interchangeable. Each family is a distinct type
      in src/contracts/source_family.py. The assert_* guard functions raise
      TypeError at the family boundary. Any code path that treats these as
      equivalent will silently produce wrong weather source routing — the
      canonical failure mode is using an ENS ensemble source identifier in a
      function that expects an IFS deterministic source, producing no runtime
      error but systematically wrong model output.

      Canonical prevention: use IFSGridId, ENSGridId, SettlementSourceId,
      Day0SourceId, HourlySourceId from src/contracts/source_family.py. Pass
      values through assert_ifs_grid(), assert_ens_grid(), etc. at any boundary
      where the family matters. Tests in tests/test_source_family_collision.py
      prove the collision cases raise TypeError.
    proof_files:
      - src/contracts/source_family.py
      - tests/test_source_family_collision.py
    invalidation_condition: >
      Only a redesign of src/contracts/source_family.py that replaces the typed
      dataclass system with an equivalent or stronger runtime enforcement
      mechanism may alter this entry. Removing the typed boundary without
      replacement is not acceptable.
    tests:
      - python3 -m pytest tests/test_source_family_collision.py -p no:cov -q
    task_classes: [source_routing, calibration, settlement_semantics, docs_taxonomy]
