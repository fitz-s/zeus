  plan_ref: "docs/operations/task_2026-05-14_k1_followups/PLAN.md §1.1 (REV 4)"
  k1_split_commit: "eba80d2b9d"
  cutover_evidence:
    - description: >
        2026-05-17 audit (jobs/fda4e853/audit_2026_05_17/E_db_split.md)
        confirmed trade-class tables (trade_decisions, execution_fact,
        position_events, position_current, position_lots, venue_*,
        settlement_commands) are written exclusively to state/zeus_trades.db
        via get_trade_connection_with_world(). World.db copies are empty
        shells. Manifest was stale — schema_version 2 promotes trade as
        the third canonical partition.
      k1_runtime_commit: "eba80d2b9d"
      audit_artifact: ".claude/jobs/fda4e853/audit_2026_05_17/E_db_split.md"

