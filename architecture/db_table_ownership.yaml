  # ---------------------------------------------------------------------------
  # observation_instants — CONSOLIDATED (2026-05-29)
  # ---------------------------------------------------------------------------
  # The former observation_instants (v1 OpenMeteo subset) and
  # observation_instants_v2 (native-source superset) have MERGED into ONE
  # canonical table `observation_instants` (the v2 superset DDL, renamed). The
  # split-brain dual-write contract is GONE. Canonical DDL now lives ONLY in
  # src/state/schema/v2_schema.py (the subset DDL in db.py:1409 was deleted).
  #
  # v2-WINS migration policy (operator artifact under scripts/migrations/):
  # on a (city,source,utc_timestamp) key conflict the v2 row wins (it carries
  # the London-DST fix); legacy-only keys migrate with authority='UNVERIFIED'.
  # Native-source rows are A1/A2/A6 gated; OpenMeteo filler rows continue via
  # the rebuild/backfill writers (now UNVERIFIED on the same table).
  #
  # VIEW observation_instants_current (over observation_instants, gated by
  # zeus_meta) remains the intended cutover indirection but is INACTIVE by
  # default (zeus_meta seeds value='v0', matching no rows). Runtime code reads
  # observation_instants directly.
  #
  # Consumer-safety antibody (pre-activation guard):
  #   tests/state/test_observation_view_consumer_safety.py — fails if any
  #   runtime code in src/engine/ or src/execution/ reads the inactive view.
  # ---------------------------------------------------------------------------

  - name: observation_instants
