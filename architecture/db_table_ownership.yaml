# Zeus DB table ownership registry — canonical authority for table→DB mapping.
#
# Created: 2026-05-14
# Authority basis: docs/operations/task_2026-05-14_k1_followups/PLAN.md §1.1 (REV 4)
#                  K1 DB split commit eba80d2b9d (2026-05-11)
#
# Schema fields per PLAN §1.1:
#   name               — table name
#   db                 — physical DB: world | forecasts | trade | risk_state | backtest
#   schema_class       — forecast_class | world_class | trade_class | risk_class |
#                        backtest_class | legacy_archived
#   schema_version_owner — SCHEMA_VERSION | SCHEMA_FORECASTS_VERSION | none
#   created_by         — init_schema | init_schema_forecasts | apply_v2_schema |
#                        scripts.migrations._ensure_ledger |
#                        migration_script_<name>
#   pk_col             — primary key column name (or null for compound/no PK)
#   required_columns   — optional list of {name, type, nullable} for boot column-shape check
#   notes              — free-text context
#
# PRIMARY KEY: (name, db) — a table with the same name can appear on multiple DBs
#   with different schema_class (e.g., observations: forecast_class on forecasts.db,
#   legacy_archived on world.db). Loader enforces uniqueness of (name, db) pairs.
#
# SCOPE NOTES:
#   - "world" db = state/zeus-world.db (ZEUS_WORLD_DB_PATH)
#   - "forecasts" db = state/zeus-forecasts.db (ZEUS_FORECASTS_DB_PATH)
#   - "trade" db = state/zeus_trades.db (active since K1 commit eba80d2b9d 2026-05-11;
#     declared in schema_version 2 after 2026-05-17 audit)
#   - legacy_archived entries are EXCLUDED from assert_db_matches_registry set-equality
#     per PLAN §1.5 + ARCHITECT D2. Drop date: 2026-08-09 (2026-05-11 + 90d retention).
#
schema_version: 2
