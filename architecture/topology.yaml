schema_version: 1
metadata:
  created: "2026-04-13"
  owner_packet: "Packet 2 topology compiler MVP"
  authority_note: >
    This graph indexes existing authority. It does not override
    architecture/zones.yaml, architecture/invariants.yaml, or root AGENTS.md.

coverage_roots:
  - path: "."
    status: active
    scope: global
    zone: root
    authority_role: registry
    forbidden_misread: Root artifacts are not authority unless classified here.
  - path: "src"
    status: active
    scope: scoped
    zone: source
    authority_role: executable_law
    forbidden_misread: Package labels are navigation only; file-level zones win.
  - path: "tests"
    status: active
    scope: scoped
    zone: tests
    authority_role: registry
    forbidden_misread: Skipped or stale tests are not proof of active law.
  - path: "scripts"
    status: active
    scope: scoped
    zone: scripts
    authority_role: runtime_support
    forbidden_misread: Scripts are not hidden authority centers.
  - path: "docs"
    status: active
    scope: scoped
    zone: docs
    authority_role: registry
    forbidden_misread: Docs root is a router; subroot roles define authority.
  - path: "docs/authority"
    status: active
    scope: scoped
    zone: docs_authority
    authority_role: schema_law
    forbidden_misread: Authority docs route current law; machine manifests and code/tests still win conflicts.
  - path: "docs/reference"
    status: active
    scope: scoped
    zone: docs_reference
    authority_role: reference_only
    forbidden_misread: Reference docs are canonical durable references only; volatile current facts, dated audits, packet evidence, and support snapshots must not live here.
  - path: "docs/reference/modules"
    status: active
    scope: scoped
    zone: docs_reference
    authority_role: reference_only
    forbidden_misread: Module books are dense reference/cognition surfaces; they do not become authority, current facts, or packet status logs.
  - path: "docs/operations"
    status: active
    scope: scoped
    zone: docs_operations
    authority_role: operations_pointer
    forbidden_misread: Operations docs point to active work; they do not rewrite architecture law.
  - path: "docs/runbooks"
    status: active
    scope: scoped
    zone: docs_runbooks
    authority_role: runtime_support
    forbidden_misread: Runbooks guide operators; they do not outrank code or manifests.
  - path: "docs/reports"
    status: active
    scope: scoped
    zone: docs_reports
    authority_role: derived_diagnostic
    forbidden_misread: Generated reports are evidence only and must not be treated as authority.
  - path: "docs/to-do-list"
    status: active
    scope: scoped
    zone: docs_todo
    authority_role: derived_diagnostic
    forbidden_misread: Checklist workbooks are task inventories/evidence, not authority.
  - path: "docs/artifacts"
    status: active
    scope: scoped
    zone: docs_artifacts
    authority_role: derived_diagnostic
    forbidden_misread: Workbooks and artifacts are evidence only; extract durable law elsewhere.
  - path: "docs/archives"
    status: archived
    scope: historical
    zone: docs_archives
    authority_role: legacy_artifact
    forbidden_misread: Archives are provenance/evidence, not active authority.
  - path: "config"
    status: active
    scope: scoped
    zone: config
    authority_role: schema_law
    forbidden_misread: Reality contracts must stay tied to verification.
  - path: ".github/workflows"
    status: active
    scope: scoped
    zone: ci
    authority_role: runtime_support
    forbidden_misread: Advisory CI lanes are not blocking proof.
  - path: ".agents/skills"
    status: active
    scope: scoped
    zone: repo_local_skills
    authority_role: runtime_support
    forbidden_misread: Repo-local skills are workflow aids and never override root AGENTS or machine manifests.
  - path: "architecture"
    status: active
    scope: global
    zone: architecture
    authority_role: schema_law
    forbidden_misread: Topology graph must not redefine canonical manifests.
  - path: "raw"
    status: active
    scope: runtime
    zone: raw_evidence
    authority_role: derived_diagnostic
    forbidden_misread: Raw captures are external evidence inputs, not canonical truth until promoted through declared bridge/config paths.
  - path: "state"
    status: conditional
    scope: runtime
    zone: state
    authority_role: canonical_truth
    forbidden_misread: DB/file role must be classified before use as truth.
  - path: ".omx"
    status: scratch
    scope: runtime
    zone: runtime_state
    authority_role: scratch_artifact
    forbidden_misread: OMX state is session/runtime context, not repo authority.
  - path: ".omc"
    status: scratch
    scope: runtime
    zone: runtime_state
    authority_role: scratch_artifact
    forbidden_misread: OMC state is session/runtime context, not repo authority.
  - path: ".code-review-graph"
    status: generated
    scope: derived_context
    zone: online_code_graph_context
    authority_role: derived_diagnostic
    forbidden_misread: Code Review Graph is tracked online context for review/model orientation; it never authorizes topology, manifests, planning-lock, or canonical truth.
  - path: ".claude/worktrees"
    status: shadow
    scope: shadow
    zone: shadow
    authority_role: shadow_worktree
    forbidden_misread: Shadow worktrees are not active repo topology.
  - path: "zeus_data_improvement_foundation_plus"
    status: generated
    scope: historical
    zone: generated
    authority_role: derived_diagnostic
    forbidden_misread: Generated packages cannot be promoted without a packet.

root_governed_files:
  - path: "AGENTS.md"
    status: active
    scope: global
    zone: root
    authority_role: registry
    forbidden_misread: Root operating law must be read before narrower scopes.
  - path: "workspace_map.md"
    status: active
    scope: global
    zone: root
    authority_role: registry
    forbidden_misread: Navigation aid, not a replacement for zones.yaml.
  - path: "requirements.txt"
    status: active
    scope: global
    zone: root
    authority_role: runtime_support
    forbidden_misread: Dependency list is not architecture authority.
  - path: "pytest.ini"
    status: active
    scope: global
    zone: root
    authority_role: test_collection_config
    forbidden_misread: Pytest collection config prevents archived work packets from becoming active tests.
  - path: ".importlinter"
    status: active
    scope: global
    zone: root
    authority_role: schema_law
    forbidden_misread: Import rules enforce only configured boundaries.
  - path: ".gitignore"
    status: active
    scope: global
    zone: root
    authority_role: runtime_support
    forbidden_misread: Ignore rules do not classify authority.
  - path: "zeus-world.db"
    status: scratch
    scope: runtime
    zone: root
    authority_role: scratch_artifact
    forbidden_misread: Root-level DB artifact is not canonical; canonical world DB path is state/zeus-world.db.
  - path: "README.md"
    status: active
    scope: global
    zone: root
    authority_role: orientation
    forbidden_misread: Orientation document for human/professor review; does not outrank AGENTS.md, machine manifests, or executable authority.

