# ────────────────────────────────────────────────────────────────
# 4. Flag state at launch
# ────────────────────────────────────────────────────────────────
flag_state_at_launch:
  ZEUS_CALIBRATION_TRANSFER_OOS_EVAL_ENABLED: false
  rationale: >
    Post-2026-05-10 supersession (see erratum_2026_05_07.superseded above), the
    paired-equivalence diagnostic passes locally and the legacy static mapping
    IS the operator-accepted live authority at-launch.  The flag stays OFF for a
    different reason: the evidence-gated path (_with_evidence) requires rows in
    validated_calibration_transfers, which only accumulate naturally over ~2-4
    weeks of post-launch ingest.  Activating the flag before rows exist would
    cause every ECMWF candidate to return SHADOW_ONLY (silent live-entry kill).
    Flip the flag to true only after Phase B trigger conditions are met (§5).
  do_not_set: >
    DO NOT add ZEUS_CALIBRATION_TRANSFER_OOS_EVAL_ENABLED=true to plists or shell
    rc until Phase B accumulation is complete (≥1000 ECMWF pairs + ≥4 weeks of
    ingest + cycle-stratified coverage).  Pre-launch operator MUST also run
    `launchctl unsetenv ZEUS_CALIBRATION_TRANSFER_OOS_EVAL_ENABLED` to clear any
    stale user-domain value (see PLIST_UPDATE_FOR_RELOCK.md §6).

# ────────────────────────────────────────────────────────────────
# 5. Phase B uplift path
# ────────────────────────────────────────────────────────────────
phase_B_uplift:
  trigger_conditions:
    - "≥1000 ECMWF observed pairs in calibration_pairs_v2 (data_version ecmwf_opendata_*)"
    - "≥4 weeks since ingest daemon started writing ECMWF snapshots"
    - "TIGGE Phase 2 cloud download complete (hardens source Platt models)"
  earliest_plausible: "2026-05-20"
  cycle_stratified_coverage: "2026-06-01"
  steps: >
    1. Extend rebuild_calibration_pairs_v2.py for ecmwf_opendata_* data_version.
    2. Run OOS evaluator (evaluate_calibration_transfer_oos.py) for cross-domain routes.
    3. Verify physical-object equivalence plus brier_diff near zero before any LIVE_ELIGIBLE row.
    4. Operator flips ZEUS_CALIBRATION_TRANSFER_OOS_EVAL_ENABLED=true in plist.
  plan_ref: golden-knitting-wand.md Phase B (separate plan when triggered)

# ────────────────────────────────────────────────────────────────
# 6. Forbidden patterns
# ────────────────────────────────────────────────────────────────
forbidden_patterns:
  - pattern: synthetic_data
    description: >
      Never fabricate calibration_pairs_v2 rows, validated_calibration_transfers
      rows, or Platt parameters from fictional holdout pairs.  "No synthetic data
      ever" is a hard constraint (user-confirmed 2026-05-06).
  - pattern: evidence_rows_with_no_holdout_pairs
    description: >
      Do not write validated_calibration_transfers rows with status=LIVE_ELIGIBLE
      backed by n_pairs < MIN_PAIRS (30).  The evidence-gated path is only
      activated when real holdout pairs exist.
  - pattern: audit_approach_2
    description: >
      The "Approach 2" from critic-opus audit (fabricate cross-domain holdout pairs
      to bootstrap OOS rows) is REJECTED.  Physical equivalence makes this
      unnecessary; real pairs accumulate in 2-4 weeks.

# ────────────────────────────────────────────────────────────────
# 7. Non-synthetic classification
# ────────────────────────────────────────────────────────────────
non_synthetic_classification:
  verdict: NOT_SYNTHETIC
  subject: _TRANSFER_SOURCE_BY_OPENDATA_VERSION static mapping
  rationale: >
    The mapping routes one valid Platt (fit on TIGGE pairs) to a different
    data_version key (ecmwf_opendata_*).  It does NOT fabricate data, but
    non-synthetic is not the same as live-valid.  The route is live-valid only
    after paired equivalence evidence proves the OpenData and TIGGE rows are
    the same contract forecast object.
  distinction: >
    Synthetic data = fabricated inputs or outputs that were never observed.
    Static routing = directing a real model fit on real data to serve an
    equivalent data stream.  These are categorically different.
