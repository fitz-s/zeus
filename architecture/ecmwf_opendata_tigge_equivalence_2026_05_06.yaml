# ────────────────────────────────────────────────────────────────
# 1. Physical ensemble equivalence
# ────────────────────────────────────────────────────────────────
same_physical_ensemble:
  claim: >
    ECMWF Opendata (source_id='ecmwf_open_data', data_version prefix
    'ecmwf_opendata_*') and the TIGGE archive (data_version prefix
    'tigge_*', source_id='tigge_mars') are intended to name the same ECMWF
    IFS ensemble forecast family when issue time, cycle, paramId, step range,
    member, grid/sampling policy, and local-day extraction law match.  TIGGE is
    the delayed archive channel, while OpenData is the live dissemination
    channel.  Byte-identical extracted Zeus forecast objects are not currently
    proven by local evidence.
  release_channels:
    - id: ecmwf_open_data
      latency: real-time (~8h post-cycle-init)
      purpose: live serving
    - id: tigge_mars
      latency: archive (+48h post-cycle-init)
      purpose: reanalysis / training
  key_implication: >
    A Platt model trained on TIGGE pairs can become the canonical calibrator
    for ECMWF OpenData live forecasts only after paired equivalence evidence
    proves the same contract forecast object through member extrema, p_raw,
    canonical bins, and cycle/source/horizon strata.  Static transfer without
    that proof is blocked.

# ────────────────────────────────────────────────────────────────
# 2. Calibration implication
# ────────────────────────────────────────────────────────────────
calibration_implication:
  launch_path: evidence_gated_transfer
  mechanism: >
    _TRANSFER_SOURCE_BY_OPENDATA_VERSION (code_anchors §3) maps each
    ecmwf_opendata_* data_version key to its TIGGE counterpart.  That mapping
    is a candidate transfer route, not sufficient live authority.  A live
    decision must be backed by paired OpenData/TIGGE equivalence diagnostics
    that prove identical contract forecast-object semantics.
  statistical_sanity_check: >
    Cross-domain OOS validation is required before live promotion.  brier_diff
    near zero is necessary but not sufficient; the physical-object chain must
    first prove same param/step/member/grid/window/extrema/p_raw/bin identity.

