      across future Fitz #4 wiring invariants.

  - id: P11-2026-05-05
    title: "Sink-supplements-log-not-replaces design pattern (additive observability)"
    raised_at: "2026-05-05"
    raised_by: "capsule@executor-t2f"
    status: rejected
    detail_doc: ".claude/skills/orchestrator-telemetry/entries/2026-05-05_zeus_may3_R5_s5_t2h_t2i.md"
    rationale: >
      Visionist-opus (a128a7c65b394ebdb) judged 2026-05-05 as REJECT:
      "specific architectural fact about T2F observability; not a
      generalizable lesson". The additive-not-replacement choice was a
      one-time T2F design call; promoting it to project doctrine over-fits
      one phase's design choice. The underlying principle (don't break
      legacy log-line greps) is already covered by the broader stability-
      of-existing-interfaces convention.
    notes: >
      Original capsule observation retained for reference: T2F typed
      counter sink supplements (not replaces) existing logger.warning
      lines at all 17 sites; zero-risk for existing log parsers and
      alerting rules.

  - id: P12-2026-05-05
    title: "caplog RESCUE-branch fixture token_id wiring pattern"
    raised_at: "2026-05-05"
    raised_by: "capsule@executor-t2f"
    status: rejected
    detail_doc: ".claude/skills/orchestrator-telemetry/entries/2026-05-05_zeus_may3_R5_s5_t2h_t2i.md"
    rationale: >
      Visionist-opus (a128a7c65b394ebdb) judged 2026-05-05 as REJECT:
      "specific test-fixture detail for one branch. Not a lesson — it's a
      debugging note." A single test-fixture wiring choice does not
      generalize to backlog-worthy doctrine; if it recurs, an inline
      fixture-builder helper in tests/_helpers/ can address it without a
      project-level entry.

