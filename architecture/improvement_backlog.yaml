schema_version: 1
metadata:
  created: "2026-05-04"
  owner_packet: "AGENTS.md context capsule (PROPOSALS_2026-05-04 P3)"
  purpose: >
    Operator queue for actionable improvement insights surfaced by the
    AGENTS.md context capsule.  Each session-end capsule MAY append one
    or more entries when it identifies project-level lessons that would
    otherwise be lost to chat history.  Closeout requires either
    closeout_pr or rationale.

    This file is the V1 of P3 — it gives capsule insights a typed
    persistence target that survives chat history.  V2 (deferred) wires
    a topology_doctor admission for "improvement_backlog_write" so the
    write can be machine-validated; until then this is operator-honor-system.

status_vocabulary:
  - proposed       # capsule emitted; not yet operator-reviewed
  - accepted       # operator reviewed, will be implemented
  - implementing   # work in progress (anchor PR open)
  - implemented    # closed via closeout_pr
  - rejected       # operator decided not to act; rationale required
  - superseded     # replaced by a different entry; supersedes_id required

required_entry_fields:
  - id
  - title
  - raised_at
  - raised_by
  - status
  - detail_doc

optional_entry_fields:
  - closeout_pr
  - rationale
  - supersedes_id
  - notes

