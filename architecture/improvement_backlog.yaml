  - id: P4-2026-05-05
    title: "Planner test-file pre-lock validation (ls-verify cited test_commands)"
    raised_at: "2026-05-05"
    raised_by: "capsule@T2H-executor + capsule@verifier-persistent"
    status: proposed
    detail_doc: ".claude/skills/orchestrator-telemetry/entries/2026-05-05_zeus_may3_R5_s5_t2h_t2i.md"
