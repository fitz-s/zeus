  - id: P14-2026-05-05
    title: "Authority-row producer predicate mirror checklist"
    raised_at: "2026-05-05"
    raised_by: "capsule@object-meaning-invariance-wave3"
    status: proposed
    detail_doc: "current chat: Zeus object-meaning invariance wave 3"
    notes: >
      Wave 3 critic loop repeatedly found the same repair class in
      validated_calibration_transfers: a writer predicate was fixed, but
      legacy or contaminated rows could still authorize downstream consumers
      until the reader re-proved the predicate. Codify a checklist for any
      aggregate authority row: consumer gates must mirror producer predicates
      for source identity, active/verified authority, executable parameter
      validity, maturity/sample basis, generation time, target cohort
      eligibility, target cohort time, and recomputed economics. This should
      become a review checklist or static test template before future
      report/replay/learning authority tables are promoted.

