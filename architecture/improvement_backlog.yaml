  - id: P34-2026-05-05
    title: "Canonical settlement env routes need state-truth admission"
    raised_at: "2026-05-05"
    raised_by: "object-meaning-invariance-wave24"
    status: proposed
    detail_doc: "docs/operations/current_state.md"
    notes: >
      Wave 24 read-only selection found a high-risk environment-authority
      boundary: canonical `position_events` writes are inserted through a fixed
      column list that does not carry `env`, while legacy schema reconciliation
      adds `env TEXT NOT NULL DEFAULT 'live'`; settlement readers also expose
      `query_settlement_events(..., env=...)` without filtering canonical
      position events by environment. This can let non-live execution/replay settlement
      events materialize as live report, risk, or learning rows if canonical
      settlement writes occur outside live. The available settlement/replay/
      backfill routes rejected `src/state/ledger.py`, `src/state/db.py`, and
      relationship tests as out of scope, and semantic bootstrap lacks a
      `settlement` task class. Future topology maintenance should add a
      state-truth route for canonical settlement/report/learning env repairs,
      with explicit schema/no-live-DB-mutation boundaries and downstream
      report/learning antibody tests.

