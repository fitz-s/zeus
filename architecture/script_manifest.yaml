    module_owner: data
    packet: docs/operations/task_2026-04-21_gate_f_data_backfill
    required_helpers: [src.data.tier_resolver, src.data.observation_instants_writer, src.data.wu_hourly_client, src.data.ogimet_hourly_client, scripts.backfill_completeness]
