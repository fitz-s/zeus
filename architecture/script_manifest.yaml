    observability: [state/obs_v2_backfill_log.jsonl, state/backfill_manifest_obs_v2_*.json]
    required_tests: [tests/test_tier_resolver.py, tests/test_obs_v2_writer.py, tests/test_hourly_clients_parse.py, tests/test_backfill_completeness_guardrails.py, tests/test_backfill_scripts_match_live_config.py]
    do_not_use_when: "current_source_validity or current_data_state is stale for obs_v2 routing work"
