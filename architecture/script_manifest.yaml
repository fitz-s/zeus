schema_version: 1
metadata:
  created: "2026-04-13"
  owner_packet: "Packet 6 scripts manifest and DB repair guardrails"
  note: >
    Manifest for top-level scripts. Effective metadata is class defaults plus
    per-script overrides. This is a safety manifest, not permission to run any
    script.

required_effective_fields:
  - class
  - status
  - lifecycle
  - authority_scope
  - reuse_when
  - do_not_use_when
  - canonical_command
  - delete_policy
  - read_targets
  - write_targets
  - dry_run_default
  - apply_flag
  - target_db
  - external_inputs
  - dangerous_if_run
  - promotion_barrier
  - required_helpers
  - required_tests

canonical_db_targets:
  - state/zeus_trades.db
  - state/zeus-world.db
  - state/zeus-forecasts.db
  - state/risk_state.db
  - state/zeus.db
  - state/zeus-legacy.db
  - state/zeus-shared.db

diagnostic_allowed_write_targets:
  - stdout
  - temp
  - state/zeus_backtest.db
  - state/*.json
  - docs/reports
  - docs/reports/*
  - docs/operations/attribution_drift/*
  - docs/operations/edge_observation/*

allowed_lifecycles:
  - long_lived
  - packet_ephemeral
  - promotion_candidate
  - deprecated_fail_closed

naming_conventions: architecture/naming_conventions.yaml

class_selection_guide:
  enforcement: Repeatable repo policy, topology, structural lint, or contract gate.
  diagnostic: Read-only investigation; output is stdout and cannot authorize live changes.
  diagnostic_report_writer: Repeatable non-authority report artifact writer.
  runtime_support: Operator/runtime health, heartbeat, watch, resume, or post-run support.
  etl_writer: Repeatable external/world-data ingestion or backfill writer.
  repair: Packet-approved repair with explicit dry-run/apply boundary.
  config_writer: Repeatable config artifact generator from declared inputs.
  stale_deprecated: Retained only to fail closed; canonical_command must be DO_NOT_RUN.

class_defaults:
  enforcement:
    lifecycle: long_lived
    reuse_when: Repeatable repo policy, topology, or contract enforcement is needed.
    do_not_use_when: The task is a one-off investigation or migration probe.
    canonical_command: "python3 scripts/{script}"
    delete_policy: retain_until_superseded
    status: active
    authority_scope: blocking_or_policy_check
    read_targets: [repo]
    write_targets: [stdout]
    dry_run_default: true
    apply_flag: null
    target_db: null
    external_inputs: []
    dangerous_if_run: false
    promotion_barrier: "May block only when signal is reliable and owned."
    required_helpers: []
    required_tests: [tests/test_topology_doctor.py, tests/test_structural_linter.py]
  diagnostic:
    lifecycle: long_lived
    reuse_when: Repeatable read-only diagnosis is needed without mutating canonical truth.
    do_not_use_when: The output would authorize live changes or write canonical DB truth.
    canonical_command: "python3 scripts/{script}"
    delete_policy: retain_until_superseded
    status: active
    authority_scope: offline_no_promotion
    read_targets: [state]
    write_targets: [stdout]
    dry_run_default: true
    apply_flag: null
    target_db: null
    external_inputs: []
    dangerous_if_run: false
    promotion_barrier: "Diagnostic output cannot authorize live strategy or DB truth changes."
    required_helpers: []
    required_tests: []
  runtime_support:
    lifecycle: long_lived
    reuse_when: Operators need a repeatable runtime support or health command.
    do_not_use_when: The task is a data repair, migration, or strategy diagnostic.
    canonical_command: "python3 scripts/{script}"
    delete_policy: retain_until_superseded
    status: active
    authority_scope: operator_runtime_support
    read_targets: [state, logs]
    write_targets: [stdout]
    dry_run_default: true
    apply_flag: null
    target_db: null
    external_inputs: []
    dangerous_if_run: false
    promotion_barrier: "Runtime support must not become hidden authority."
    required_helpers: []
    required_tests: [tests/test_healthcheck.py, tests/test_runtime_guards.py]
  audit_artifact_writer:
    lifecycle: long_lived
    reuse_when: Audit observation artifacts must be written through the declared blocked lane.
    do_not_use_when: The output would place trades, mutate lifecycle truth, or promote diagnostics.
    canonical_command: "python3 scripts/{script}"
    delete_policy: retain_until_superseded
    status: active
    authority_scope: audit_observation_write
    read_targets: [state/zeus-world.db, market_data]
    write_targets: [state/zeus-world.db]
    dry_run_default: false
    apply_flag: implicit
    target_db: state/zeus-world.db
    external_inputs: [Polymarket CLOB, Weather observations]
    dangerous_if_run: true
    unguarded_write_rationale: "Existing capture script writes decision_log without an apply flag; classified as a dangerous write until hardened."
    promotion_barrier: "Writes decision artifacts only; output cannot place trades or promote replay authority."
    required_helpers: [src.state.decision_chain.store_artifact]
    required_tests: [tests/test_run_replay_cli.py, tests/test_replay_time_provenance.py]
  etl_writer:
    lifecycle: long_lived
    reuse_when: A repeatable ETL/backfill writes declared world-data targets.
    do_not_use_when: The task is exploratory or lacks a packet-reviewed write target.
    canonical_command: "python3 scripts/{script}"
    delete_policy: retain_until_superseded
    status: active
    authority_scope: world_data_write
    read_targets: [external_data, state/zeus-world.db]
    write_targets: [state/zeus-world.db]
    dry_run_default: false
    apply_flag: implicit
    target_db: state/zeus-world.db
    external_inputs: []
    dangerous_if_run: true
    write_by_default: true
    unguarded_write_rationale: "Existing ETL writers often default to writing; Packet 6 marks them dangerous pending CLI hardening."
    promotion_barrier: "Must not promote output to live authority without packet evidence."
    required_helpers: [src.state.db.get_world_connection]
    required_tests: []
  diagnostic_report_writer:
    lifecycle: long_lived
    reuse_when: A repeatable diagnostic report artifact is needed for non-promotion evidence.
    do_not_use_when: The report would become live authority or replace typed runtime truth.
    canonical_command: "python3 scripts/{script}"
    delete_policy: retain_until_superseded
    status: active
    authority_scope: report_artifact_non_promotion
    read_targets: [state]
    write_targets: [docs/reports, state/*.json, stdout]
    dry_run_default: true
    apply_flag: implicit
    target_db: report_artifact
    external_inputs: []
    dangerous_if_run: true
    unguarded_write_rationale: "Existing report writers write non-authority report artifacts without an apply flag; Packet 6 classifies targets explicitly."
    promotion_barrier: "Writes diagnostic report artifacts only; reports do not become live authority."
    required_helpers: []
    required_tests: []
  repair:
    lifecycle: long_lived
    reuse_when: A packet-approved repair needs an explicit dry-run/apply boundary.
    do_not_use_when: The repair is exploratory, unreviewed, or lacks target DB metadata.
    canonical_command: "python3 scripts/{script}"
    delete_policy: retain_until_superseded
    status: active
    authority_scope: repair_write
    read_targets: [state]
    write_targets: [state]
    dry_run_default: true
    apply_flag: "--apply"
    target_db: state
    external_inputs: []
    dangerous_if_run: true
    promotion_barrier: "Requires explicit packet, dry-run evidence, and target DB."
    required_helpers: []
    required_tests: []
  stale_deprecated:
    lifecycle: deprecated_fail_closed
    reuse_when: Never; retained only so stale references fail visibly.
    do_not_use_when: Always.
    canonical_command: DO_NOT_RUN
    delete_policy: archive_or_delete_in_cleanup_packet
    status: deprecated
    authority_scope: none
    read_targets: []
    write_targets: []
    dry_run_default: true
    apply_flag: null
    target_db: null
    external_inputs: []
    dangerous_if_run: false
    fail_closed: true
    promotion_barrier: "Do not run; replace or archive in cleanup packet."
    required_helpers: []
    required_tests: []
  config_writer:
    lifecycle: long_lived
    reuse_when: A repeatable config artifact must be generated from declared inputs.
    do_not_use_when: The generated config cannot be reviewed before promotion.
    canonical_command: "python3 scripts/{script}"
    delete_policy: retain_until_superseded
    status: active
    authority_scope: config_generation
    read_targets: [state/zeus-world.db]
    write_targets: [config/city_monthly_bounds.json]
    dry_run_default: false
    apply_flag: implicit
    target_db: config/city_monthly_bounds.json
    external_inputs: []
    dangerous_if_run: true
    write_by_default: true
    unguarded_write_rationale: "Existing generator writes active config without an apply flag; must be packet-reviewed before use."
    promotion_barrier: "Generated config cannot be promoted without review and diff evidence."
    required_helpers: []
    required_tests: [tests/test_ingestion_guard.py, tests/test_cities_config_authoritative.py]
  utility:
    lifecycle: long_lived
    reuse_when: A narrow reusable repo utility is needed.
    do_not_use_when: The utility would become hidden authority or mutate truth.
    canonical_command: "python3 scripts/{script}"
    delete_policy: retain_until_superseded
    status: active
    authority_scope: utility
    read_targets: [repo]
    write_targets: [stdout]
    dry_run_default: true
    apply_flag: null
    target_db: null
    external_inputs: []
    dangerous_if_run: false
    promotion_barrier: "Utility output is not authority."
    required_helpers: []
    required_tests: []

scripts:
  _build_pm_truth.py: {class: config_writer, write_targets: [data/pm_settlements_full.json], target_db: data/pm_settlements_full.json, external_inputs: [Polymarket Gamma API], apply_flag: implicit, unguarded_write_rationale: "Existing packet-generated builder writes a data artifact directly; output is evidence and must be reviewed before promotion.", promotion_barrier: "Generated PM settlement export is evidence and must not become canonical truth without a dedicated settlement authority packet."}
  _yaml_bootstrap.py: {class: utility}
  _tigge_common.py: {class: utility}
  backfill_completeness.py:
    class: utility
    canonical_command: DO_NOT_RUN
    required_tests: [tests/test_backfill_completeness_guardrails.py]
    reason: "Imported by observation backfill scripts to write P2 4.4.B-lite completeness manifests and enforce fail thresholds."
  agent_worktree_merge.py:
    class: utility
    module_owner: scripts
    status: active
    write_targets: [git_refs, worktree_files]
    required_tests: [tests/test_cotenant_staging_guard.py]
    reason: >
      Subagent merge-back helper (operator directive 2026-06-12). Run by a
      subagent as its LAST step from INSIDE its own linked worktree; fast-
      forwards the session branch (the branch checked out in the MAIN tree) to
      the agent's committed HEAD, but ONLY for a pure conflict-free ff against a
      clean main tree (daemon-equivalent to a normal commit). Refuses if run
      from the main tree or on a dirty worktree; defers non-ff cases to the
      orchestrator (MERGE_PENDING). Sets MAINTREE_GIT_BYPASS=1 for its single
      sanctioned `git -C <main> merge --ff-only` call. No canonical DB writes.
  antibody_scan.py: {class: diagnostic}
  apply_recommended_controls.py: {class: repair, apply_flag: explicit_import_only, target_db: state/control_plane.json}
  audit_architecture_alignment.py: {class: diagnostic}
  audit_artifact_json_natural_key_coverage_2026_05_19.py:
    class: diagnostic_report_writer
    module_owner: engine
    status: active
    lifecycle: packet_ephemeral
    packet: docs/operations/task_2026-05-19_strategy_vnext_phase1
    authority_scope: offline_no_promotion
    dangerous_if_run: false
    dry_run_default: true
    apply_flag: null
    target_db: null
    read_targets: [state/zeus-world.db]
    write_targets: [stdout, .claude/jobs/audit_artifact_json_natural_key]
    canonical_command: "python3 scripts/audit_artifact_json_natural_key_coverage_2026_05_19.py [--db PATH] [--sample N]"
    external_inputs: []
    delete_policy: retain_until_superseded
    reuse_when: >
      PR-T1-A gate check: measure from_artifact_json() natural-key recovery rate on
      decision_log rows before running backfill. Acceptance gate >= 80% recovery.
    do_not_use_when: "World DB is uninitialized (returns NO_TABLE vacuous pass). Use after decision_log rows exist."
    promotion_barrier: "Read-only diagnostic; does not write DB truth."
    required_helpers: [src.contracts.decision_natural_key.from_artifact_json]
    required_tests: []
  audit_city_data_readiness.py: {class: diagnostic_report_writer, write_targets: [stdout, temp]}
  audit_observation_instants.py:
    class: diagnostic_report_writer
    module_owner: data
    write_targets: [stdout, temp]
    required_helpers: [src.data.tier_resolver]
    read_from: [observation_instants]
    required_tests: [tests/test_tier_resolver.py, tests/test_obs_v2_writer.py, tests/test_hk_rejects_vhhh_source.py]
    notes: "Read-only Phase 0 Gate 0→1 auditor; returns 0 iff tier_violations + source_tier_mismatches + openmeteo_rows + authority_unverified_rows all 0 AND every non-HK city has >=min_expected rows for the given data_version."
  audit_divergence_exit_counterfactual.py: {class: diagnostic}
  audit_realtime_pnl.py: {class: diagnostic}
  audit_replay_fidelity.py: {class: diagnostic}
  audit_time_semantics.py: {class: diagnostic}
  automation_analysis.py: {class: diagnostic}
  backfill_cluster_taxonomy.py: {class: etl_writer, dangerous_if_run: true, apply_flag: implicit, target_db: state/zeus-world.db}
  backfill_current_market_price_snapshots.py: {class: etl_writer}
  backfill_decision_events_from_artifact_json.py:
    class: etl_writer
    module_owner: engine
    status: active
    lifecycle: packet_ephemeral
    packet: docs/operations/task_2026-05-19_strategy_vnext_phase1
    authority_scope: repair_write
    dangerous_if_run: true
    dry_run_default: true
    apply_flag: "--apply"
    target_db: state/zeus-world.db
    read_targets: [state/zeus-world.db, state/zeus-forecasts.db]
    write_targets: [state/zeus-world.db]
    canonical_command: "python3 scripts/backfill_decision_events_from_artifact_json.py [--db PATH] [--forecasts-db PATH] [--dry-run | --apply]"
    external_inputs: []
    delete_policy: retain_until_superseded
    reuse_when: >
      PR-T1-B one-shot backfill: populate decision_events from decision_log.artifact_json.
      DELETE-by-source then INSERT; idempotent re-run safe (preserves live_decision rows).
      Run after audit_artifact_json_natural_key_coverage gate passes >= 80%.
    do_not_use_when: "Audit gate has not been run. World DB uninitialized. Source='live_decision' rows must be preserved (DELETE scope is phase0_backfill only)."
    promotion_barrier: "Requires --apply flag; dry-run default. Run audit gate first."
    unguarded_write_rationale: "DELETE-by-source scoped to phase0_backfill only; live_decision rows preserved; --apply required."
    required_helpers: [src.state.decision_events.write_decision_event, src.contracts.decision_natural_key.from_artifact_json]
    required_tests: [tests/test_inv_decision_events_completeness.py]
  backfill_ens.py: {class: etl_writer}
  backfill_forecast_issue_time.py: {class: repair, dangerous_if_run: true, apply_flag: "--apply", target_db: state/zeus-world.db, dry_run_default: true, read_targets: [state/zeus-world.db], write_targets: [state/zeus-world.db], authority_scope: repair_write, lifecycle: long_lived, status: active, delete_policy: retain_until_superseded, reuse_when: "Backfill forecast_issue_time + availability_provenance for pre-F11 NULL rows. Idempotent — skips already-populated rows. Requires F11.2 schema migration applied first.", do_not_use_when: "Schema migration not applied yet (script raises). All rows already populated.", canonical_command: "python3 scripts/backfill_forecast_issue_time.py [--db PATH] (--dry-run | --apply --confirm-backup | --verify)", external_inputs: [], promotion_barrier: "--apply requires --confirm-backup affirming verified DB backup exists.", required_helpers: [src.data.dissemination_schedules.derive_availability], required_tests: [tests/test_dissemination_schedules.py, tests/test_forecasts_writer_provenance_required.py], unguarded_write_rationale: "Backfills 23,466 rows in single transaction; --apply + --confirm-backup required; uses F11.1 dissemination registry to derive provenance per source."}
  backfill_uma_resolution_2026.py:
