schema_version: 3
metadata:
  updated: '2026-06-23'
  owner: docs authority isolation rebuild
  purpose: >
    Machine-readable docs classification. Authority, reference, current facts,
    runbooks, evidence, reports, archive, and rebuild history are separate classes.

class_law:
  authority:
    is_authority: true
    default_read: task_required
    may_contain_current_runtime_snapshot: false
  reference:
    is_authority: false
    default_read: task_routed
    may_contain_current_runtime_snapshot: false
  current_fact_pointer:
    is_authority: false
    default_read: current_fact_tasks_only
    requires_freshness_and_expiry: true
  runbook:
    is_authority: false
    default_read: operation_tasks_only
  evidence_report_archive_rebuild:
    is_authority: false
    default_read: false

active_authority_docs:
  - docs/authority/AGENTS.md
  - docs/authority/zeus_current_architecture.md
  - docs/authority/zeus_current_delivery.md
  - docs/authority/zeus_forecast_fusion_authority.md
  - docs/authority/zeus_docs_classification_authority.md
  - docs/authority/zeus_change_control_constitution.md
  - docs/authority/ARCHIVAL_RULES.md

machine_authority_manifests:
  - architecture/docs_registry.yaml
  - architecture/reference_replacement.yaml
  - architecture/module_manifest.yaml
  - architecture/kernel_manifest.yaml
  - architecture/forecast_fusion_manifest.yaml
  - architecture/task_boot_profiles.yaml
  - architecture/db_table_ownership.yaml
  - architecture/negative_constraints.yaml
  - architecture/fatal_misreads.yaml
  - architecture/money_path_objects.yaml

canonical_references:
  default_broad:
    - docs/reference/zeus_prediction_market_quant_reference.md
  focused:
    - docs/reference/zeus_domain_model.md
    - docs/reference/zeus_math_spec.md
    - docs/reference/zeus_forecast_source_and_regional_model_reference.md
    - docs/reference/zeus_strategy_spec.md
    - docs/reference/zeus_market_settlement_reference.md
    - docs/reference/zeus_execution_lifecycle_reference.md
    - docs/reference/zeus_risk_strategy_reference.md
    - docs/reference/zeus_data_and_replay_reference.md
    - docs/reference/zeus_failure_modes_reference.md
    - docs/reference/modules/AGENTS.md

current_fact_pointers:
  - docs/operations/current_state.md
  - docs/operations/current_data_state.md
  - docs/operations/current_source_validity.md

non_default_history_patterns:
  - docs/evidence/**
  - docs/reports/**
  - docs/archive/**
  - docs/rebuild/**
  - docs/operations/task_*/**
  - docs/operations/current/**

entries:
  - {path: docs/AGENTS.md, doc_class: router, authority: false, default_read: true}
  - {path: docs/README.md, doc_class: router, authority: false, default_read: true}
  - {path: docs/archive_registry.md, doc_class: archive_interface, authority: false, default_read: false}
  - {path: docs/authority/AGENTS.md, doc_class: authority, authority: true, default_read: true}
  - {path: docs/authority/zeus_current_architecture.md, doc_class: authority, authority: true, default_read: true}
  - {path: docs/authority/zeus_current_delivery.md, doc_class: authority, authority: true, default_read: true}
  - {path: docs/authority/zeus_forecast_fusion_authority.md, doc_class: authority, authority: true, default_read: true}
  - {path: docs/authority/zeus_docs_classification_authority.md, doc_class: authority, authority: true, default_read: true}
  - {path: docs/authority/zeus_change_control_constitution.md, doc_class: authority, authority: true, default_read: false}
  - {path: docs/authority/ARCHIVAL_RULES.md, doc_class: authority, authority: true, default_read: true}
  - {path: docs/reference/AGENTS.md, doc_class: reference_router, authority: false, default_read: true}
  - {path: docs/reference/zeus_prediction_market_quant_reference.md, doc_class: reference, authority: false, default_read: true}
  - {path: docs/reference/zeus_domain_model.md, doc_class: reference, authority: false, default_read: false}
  - {path: docs/reference/zeus_math_spec.md, doc_class: reference, authority: false, default_read: false}
  - {path: docs/reference/zeus_forecast_source_and_regional_model_reference.md, doc_class: reference, authority: false, default_read: false}
  - {path: docs/reference/zeus_strategy_spec.md, doc_class: reference, authority: false, default_read: false}
  - {path: docs/reference/zeus_market_settlement_reference.md, doc_class: reference, authority: false, default_read: false}
  - {path: docs/reference/zeus_execution_lifecycle_reference.md, doc_class: reference, authority: false, default_read: false}
  - {path: docs/reference/zeus_risk_strategy_reference.md, doc_class: reference, authority: false, default_read: false}
  - {path: docs/reference/zeus_data_and_replay_reference.md, doc_class: reference, authority: false, default_read: false}
  - {path: docs/reference/zeus_failure_modes_reference.md, doc_class: reference, authority: false, default_read: false}
  - {path: docs/reference/modules/, doc_class: module_reference, authority: false, default_read: false}
  - {path: docs/operations/AGENTS.md, doc_class: operations_router, authority: false, default_read: true}
  - {path: docs/operations/current_state.md, doc_class: current_fact_pointer, authority: false, default_read: true}
  - {path: docs/operations/current_data_state.md, doc_class: current_fact_pointer, authority: false, default_read: true}
  - {path: docs/operations/current_source_validity.md, doc_class: current_fact_pointer, authority: false, default_read: true}
  - {path: docs/runbooks/, doc_class: runbook, authority: false, default_read: false}
  - {path: docs/evidence/, doc_class: evidence, authority: false, default_read: false}
  - {path: docs/reports/, doc_class: report, authority: false, default_read: false}
  - {path: docs/archive/, doc_class: archive, authority: false, default_read: false}
  - {path: docs/rebuild/, doc_class: rebuild_history, authority: false, default_read: false}
