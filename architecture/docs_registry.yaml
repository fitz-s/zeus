schema_version: 5
metadata:
  updated: '2026-06-23'
  owner: docs authority isolation rebuild
  purpose: Machine-readable docs classification and three-plane routing.

planes:
  authority: law and machine law
  operations: current facts, runtime artifacts, active work, receipts
  persistent_special: reference, runbooks, evidence, reports, archives, rebuild history

active_authority_docs:
  - docs/authority/AGENTS.md
  - docs/authority/zeus_current_architecture.md
  - docs/authority/zeus_current_delivery.md
  - docs/authority/zeus_database_runtime_authority.md
  - docs/authority/zeus_forecast_fusion_authority.md
  - docs/authority/zeus_docs_classification_authority.md
  - docs/authority/zeus_runtime_artifact_authority.md
  - docs/authority/zeus_change_control_constitution.md
  - docs/authority/ARCHIVAL_RULES.md

machine_authority_manifests:
  - architecture/docs_registry.yaml
  - architecture/docs_plane_manifest.yaml
  - architecture/reference_replacement.yaml
  - architecture/module_manifest.yaml
  - architecture/kernel_manifest.yaml
  - architecture/db_runtime_manifest.yaml
  - architecture/forecast_fusion_manifest.yaml
  - architecture/task_boot_profiles.yaml
  - architecture/db_table_ownership.yaml
  - architecture/negative_constraints.yaml
  - architecture/fatal_misreads.yaml
  - architecture/money_path_objects.yaml

canonical_references:
  default_broad: [docs/reference/zeus_prediction_market_quant_reference.md]
  focused:
    - docs/reference/zeus_domain_model.md
    - docs/reference/zeus_math_spec.md
    - docs/reference/zeus_forecast_source_and_regional_model_reference.md
    - docs/reference/zeus_strategy_spec.md
    - docs/reference/zeus_market_settlement_reference.md
    - docs/reference/zeus_execution_lifecycle_reference.md
    - docs/reference/zeus_risk_strategy_reference.md
    - docs/reference/zeus_data_and_replay_reference.md
    - docs/reference/zeus_failure_modes_reference.md
    - docs/reference/modules/AGENTS.md

current_fact_pointers:
  - docs/operations/current_state.md
  - docs/operations/current_data_state.md
  - docs/operations/current_source_validity.md

non_default_history_patterns:
  - docs/evidence/**
  - docs/reports/**
  - docs/archive/**
  - docs/rebuild/**
  - docs/operations/task_*/**
  - docs/operations/current/**

entries:
  - {path: docs/AGENTS.md, plane: persistent_special, doc_class: router, authority: false, default_read: true}
  - {path: docs/README.md, plane: persistent_special, doc_class: router, authority: false, default_read: true}
  - {path: docs/archive_registry.md, plane: persistent_special, doc_class: archive_interface, authority: false, default_read: false}
  - {path: docs/authority/AGENTS.md, plane: authority, doc_class: authority, authority: true, default_read: true}
  - {path: docs/authority/zeus_current_architecture.md, plane: authority, doc_class: authority, authority: true, default_read: true}
  - {path: docs/authority/zeus_current_delivery.md, plane: authority, doc_class: authority, authority: true, default_read: true}
  - {path: docs/authority/zeus_database_runtime_authority.md, plane: authority, doc_class: authority, authority: true, default_read: true}
  - {path: docs/authority/zeus_forecast_fusion_authority.md, plane: authority, doc_class: authority, authority: true, default_read: true}
  - {path: docs/authority/zeus_docs_classification_authority.md, plane: authority, doc_class: authority, authority: true, default_read: true}
  - {path: docs/authority/zeus_runtime_artifact_authority.md, plane: authority, doc_class: authority, authority: true, default_read: true}
  - {path: docs/authority/zeus_change_control_constitution.md, plane: authority, doc_class: authority, authority: true, default_read: false}
