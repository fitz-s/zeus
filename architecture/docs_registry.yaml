schema_version: 2
metadata:
  updated: '2026-06-23'
  owner: docs authority isolation rebuild
  purpose: >
    Machine-readable classification for tracked docs surfaces. It controls whether
    a doc may be default-read as current authority/reference, treated as a current
    fact pointer, or isolated as evidence/history.

allowed_doc_classes: [router, authority, reference, module_reference, operations, runbook, report, artifact, checklist, archive_interface, evidence, archive, rebuild_history, package_input]
allowed_lifecycle_states: [durable, active, temporary, transitional, historical, closed]
allowed_coverage_scopes: [exact, descendants]
required_entry_fields:
  - path
  - doc_class
  - default_read
  - direct_reference_allowed
  - current_role
  - truth_profile
  - freshness_class
  - lifecycle_state
  - coverage_scope
  - parent_coverage_allowed
  - contains_volatile_metrics
  - current_tense_allowed
  - refresh_source

entries:
  - path: docs/AGENTS.md
    doc_class: router
    default_read: true
    direct_reference_allowed: true
    current_role: docs root routing and local rules
    truth_profile: router
    freshness_class: stable
    lifecycle_state: durable
    coverage_scope: exact
    parent_coverage_allowed: false
    contains_volatile_metrics: false
    current_tense_allowed: true
    refresh_source: code_and_manifest

  - path: docs/README.md
