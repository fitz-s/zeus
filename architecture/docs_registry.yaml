schema_version: 1
metadata:
  updated: '2026-06-23'
  owner: docs authority isolation rebuild
  purpose: >
    Machine-readable classification for tracked docs surfaces. This registry controls
    whether a doc may be default-read as current authority/reference, treated as a
    current-fact pointer, or isolated as evidence/history.
required_entry_fields:
  - path
  - doc_class
  - default_read
  - direct_reference_allowed
  - current_role
  - canonical_replaced_by
  - next_action
  - lifecycle_state
  - coverage_scope
  - parent_coverage_allowed
  - truth_profile
  - freshness_class
  - supersedes
  - superseded_by
  - may_live_in_reference
  - contains_volatile_metrics
  - current_tense_allowed
  - refresh_source
optional_entry_fields:
  - topic_authority
  - superseded_chain
  - isolation_reason
allowed_doc_classes:
  - router
  - authority
  - reference
  - legacy_reference
  - module_reference
  - operations
  - runbook
  - report
  - artifact
  - checklist
  - archive_interface
  - extraction_source
  - package_input
  - evidence
  - archive
  - rebuild_history
allowed_next_actions:
  - keep
  - extract_then_move
  - extract_then_reassess
  - move_to_operations
  - demote_after_extraction
  - archive_after_closeout
  - retain_as_evidence
  - quarantine_non_default
allowed_lifecycle_states:
  - durable
  - active
  - temporary
  - transitional
  - historical
  - closed
allowed_coverage_scopes:
  - exact
  - descendants
parent_coverage_allowed_patterns:
  - docs/operations/current/
  - docs/operations/task_*/
  - docs/evidence/
  - docs/reports/
  - docs/archive/
  - docs/rebuild/
  - docs/artifacts/
  - docs/to-do-list/
  - docs/reference/legacy/
entries:
