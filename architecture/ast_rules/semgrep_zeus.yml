rules:
  - id: zeus-no-direct-close-from-engine
    message: "Engine/orchestration code may not directly terminalize lifecycle via close_position(); emit exit intent and execution lifecycle instead."
    languages: [python]
    severity: ERROR
    paths:
      include:
        - src/engine/**/*.py
    pattern-either:
      - pattern: close_position(...)
      - pattern: void_position(...)

  - id: zeus-no-memory-only-control-state
    message: "Durable control/policy may not live only in process memory outside control-plane internals."
    languages: [python]
    severity: ERROR
    paths:
      include:
        - src/**/*.py
      exclude:
        - src/control/control_plane.py
        - tests/**/*.py
    pattern: _control_state[...]

  - id: zeus-no-json-authority-write
    # ultrareview-25 F6 narrowed 2026-05-01: prior pattern matched ALL src/ writes
    # which made the rule a false-positive minefield (every legitimate file
    # write — logs, caches, audit trails — got flagged). Now scoped to writes
    # whose target literal contains "positions.json" or "status_summary.json".
    # Variable-derived paths (e.g. STATUS_PATH = state_path("status_summary.json"))
    # in the dedicated export modules remain excluded by paths.exclude.
    message: "positions.json and status_summary.json are derived exports only; do not introduce new write paths outside their dedicated export modules (src/observability/status_summary.py, src/state/portfolio.py)."
    languages: [python]
    severity: ERROR
    paths:
      include:
        - src/**/*.py
      exclude:
        - src/state/portfolio.py
        - src/observability/status_summary.py
        - tests/**/*.py
    pattern-either:
      - patterns:
          - pattern: open($PATH, "w")
          - metavariable-regex:
              metavariable: $PATH
              regex: '.*(positions|status_summary)\.json.*'
      - patterns:
          - pattern: open($PATH, "wb")
          - metavariable-regex:
              metavariable: $PATH
              regex: '.*(positions|status_summary)\.json.*'
      - patterns:
          - pattern: $TARGET.write_text(...)
          - metavariable-regex:
              metavariable: $TARGET
              regex: '.*(positions|status_summary)\.json.*'
      - patterns:
          - pattern: $TARGET.write_bytes(...)
          - metavariable-regex:
              metavariable: $TARGET
              regex: '.*(positions|status_summary)\.json.*'

  - id: zeus-no-ad-hoc-probability-complement
    message: "Do not use ad hoc probability complements across architecture boundaries; use semantic contracts/helpers or explicit math-isolated modules."
    languages: [python]
    severity: WARNING
    paths:
      include:
        - src/engine/**/*.py
        - src/state/**/*.py
        - src/execution/**/*.py
      exclude:
        - tests/**/*.py
        - src/contracts/**/*.py
    pattern-either:
      - pattern: 1 - $P
      - pattern: 1.0 - $P

  - id: zeus-no-direct-phase-assignment
    message: "Raw phase/state assignment outside lifecycle kernel is forbidden. Use lifecycle fold/manager/projection."
    languages: [python]
    severity: WARNING
    paths:
      include:
        - src/**/*.py
      exclude:
        - src/state/lifecycle_manager.py
        - src/state/projection.py
        - src/state/ledger.py
        - tests/**/*.py
    pattern-either:
      - pattern: $OBJ.phase = "..."
      - pattern: $OBJ.state = "..."

  - id: zeus-no-strategy-default-fallback
    message: "Default strategy fallback masks attribution contamination; use canonical strategy_key or reject/quarantine."
    languages: [python]
    severity: ERROR
    paths:
      include:
        - src/**/*.py
      exclude:
        - tests/**/*.py
    pattern-either:
      - pattern: |
          if $X not in $Y:
              $X = "opening_inertia"
      - pattern: |
          if not $X:
              $X = "opening_inertia"

  - id: zeus-no-default-unit-fallback
    message: "Do not inject default unit semantics into core logic; units must be explicit or type-carried."
    languages: [python]
    severity: WARNING
    paths:
      include:
        - src/**/*.py
      exclude:
        - tests/**/*.py
    pattern-either:
      - pattern: unit="F"
      - pattern: unit = "F"
      - pattern: unit="C"
      - pattern: unit = "C"

  # --- Dual-Track Metric Spine rules (Phase 0b) ---
  # TODO: Phase 9 will tighten this pattern to require a distributional object parameter.
  - id: zeus-no-bare-entry-price-kelly
    message: "kelly_size() must receive a distributional price object, not a bare entry_price scalar. A bare scalar discards fill probability and adverse selection."
    languages: [python]
    severity: WARNING
    paths:
      include:
        - src/**/*.py
      exclude:
        - tests/**/*.py
    pattern: kelly_size(..., entry_price=$X, ...)

  # TODO: Phase 2 will land a concrete commit-ordering pattern once state-authority refactor is complete.
  - id: zeus-no-json-before-db-commit
    message: "JSON export writes must not precede the DB commit. Write JSON only after conn.commit() returns."
    languages: [python]
    severity: WARNING
    paths:
      include:
        - src/**/*.py
      exclude:
        - tests/**/*.py
    pattern: |
      $X.write_text(...)
      ...
      $CONN.commit()

  # TODO: Phase 2/7 will land a concrete pattern after World DB v2 schema exists with explicit temperature_metric column.
  - id: zeus-no-high-low-row-mix
    message: "High and low rows must not be mixed in the same Platt model, calibration set, bin lookup, or settlement identity. Placeholder: concrete pattern pending v2 schema."
    languages: [python]
    severity: WARNING
    paths:
      include:
        - src/**/*.py
      exclude:
        - tests/**/*.py
    pattern: "\"daily_low\""

  # TODO: Phase 1 identity work will tighten this to detect the full drift pattern across call sites.
  - id: zeus-no-fdr-family-key-drift
    message: "make_family_id() must not be called with an empty strategy_key at some call sites and a non-empty one at others. Per-path drift in family key construction is forbidden."
    languages: [python]
    severity: WARNING
    paths:
      include:
        - src/**/*.py
      exclude:
        - tests/**/*.py
    pattern: make_family_id(..., strategy_key="", ...)

  # P0 hardening 2026-04-26 (INV-24, NC-16): place_limit_order is the
  # SDK seam to Polymarket CLOB; new entries must flow through the executor
  # gateway so V2 preflight (INV-25) and the durable command boundary land
  # together. Allowed callers: src/execution/executor.py (seam),
  # src/data/polymarket_client.py (definition), and the operator-only
  # scripts/live_smoke_test.py which calls v2_preflight() itself.
  - id: zeus-place-limit-order-gateway-only
    message: "place_limit_order is gateway-only. Call execute_intent / _live_order, not the SDK directly."
    languages: [python]
    severity: ERROR
    paths:
      include:
        - src/**/*.py
        - scripts/**/*.py
      exclude:
        - src/execution/executor.py
        - src/data/polymarket_client.py
        - scripts/live_smoke_test.py
        - tests/**/*.py
    pattern-either:
      - pattern: $CLIENT.place_limit_order(...)
      - pattern: place_limit_order(...)

  # P1.S1 (NC-18): venue_command_events is append-only outside the repo.
  # Mutating a recorded event creates a "fact rewrite" path that is invisible
  # to forensic recovery — append a new event instead.
  # Post-critic MEDIUM-2 (2026-04-26): scope expanded to also cover
  # venue_commands UPDATE/DELETE, matching the parallel test surface and
  # closing the asymmetry between belt and suspenders.
  - id: zeus-no-direct-venue-command-update
    message: "venue_commands / venue_command_events are append-only outside the repo; record new events via venue_command_repo, do not UPDATE/DELETE either table."
    languages: [python]
    severity: ERROR
    paths:
      include:
        - src/**/*.py
      exclude:
        - src/state/venue_command_repo.py
        - tests/**/*.py
    pattern-either:
      - pattern: |
          $CONN.execute("UPDATE venue_command_events ...")
      - pattern: |
          $CONN.execute("DELETE FROM venue_command_events ...")
      - pattern: |
          $CONN.execute("UPDATE venue_command_events ...", ...)
      - pattern: |
          $CONN.execute("DELETE FROM venue_command_events ...", ...)
      - pattern: |
          $CONN.execute("UPDATE venue_commands ...")
      - pattern: |
          $CONN.execute("DELETE FROM venue_commands ...")
      - pattern: |
          $CONN.execute("UPDATE venue_commands ...", ...)
      - pattern: |
          $CONN.execute("DELETE FROM venue_commands ...", ...)
