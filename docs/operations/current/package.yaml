schema_version: 1
kind: OperationPackage
package_id: current_live_operations
status: active
owner: operator
created_at: "2026-07-07"
updated_at: "2026-07-07"

role:
  authority_behavior: pointer_and_evidence
  is_architecture_law: false
  is_runtime_truth: false
  note: >
    Advisory file-management container for active plans, evidence, reports,
    and closeouts. Architecture law lives in docs/authority/, architecture/,
    tests, and executable source. No frontier narrative here — point-in-time
    blocker text rots; the forward journal is the work state.

work_state:
  journal: docs/operations/current/plans/hourly_capital_gains_improvement_loop.md
  plan_index: docs/operations/current/plans/INDEX.md

artifact_policy:
  plans: docs/operations/current/plans/
  evidence: docs/operations/current/evidence/
  reports: docs/operations/current/reports/
  closeouts: docs/operations/current/closeouts/
  generated: docs/operations/current/reports/
  agent_runtime: docs/operations/current/agent_runtime/

closeout_policy:
  required_fields:
    - changed_files
    - tests_run
    - live_side_effects
    - residual_work
    - rollback
  residual_work_target: docs/operations/known_gaps.md

archive_policy:
  archive_target: docs/archive/
  archive_requires_human: true
