# GATE_AUDIT.yaml
# Audited: 2026-05-04 against branch live-block-traceback-capture-2026-05-04 (HEAD)
# All file:line citations are from live grep at time of audit — not memory.
# Short-circuit in scope: src/engine/cycle_runner.py:752
#   if _risk_allows_new_entries(risk_level) and not entries_paused and entries_blocked_reason is None:

gates:

  # ── A. File-based fail-closed ──────────────────────────────────────────────

  - id: 1
    name: auto_pause_failclosed_tombstone
    category: file_fail_closed
    state_source: "file:state/auto_pause_failclosed.tombstone"
    read_at_file_line: "src/control/control_plane.py:385"
    predicate_blocks_when: "tombstone file exists (os.path.exists check inside refresh_control_state)"
    reason_format: "entries_paused"
    owner_module: "src.control.heartbeat_supervisor"
    owner_function: "_write_failclosed_tombstone"
    notes: "Also written by src/control/control_plane.py:278 (pause_entries path). Read site at 385 is inside refresh_control_state(), called at cycle_runner.py:700,707 before the L752 short-circuit."

  - id: 2
    name: auto_pause_streak_escalation
    category: file_fail_closed
    state_source: "file:state/auto_pause_streak.json"
    read_at_file_line: "src/engine/cycle_runner.py:767"
    predicate_blocks_when: "record_failure() returns count >= STREAK_THRESHOLD (3) within STREAK_WINDOW_SECONDS (300s)"
    reason_format: "auto_pause:{ExceptionClassName}"
    owner_module: "src.control.auto_pause_streak"
    owner_function: "record_failure"
    notes: "Streak does NOT directly set entries_blocked_reason; it calls pause_entries() at cycle_runner.py:770, which sets entries_paused=True in _control_state. The streak JSON tracks window timestamps; STREAK_THRESHOLD=3, STREAK_WINDOW_SECONDS=300 (src/control/auto_pause_streak.py:32-33)."

  # ── B. DB control plane ────────────────────────────────────────────────────

  - id: 3
    name: control_overrides_history_entries_gate
    category: db_control_plane
    state_source: "db:control_overrides_history (via control_overrides VIEW)"
    read_at_file_line: "src/state/db.py:5454"
    predicate_blocks_when: "control_overrides WHERE target_type='global' AND target_key='entries' AND action_type='gate' AND value='true' AND issued_at<=now AND (effective_until IS NULL OR effective_until>now)"
    reason_format: "entries_paused (from DB gate row)"
    owner_module: "src.state.db"
    owner_function: "query_control_override_state"
    notes: "query_control_override_state reads the control_overrides VIEW (event-sourced over control_overrides_history). Result is consumed at src/control/control_plane.py:366 inside refresh_control_state(). The override_id for auto-pause rows is 'control_plane:global:entries_paused' (control_plane.py:155)."

  - id: 4
    name: entries_paused_in_memory_flag
    category: db_control_plane
    state_source: "memory:_control_state['entries_paused']"
    read_at_file_line: "src/engine/cycle_runner.py:736"
    predicate_blocks_when: "_control_state['entries_paused'] is True"
    reason_format: "entries_paused"
    owner_module: "src.control.control_plane"
    owner_function: "pause_entries"
    notes: "In-memory dict populated from DB (#3) + tombstone (#1) by refresh_control_state(). is_entries_paused() at control_plane.py:118-119 is the read accessor called at cycle_runner.py:736."

  - id: 5
    name: entries_blocked_reason_string
    category: db_control_plane
    state_source: "memory:entries_blocked_reason (local var in discover_cycle_opportunities)"
    read_at_file_line: "src/engine/cycle_runner.py:609"
    predicate_blocks_when: "entries_blocked_reason is not None at L752"
    reason_format: "one of: chain_sync_unavailable | portfolio_quarantined | force_exit_review_daily_loss_red | risk_level=<VALUE> | entry_bankroll_unavailable | entry_bankroll_non_positive | near_max_exposure | entries_paused | cutover_guard=<STATE> | heartbeat=<HEALTH> | ws_gap=<STATE>:<REASON> | portfolio_governor=<REASON> | posture=<POSTURE>"
    owner_module: "src.engine.cycle_runner"
    owner_function: "discover_cycle_opportunities"
    notes: "Local variable initialised to None at L609, set by 11 conditional branches (L715-L751) before the L752 check. Not persisted to DB directly; written into summary dict at L798."

  # ── C. RiskGuard ──────────────────────────────────────────────────────────

  - id: 6
    name: risk_allows_new_entries_predicate
    category: riskguard
    state_source: "db:risk_state (latest row) via get_current_level() / tick_with_portfolio()"
    read_at_file_line: "src/engine/cycle_runner.py:268"
    predicate_blocks_when: "risk_level != RiskLevel.GREEN (YELLOW/ORANGE/RED/DATA_DEGRADED all block)"
    reason_format: "risk_level=<VALUE>"
    owner_module: "src.riskguard.riskguard"
    owner_function: "tick_with_portfolio"
    notes: "_risk_allows_new_entries defined at cycle_runner.py:268, called at L752. risk_level obtained at L462 (get_current_level) and potentially overwritten at L481 (tick_with_portfolio). Only RiskLevel.GREEN allows new entries."

  - id: 7
    name: trailing_loss_reference_limit100_scan
    category: riskguard
    state_source: "db:risk_state ORDER BY checked_at DESC LIMIT 100"
    read_at_file_line: "src/riskguard/riskguard.py:221"
    predicate_blocks_when: "no qualifying row found in LIMIT-100 window → returns no_reference_row or insufficient_history → DATA_DEGRADED risk level → blocks entries"
    reason_format: "DATA_DEGRADED (risk_level=DATA_DEGRADED)"
    owner_module: "src.riskguard.riskguard"
    owner_function: "_trailing_loss_reference"
    notes: "SF7 fix (commit 19fe3c89) pre-filters at SQL layer: WHERE json_extract(details_json,'$.bankroll_truth_source')='polymarket_wallet'. Before fix, the LIMIT-100 window could be dominated by rows without the field, causing persistent DATA_DEGRADED. Post-fix, insufficient_history (no qualifying row old enough) is bootstrap-allowlisted to GREEN."

  - id: 8
    name: bankroll_truth_source_polymarket_wallet_filter
    category: riskguard
    state_source: "db:risk_state.details_json field 'bankroll_truth_source'"
    read_at_file_line: "src/riskguard/riskguard.py:257"
    predicate_blocks_when: "row lacks bankroll_truth_source='polymarket_wallet' → skipped by _trailing_loss_reference → may cause insufficient_history or DATA_DEGRADED"
    reason_format: "DATA_DEGRADED (insufficient_history or no_reference_row)"
    owner_module: "src.riskguard.riskguard"
    owner_function: "tick"
    notes: "Field written at riskguard.py:976 inside tick(). Rows emitted before commit 19fe3c89 lack the field and are now excluded at SQL layer. Pre-cutover rows in DB will be filtered out; post-cutover rows carry the field."

  # ── D. Runtime health ─────────────────────────────────────────────────────

  - id: 9
    name: heartbeat_supervisor_allow_submit
    category: runtime_health
    state_source: "memory:HeartbeatSupervisor._health (in-process singleton)"
    read_at_file_line: "src/engine/cycle_runner.py:657"
    predicate_blocks_when: "summary()['entry']['allow_submit'] is False (health != HEALTHY or supervisor is None)"
    reason_format: "heartbeat=<HEALTH>"
    owner_module: "src.control.heartbeat_supervisor"
    owner_function: "summary"
    notes: "summary() defined at heartbeat_supervisor.py:269. entry_allowed = supervisor.gate_for_order_type(OrderType.GTC). blocks_entries_when: health is DEGRADED, LOST, or STARTING. If supervisor is None, allow_submit=False. Tombstone (#1) is also written when health degrades to LOST (heartbeat_supervisor.py:182)."

  - id: 10
    name: ws_gap_guard_allow_submit
    category: runtime_health
    state_source: "memory:WSGapStatus singleton (module-level _status)"
    read_at_file_line: "src/engine/cycle_runner.py:672"
    predicate_blocks_when: "summary()['entry']['allow_submit'] is False (subscription_state not in AUTHED/SUBSCRIBED, or stale, or m5_reconcile_required)"
    reason_format: "ws_gap=<subscription_state>:<gap_reason>"
    owner_module: "src.control.ws_gap_guard"
    owner_function: "summary"
    notes: "summary() defined at ws_gap_guard.py:116. Default boot state is subscription_state=DISCONNECTED/gap_reason=not_configured → blocks. blocks_market() also fires on MARKET_MISMATCH. Stale check uses stale_after_seconds threshold."

  # ── E. Operator / rollout ─────────────────────────────────────────────────

  - id: 11
    name: evaluate_entry_forecast_rollout_gate
    category: operator_rollout
    state_source: "env:ZEUS_ENTRY_FORECAST_ROLLOUT_GATE + file:state/entry_forecast_promotion_evidence.json + config:rollout_mode"
    read_at_file_line: "src/engine/evaluator.py:784"
    predicate_blocks_when: "decision.may_submit_live_orders is False (evidence missing, approval fields absent, status_snapshot.status != LIVE_ELIGIBLE, canary not satisfied)"
    reason_format: "one of: ENTRY_FORECAST_PROMOTION_EVIDENCE_MISSING | ENTRY_FORECAST_OPERATOR_APPROVAL_MISSING | ENTRY_FORECAST_G1_EVIDENCE_MISSING | CALIBRATION_TRANSFER_APPROVAL_MISSING | ENTRY_FORECAST_CANARY_SUCCESS_MISSING | ENTRY_FORECAST_ROLLOUT_BLOCKED | ENTRY_FORECAST_PROMOTION_EVIDENCE_CORRUPT:<detail>"
    owner_module: "src.control.entry_forecast_rollout"
    owner_function: "evaluate_entry_forecast_rollout_gate"
    notes: "Called from _live_entry_forecast_rollout_blocker (evaluator.py:759) only when ZEUS_ENTRY_FORECAST_ROLLOUT_GATE=1 (default '1'). Decision used at evaluator.py:865 (Phase C-3) and cycle_runtime.py (NOT cycle_runner.py — gate fires in the evaluator phase, not the discovery short-circuit). Blocker surfaced into entries_blocked_reason via caller chain."

  - id: 12
    name: entry_forecast_promotion_evidence_file
    category: operator_rollout
    state_source: "file:state/entry_forecast_promotion_evidence.json"
    read_at_file_line: "src/control/entry_forecast_promotion_evidence_io.py:224"
    predicate_blocks_when: "file absent → read_promotion_evidence() returns None → evaluate_entry_forecast_rollout_gate returns ENTRY_FORECAST_PROMOTION_EVIDENCE_MISSING → blocks when gate flag=1"
    reason_format: "ENTRY_FORECAST_PROMOTION_EVIDENCE_MISSING"
    owner_module: "src.control.entry_forecast_promotion_evidence_io"
    owner_function: "write_promotion_evidence"
    notes: "read_promotion_evidence (evidence_io.py:224) uses stat()-keyed LRU cache invalidated by inode rotation on atomic write. Corruption raises PromotionEvidenceCorruption (caught at evaluator.py:785). Default path: PROJECT_ROOT/state/entry_forecast_promotion_evidence.json (evidence_io.py:40)."

  - id: 13
    name: ZEUS_ENTRY_FORECAST_ROLLOUT_GATE_env_var
    category: operator_rollout
    state_source: "env:ZEUS_ENTRY_FORECAST_ROLLOUT_GATE"
    read_at_file_line: "src/engine/evaluator.py:748"
    predicate_blocks_when: "value == '0' → _entry_forecast_rollout_gate_flag_on() returns False → gate #11 is bypassed; default '1' means gate IS active"
    reason_format: "N/A — this flag enables/disables gate #11, not a block reason itself"
    owner_module: "src.engine.evaluator"
    owner_function: "_entry_forecast_rollout_gate_flag_on"
    notes: "ZEUS_ENTRY_FORECAST_ROLLOUT_GATE_FLAG='ZEUS_ENTRY_FORECAST_ROLLOUT_GATE' (evaluator.py:737). Default is '1' (ON). Setting to '0' disables the full promotion-evidence gate and falls back to rollout_mode-only check. Companion flag ZEUS_ENTRY_FORECAST_READINESS_WRITER controls Phase C-3 writer (evaluator.py:738,756)."

## Open questions

# None of the 13 gates required NOT_FOUND. All read sites pinned to live grep.
#
# One structural note worth flagging:
#
# Gate #11 (evaluate_entry_forecast_rollout_gate) does NOT feed into the
# cycle_runner.py:752 short-circuit directly. It is called inside the evaluator
# phase (_live_entry_forecast_rollout_blocker at evaluator.py:784), which runs
# AFTER discovery proceeds past L752. If the intent is to block discovery
# before any evaluator work, gate #11 must be wired into cycle_runner.py's
# entries_blocked_reason population (L715-L751) — it currently is not.
#
# The control_overrides VIEW (gate #3) reads from the view, not the raw
# control_overrides_history table. The VIEW is defined as the latest-value
# projection (see src/state/db.py:5435-5448). The audit hint referenced
# target_key='entries' AND action_type='gate' AND value='true' — confirmed
# correct per query_control_override_state logic at db.py:5502-5507.
